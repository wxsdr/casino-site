        ========================================= */

        /* =========================================

        .controls-bar { background: rgba(10, 15, 25, 0.95); padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(0,229,255,0.2); z-index: 100; height: 90px; box-shadow: 0 -10px 30px rgba(0,0,0,0.8);}

        /* СТАВКА */

        .bet-controls { display: flex; align-items: center; background: rgba(0,0,0,0.8); border-radius: 30px; padding: 5px 15px; border: 1px solid rgba(255,255,255,0.1); box-shadow: inset 0 0 15px rgba(0,0,0,0.8);}
        .bet-btn { background: transparent; color: #aaa; border: none; font-size: 24px; cursor: pointer; transition: 0.2s; padding: 0 10px;}

        /* КНОПКА PLAY */
        .play-btn { background: #fff; border: none; width: 110px; height: 110px; border-radius: 25px; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 -5px 0 rgba(0,0,0,0.2); transform: translateY(-25px); position: absolute; left: 50%; margin-left: -55px; border: 4px solid var(--neon);}

        .msg-win { color: var(--gold); }
        #status-msg.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    </style>
</head>

        const firebaseConfig = {

            authDomain: "kurahivka-casino.firebaseapp.com",
            databaseURL: "https://kurahivka-casino-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "kurahivka-casino"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const username = localStorage.getItem('casino_user');
        if (!username) window.location.href = '../index.html';

        let currentBalance = 0;
        const userRef = database.ref('users_by_name/' + username.toLowerCase());
        
        userRef.on('value', snap => {
            const data = snap.val();
            if (data && data.in_casino === false) document.getElementById('out-of-casino-overlay').style.display = 'flex';
            currentBalance = data ? (data.chips || 0) : 0;
            document.getElementById('balance-display').innerText = currentBalance;
        });

        // ==========================================
        // ІГРОВА ЛОГІКА ТА ЖОРСТКИЙ БАЛАНС (50%)
        // ==========================================
        const multipliers = [1.92, 3.84, 7.68, 15.36, 30.72];
        const WIN_CHANCE = 0.50; // РІВНО 50% НА КОЖЕН УДАР. Це дає 4% House Edge.

        let currentStep = -1; 
        let currentBet = 10;
        let potentialWin = 0;
        let isAnimating = false;

        const playBtn = document.getElementById('play-btn');
        const collectBtn = document.getElementById('collect-btn');
        const betInput = document.getElementById('bet-input');
        const targetZones = document.getElementById('target-zones');
        const msgBox = document.getElementById('status-msg');
        const winDisplay = document.getElementById('win-display');

        function changeBet(amount) {
            if (currentStep !== -1) return;
            currentBet += amount;
            if (currentBet < 10) currentBet = 10;
            betInput.value = currentBet;
        }

        async function startGame() {
            if (currentStep !== -1 || isAnimating) return;
            if (currentBet > currentBalance) return alert("Недостатньо фішок на балансі!");

            await userRef.update({ chips: currentBalance - currentBet });

            currentStep = 0; potentialWin = 0; updateUI();
            showMsg("ОБЕРІТЬ ЦІЛЬ!", "msg-goal");
        }

        function updateUI() {
            if (currentStep === -1) {
                playBtn.style.display = "flex"; collectBtn.style.display = "none";
                targetZones.classList.remove('active'); winDisplay.innerText = "0.00";
            } else {
                playBtn.style.display = "none"; collectBtn.style.display = "flex";
                targetZones.classList.add('active');
                
                if (currentStep === 0) {
                    collectBtn.disabled = true; collectBtn.style.filter = "grayscale(1)";
                } else {
                    collectBtn.disabled = false; collectBtn.style.filter = "none";
                }
                winDisplay.innerText = potentialWin.toFixed(2);
            }

            for (let i = 0; i < 5; i++) {
                const stepEl = document.getElementById(`step-${i}`);
                stepEl.className = "step";
                if (i < currentStep) stepEl.classList.add('passed');
                if (i === currentStep) stepEl.classList.add('active');
            }
        }

        function showMsg(text, className) {
            msgBox.innerText = text; msgBox.className = className;
            msgBox.classList.add('show');
            setTimeout(() => { msgBox.classList.remove('show'); }, 1500);
        }

        function shoot(target) {
            if (currentStep === -1 || isAnimating) return;
            isAnimating = true;
            targetZones.classList.remove('active');
            collectBtn.disabled = true;

            // ЗВУК УДАРУ
            let soundKick = document.getElementById('sound-kick');
            soundKick.currentTime = 0; soundKick.play().catch(()=>{});

            const ball = document.getElementById('ball');
            const goalie = document.getElementById('goalkeeper');

            // 3D АНІМАЦІЯ ПОЛЬОТУ
            const targets = {
                'tl': { x: '-320px', y: '-280px', s: 0.35 },
                'tc': { x: '0px',    y: '-300px', s: 0.35 },
                'tr': { x: '320px',  y: '-280px', s: 0.35 },
                'bl': { x: '-350px', y: '-100px', s: 0.45 },
                'br': { x: '350px',  y: '-100px', s: 0.45 }
            };

            const dives = [
                { id: 'tl', t: 'translate(-200px, -100px) rotate(-55deg)' },
                { id: 'tc', t: 'translate(0, -140px) scale(1.1)' },
                { id: 'tr', t: 'translate(200px, -100px) rotate(55deg)' },
                { id: 'bl', t: 'translate(-220px, 10px) rotate(-75deg)' },
                { id: 'br', t: 'translate(220px, 10px) rotate(75deg)' }
            ];

            // МАТЕМАТИКА
            const isGoal = Math.random() < WIN_CHANCE;

            let goalieDive;
            if (!isGoal) goalieDive = dives.find(d => d.id === target).t; 
            else {
                const wrongDives = dives.filter(d => d.id !== target); 
                goalieDive = wrongDives[Math.floor(Math.random() * wrongDives.length)].t;
            }

            const pos = targets[target];
            ball.style.transform = `translateX(calc(-50% + ${pos.x})) translateY(${pos.y}) scale(${pos.s}) rotate(${Math.random() * 1080}deg)`;
            
            setTimeout(() => { goalie.style.transform = goalieDive; }, 100);

            setTimeout(() => {
                if (isGoal) {
                    potentialWin = Math.floor(currentBet * multipliers[currentStep]);
                    currentStep++;
                    showMsg("ГОЛ!", "msg-goal");
                    document.getElementById('sound-win').currentTime = 0;
                    document.getElementById('sound-win').play().catch(()=>{});
                    
                    if (currentStep >= 5) setTimeout(() => collectWinnings(), 1500); 
                    else setTimeout(() => resetPitch(), 1500); 
                } else {
                    showMsg("СЕЙВ!", "msg-save");
                    document.getElementById('sound-lose').currentTime = 0;
                    document.getElementById('sound-lose').play().catch(()=>{});
                    currentStep = -1; potentialWin = 0;
                    setTimeout(() => resetPitch(), 2000);
                }
            }, 600);
        }

        async function collectWinnings() {
            if (potentialWin <= 0 || (isAnimating && currentStep < 5)) return;
            isAnimating = true;

            showMsg(`ВИГРАШ:\n${potentialWin} 🪙`, "msg-win");
            document.getElementById('sound-collect').currentTime = 0;
            document.getElementById('sound-collect').play().catch(()=>{});
            
            await userRef.once('value').then(s => { userRef.update({ chips: s.val().chips + potentialWin }); });

            setTimeout(() => {
                currentStep = -1; potentialWin = 0; resetPitch();
            }, 2500);
        }

        function resetPitch() {
            const ball = document.getElementById('ball');
            const goalie = document.getElementById('goalkeeper');
            
            ball.style.transition = 'none'; goalie.style.transition = 'none';
            ball.style.transform = 'translateX(-50%) translateY(0) scale(1) rotate(0deg)';
            goalie.style.transform = 'translateX(-50%) translateY(0) rotate(0deg)';
            
            setTimeout(() => {
                ball.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1)';
                goalie.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)';
                isAnimating = false; updateUI();
            }, 50);
        }
    </script>
</body>
</html>
