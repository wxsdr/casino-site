<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dog House - Kurahivka Casino</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <nav class="top-bar">
        <button class="btn-exit" onclick="window.location.href='../index.html'">⬅ В Лобі</button>
        <div class="balance-display">
            БАЛАНС: <span id="balance-amount">0</span> 🪙
        </div>
    </nav>

    <div id="game-wrapper">
        <div id="game-scene">
            
            <div class="background-layers">
                <div class="sky"></div>
                <div class="cloud cloud-1"></div>
                <div class="cloud cloud-2"></div>
                <div class="cloud cloud-3"></div>
                <div class="fence"></div>
                <div class="grass"></div>
            </div>

            <div class="dog-house-machine">
                <div class="bone-sign">
                    <span>THE DOG HOUSE</span>
                </div>
                
                <div class="roof"></div>

                <div class="reels-container">
                    <div class="reel-window">
                        <div class="reel" id="reel-0"><div class="reel-strip" id="strip-0"></div></div>
                        <div class="reel" id="reel-1"><div class="reel-strip" id="strip-1"></div></div>
                        <div class="reel" id="reel-2"><div class="reel-strip" id="strip-2"></div></div>
                        <div class="reel" id="reel-3"><div class="reel-strip" id="strip-3"></div></div>
                        <div class="reel" id="reel-4"><div class="reel-strip" id="strip-4"></div></div>
                    </div>
                </div>
            </div>

            <div class="control-panel">
                <div class="status-screen" id="status-screen">ОЧІКУВАННЯ СТАВКИ</div>
                
                <div class="bet-controls">
                    <button class="bet-btn" id="bet-minus">-</button>
                    <div class="current-bet">
                        <span class="bet-label">СТАВКА</span>
                        <span class="bet-value" id="bet-amount">10</span>
                    </div>
                    <button class="bet-btn" id="bet-plus">+</button>
                </div>
                
                <button class="spin-btn" id="spin-btn">КРУТИТИ</button>
                
                <button class="buy-bonus-btn" id="buy-bonus-btn">
                    КУПИТИ БОНУС <br><span id="bonus-price">1000</span> 🪙
                </button>
            </div>

        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
