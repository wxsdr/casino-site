<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurakhivka RP | VIP Слот</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        /* ==========================================================
           1. БАЗОВІ НАЛАШТУВАННЯ ТА ФОН (Стиль Рулетки)
           ========================================================== */
        :root {
            --gold: #d4af37;
            --gold-light: #fdf5a9;
            --green-bg: #0a4226;
            --dark-bg: #03140b;
            --panel-bg: #111;
            --neon-green: #00ff9d;
            --red: #c62828;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background: radial-gradient(ellipse at top, var(--green-bg) 0%, var(--dark-bg) 100%);
            color: white; font-family: 'Montserrat', sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* ==========================================================
           2. ВЕРХНЯ НАВІГАЦІЯ
           ========================================================== */
        .nav-bar {
            padding: 15px 40px; background: linear-gradient(to bottom, #161616, #000);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--gold); box-shadow: 0 5px 25px rgba(0,0,0,0.9);
            z-index: 100;
        }
        .btn-exit {
            background: rgba(0,0,0,0.5); color: var(--gold); border: 1px solid var(--gold);
            padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
            box-shadow: inset 0 0 10px rgba(212,175,55,0.2);
        }
        .btn-exit:hover { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }
        
        .title-text {
            color: var(--gold); font-weight: 900; font-size: 20px; letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(212,175,55,0.5); text-transform: uppercase;
        }

        .balance-container { font-size: 18px; font-weight: bold; }
        #balance-amount { color: var(--neon-green); font-size: 26px; margin-left: 10px; text-shadow: 0 0 10px var(--neon-green); }

        /* ==========================================================
           3. ІГРОВА СЦЕНА (Автомасштабування)
           ========================================================== */
        #game-wrapper {
            flex: 1; display: flex; justify-content: center; align-items: center;
            width: 100%; position: relative; overflow: hidden;
        }
        #game-scene {
            width: 1600px; height: 900px;
            transform-origin: center center; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 40px;
        }

        /* ==========================================================
           4. ПРЕМІУМ ПАНЕЛІ ТА СІТКА БАРАБАНІВ
           ========================================================== */
        .slot-panel {
            background: linear-gradient(135deg, rgba(25,25,25,0.95), rgba(10,10,10,0.95));
            border-radius: 20px; border: 1px solid #333; padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,0.6);
        }

        .slot-grid {
            display: grid; grid-template-columns: repeat(5, 140px); grid-template-rows: repeat(3, 140px);
            gap: 15px; background: #050505; padding: 20px; border-radius: 15px;
            border: 2px solid #222; box-shadow: inset 0 10px 30px rgba(0,0,0,1);
            overflow: hidden;
        }

        .reel-cell {
            width: 140px; height: 140px; background: #111;
            border-radius: 10px; border: 2px solid #222;
            display: flex; justify-content: center; align-items: center;
            position: relative; box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        /* Підсвітка виграшу */
        .win-glow {
            animation: winPulse 0.8s infinite alternate;
            border-color: var(--gold) !important;
            box-shadow: 0 0 30px var(--gold), inset 0 0 20px var(--gold) !important; z-index: 10;
        }
        @keyframes winPulse { from { transform: scale(1); filter: brightness(1); } to { transform: scale(1.05); filter: brightness(1.3); } }

        /* ==========================================================
           5. 3D БЛОКИ MINECRAFT (CSS Drawing)
           ========================================================== */
        .mc-block {
            width: 100px; height: 100px; position: relative;
            box-sizing: border-box; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.8));
            transition: transform 0.1s;
        }
        /* Внутрішні тіні створюють ефект 3D-фаски (скосу) */
        
        .blk-dirt { 
            background: #79553a; border: 4px solid #3b2618; 
            box-shadow: inset 8px 8px 0 rgba(255,255,255,0.2), inset -8px -8px 0 rgba(0,0,0,0.4); 
        }
        /* Додаємо "траву" зверху для землі */
        .blk-dirt::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 25px;
            background: #5cb85c; border-bottom: 4px solid #3d8b3d;
        }

        .blk-wood { 
            background: #9c7b4d; border: 4px solid #4a3315; 
            box-shadow: inset 8px 8px 0 rgba(255,255,255,0.2), inset -8px -8px 0 rgba(0,0,0,0.4); 
            background-image: repeating-linear-gradient(90deg, transparent, transparent 20px, rgba(0,0,0,0.1) 20px, rgba(0,0,0,0.1) 24px);
        }
        
        .blk-gold { 
            background: #fce029; border: 4px solid #b38600; 
            box-shadow: inset 8px 8px 0 rgba(255,255,255,0.6), inset -8px -8px 0 rgba(179,134,0,0.8); 
        }
        
        .blk-diamond { 
            background: #51eeea; border: 4px solid #1a8b8b; 
            box-shadow: inset 8px 8px 0 rgba(255,255,255,0.7), inset -8px -8px 0 rgba(26,139,139,0.8); 
        }
        
        .blk-emerald { 
            background: #41f384; border: 4px solid #14803d; 
            box-shadow: inset 8px 8px 0 rgba(255,255,255,0.5), inset -8px -8px 0 rgba(20,128,61,0.8); 
        }

        /* WILD (Верстак) */
        .blk-crafting { 
            background: #d08d38; border: 4px solid #5c3a21; 
            box-shadow: inset 8px 8px 0 rgba(255,255,255,0.3), inset -8px -8px 0 rgba(0,0,0,0.5), 0 0 20px rgba(212,175,55,0.5); 
        }
        .blk-crafting::after {
            content: 'WILD'; position: absolute; color: white; text-shadow: 2px 2px 0 black;
            font-size: 28px; font-weight: 900; top: 30px; left: 14px;
        }

        /* SCATTER (Скриня) */
        .blk-chest { 
            background: #a6702d; border: 4px solid #111; 
            box-shadow: inset 8px 8px 0 rgba(255,255,255,0.2), inset -8px -8px 0 rgba(0,0,0,0.5), 0 0 30px rgba(255,51,102,0.4); 
        }
        .blk-chest::before {
            content: ''; position: absolute; width: 16px; height: 24px; background: #fff;
            border: 4px solid #000; top: 25px; left: 38px;
        }
        .blk-chest::after {
            content: 'BONUS'; position: absolute; color: var(--gold); text-shadow: 2px 2px 0 black;
            font-size: 22px; font-weight: 900; top: 55px; left: 8px; z-index: 2;
        }

        .sticky-mult {
            position: absolute; bottom: -10px; right: -10px; background: var(--red); color: white;
            padding: 5px 12px; font-size: 24px; font-weight: 900; border-radius: 8px;
            border: 2px solid white; box-shadow: 0 5px 10px rgba(0,0,0,0.8); z-index: 10;
        }

        .spinning { filter: blur(5px); transform: translateY(20px) scaleY(1.2); }

        /* ==========================================================
           6. ПАНЕЛЬ УПРАВЛІННЯ (Стиль Рулетки)
           ========================================================== */
        .controls-panel {
            width: 1400px; display: flex; justify-content: space-between; align-items: stretch; gap: 20px;
        }
        .control-box {
            background: linear-gradient(135deg, rgba(25,25,25,0.9), rgba(10,10,10,0.9));
            border-radius: 15px; border: 1px solid #333; padding: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); flex: 1;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .status-text { font-size: 26px; font-weight: 900; color: var(--gold); text-transform: uppercase; text-shadow: 0 0 10px rgba(212,175,55,0.4); text-align: center; }

        .bet-label { color: #888; font-size: 14px; font-weight: 700; letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; }
        .bet-input-row { display: flex; align-items: center; gap: 15px; }
        
        .bet-btn {
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid #555;
            background: #222; color: white; font-size: 28px; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 10px rgba(0,0,0,0.5); transition: 0.2s;
        }
        .bet-btn:active { transform: translateY(3px); box-shadow: none; }
        
        .bet-input {
            background: #000; color: white; border: 2px solid #444; border-radius: 10px;
            font-family: 'Montserrat', sans-serif; font-size: 36px; font-weight: 900;
            text-align: center; width: 160px; height: 60px; outline: none;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.8); transition: 0.3s;
        }
        .bet-input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.3); }

        .spin-btn {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold)); color: black;
            border: none; border-radius: 12px; width: 100%; height: 80px;
            font-size: 32px; font-weight: 900; font-family: 'Montserrat', sans-serif;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
            box-shadow: 0 8px 0 #8a6d1c, 0 15px 20px rgba(0,0,0,0.5); transition: 0.1s;
        }
        .spin-btn:active:not(:disabled) { transform: translateY(8px); box-shadow: 0 0 0 #8a6d1c; }
        .spin-btn:disabled { background: #444; color: #777; box-shadow: 0 8px 0 #222; cursor: not-allowed; }

        .buy-bonus-btn {
            background: transparent; border: 2px solid var(--red); color: var(--red);
            border-radius: 12px; width: 100%; padding: 15px;
            font-size: 20px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .buy-bonus-btn:hover:not(:disabled) { background: var(--red); color: white; box-shadow: 0 0 20px rgba(198,40,40,0.5); }
        .buy-bonus-btn:disabled { border-color: #555; color: #555; cursor: not-allowed; }

        /* Модалка повідомлень */
        #msg-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); }
        .msg-box { background: #111; border: 2px solid var(--gold); padding: 40px; border-radius: 20px; max-width: 500px; text-align: center; box-shadow: 0 0 50px rgba(212,175,55,0.2); }
        .msg-text { font-size: 24px; font-weight: bold; margin-bottom: 30px; color: #fff; line-height: 1.5; }
        .msg-btn { background: var(--gold); color: black; border: none; padding: 15px 40px; border-radius: 8px; font-size: 20px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="btn-exit" onclick="window.location.href='../index.html'">⬅ Втекти</button>
        <div class="title-text">VIP ПІКСЕЛЬ СЛОТ</div>
        <div class="balance-container">
            БАЛАНС: <strong id="balance-amount">0</strong>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="game-scene">
            
            <div class="slot-panel">
                <div class="slot-grid" id="slot-grid">
                    <!-- JS згенерує сітку -->
                </div>
            </div>

            <div class="controls-panel">
                <div class="control-box">
                    <div class="status-text" id="status-text">ОЧІКУВАННЯ СТАВКИ...</div>
                </div>
                
                <div class="control-box">
                    <div class="bet-label">Поточна ставка</div>
                    <div class="bet-input-row">
                        <button class="bet-btn" onclick="updateBet(-10)">-</button>
                        <input type="number" id="bet-input" class="bet-input" value="10" min="10" max="50000" onchange="manualBetChange()">
                        <button class="bet-btn" onclick="updateBet(10)">+</button>
                    </div>
                </div>
                
                <div class="control-box" style="gap: 15px;">
                    <button class="spin-btn" id="spin-btn" onclick="spin()">ПІДТВЕРДИТИ</button>
                    <button class="buy-bonus-btn" id="buy-bonus-btn" onclick="buyBonus()">
                        БОНУСКА ЗА <span id="bonus-price">1000</span>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Модалка -->
    <div id="msg-modal">
        <div class="msg-box">
            <div class="msg-text" id="msg-content">Текст</div>
            <button class="msg-btn" onclick="document.getElementById('msg-modal').style.display='none'">ОК</button>
        </div>
    </div>
    <script>
        // --- 1. АВТОМАСШТАБУВАННЯ СЦЕНИ ---
        function resizeGame() {
            const wrapper = document.getElementById('game-wrapper');
            const scene = document.getElementById('game-scene');
            // Базовий розмір, під який ми малювали CSS
            const baseWidth = 1600;
            const baseHeight = 900;
            
            // Рахуємо масштаб, щоб гра завжди влазила у вікно
            const scale = Math.min(
                wrapper.clientWidth / baseWidth,
                wrapper.clientHeight / baseHeight
            );
            
            scene.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeGame);
        resizeGame(); // Викликаємо одразу при завантаженні

        // --- 2. МОДАЛЬНЕ ВІКНО ПОВІДОМЛЕНЬ ---
        function showMsg(text) {
            document.getElementById('msg-content').innerText = text;
            document.getElementById('msg-modal').style.display = 'flex';
        }

        // --- 3. FIREBASE ТА СИНХРОНІЗАЦІЯ БАЛАНСУ ---
        const firebaseConfig = {
            apiKey: "AIzaSyC1HOC3_im8YiziljGqpR_0AvHLQctIfxQ",
            authDomain: "kurahivka-casino.firebaseapp.com",
            databaseURL: "https://kurahivka-casino-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "kurahivka-casino"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const username = localStorage.getItem('casino_user');
        
        if (!username) window.location.href = '../index.html';

        let currentBalance = 0;
        const userRef = database.ref('users_by_name/' + username.toLowerCase());
        
        userRef.on('value', snap => {
            const data = snap.val();
            if (data && data.in_casino === false) {
                showMsg("ДОСТУП ЗАБЛОКОВАНО: Ви покинули казино.");
                setTimeout(() => window.location.href = '../index.html', 2000);
            }
            currentBalance = data ? (data.chips || 0) : 0;
            document.getElementById('balance-amount').innerText = currentBalance;
        });

        // --- 4. НАЛАШТУВАННЯ СЛОТА ---
        const symbols = ['blk-dirt', 'blk-wood', 'blk-gold', 'blk-diamond', 'blk-emerald'];
        const wildSymbol = 'blk-crafting'; // Верстак
        const scatterSymbol = 'blk-chest'; // Скриня

        let currentBet = 10;
        let isSpinning = false;
        let isBonusGame = false;
        let freeSpinsLeft = 0;
        let stickyWilds = {}; // Зберігаємо позиції липких верстаків: { "0-0": множник }

        // Ініціалізація пустого поля
        const gridElement = document.getElementById('slot-grid');
        function initGrid() {
            gridElement.innerHTML = '';
            for (let y = 0; y < 3; y++) {
                for (let x = 0; x < 5; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'reel-cell';
                    cell.id = `cell-${x}-${y}`;
                    
                    const block = document.createElement('div');
                    block.className = `mc-block ${symbols[Math.floor(Math.random() * symbols.length)]}`;
                    block.id = `block-${x}-${y}`;
                    
                    cell.appendChild(block);
                    gridElement.appendChild(cell);
                }
            }
        }
        initGrid();

        // --- 5. УПРАВЛІННЯ СТАВКОЮ ---
        const betInput = document.getElementById('bet-input');
        function updateBet(amount) {
            if (isSpinning || isBonusGame) return;
            let newBet = parseInt(betInput.value) + amount;
            if (newBet >= 10 && newBet <= 50000) {
                currentBet = newBet; betInput.value = currentBet;
                document.getElementById('bonus-price').innerText = currentBet * 100;
            }
        }
        function manualBetChange() {
            if (isSpinning || isBonusGame) { betInput.value = currentBet; return; }
            let val = parseInt(betInput.value);
            if (isNaN(val) || val < 10) val = 10;
            currentBet = val; betInput.value = currentBet;
            document.getElementById('bonus-price').innerText = currentBet * 100;
        }

        // --- 6. ЛОГІКА ОБЕРТАННЯ ---
        function setStatus(text, color = 'var(--gold)') {
            const el = document.getElementById('status-text');
            el.innerText = text; el.style.color = color;
            el.style.textShadow = `0 0 15px ${color}`;
        }

        function lockButtons(lock) {
            document.getElementById('spin-btn').disabled = lock;
            document.getElementById('buy-bonus-btn').disabled = lock;
            betInput.disabled = lock;
        }

        async function buyBonus() {
            const cost = currentBet * 100;
            if (isSpinning || isBonusGame) return;
            if (currentBalance < cost) return showMsg("Недостатньо фішок для покупки!");
            
            isSpinning = true; lockButtons(true);
            await userRef.update({ chips: currentBalance - cost });
            executeSpin(true); // Запускаємо форсований бонус (3 скрині)
        }

        async function spin() {
            if (isSpinning) return;
            if (!isBonusGame && currentBalance < currentBet) return showMsg("Недостатньо фішок!");
            
            isSpinning = true; lockButtons(true);
            setStatus("КРАФТИМО...", "white");
            document.querySelectorAll('.win-glow').forEach(el => el.classList.remove('win-glow'));

            if (!isBonusGame) await userRef.update({ chips: currentBalance - currentBet });
            else freeSpinsLeft--;

            executeSpin(false);
        }

        function executeSpin(forceBonus) {
            let spinsCount = 0;
            // Ефект швидкої зміни блоків (Blur)
            let spinInterval = setInterval(() => {
                for (let y = 0; y < 3; y++) {
                    for (let x = 0; x < 5; x++) {
                        // Не чіпаємо липкі верстаки у бонусці
                        if (isBonusGame && stickyWilds[`${x}-${y}`]) continue;
                        
                        const block = document.getElementById(`block-${x}-${y}`);
                        block.className = `mc-block ${symbols[Math.floor(Math.random() * symbols.length)]} spinning`;
                        block.innerHTML = ''; // Очищаємо текст WILD/BONUS під час крутіння
                    }
                }
                spinsCount++;
                if (spinsCount > 15) { clearInterval(spinInterval); finalizeSpin(forceBonus); }
            }, 60);
        }

        function finalizeSpin(forceBonus) {
            let finalMatrix = [[], [], []];
            let scatterCount = 0;

            for (let y = 0; y < 3; y++) {
                for (let x = 0; x < 5; x++) {
                    const block = document.getElementById(`block-${x}-${y}`);
                    block.classList.remove('spinning');
                    
                    // Зберігаємо старі липкі верстаки
                    if (isBonusGame && stickyWilds[`${x}-${y}`]) {
                        finalMatrix[y][x] = wildSymbol; continue; 
                    }

                    // Форсуємо скрині при покупці бонуса
                    if (forceBonus && y === 1 && (x === 0 || x === 2 || x === 4)) {
                        block.className = `mc-block ${scatterSymbol}`;
                        finalMatrix[y][x] = scatterSymbol; scatterCount++; continue;
                    }

                    let isScatterReel = (x === 0 || x === 2 || x === 4);
                    let symbolClass = '';
                    block.innerHTML = ''; 

                    // Шанс випадання Скрині (~5%)
                    if (!isBonusGame && !forceBonus && isScatterReel && Math.random() < 0.05) {
                        symbolClass = scatterSymbol; scatterCount++;
                    } 
                    // Шанс випадання Верстака (~12%)
                    else if ((x === 1 || x === 2 || x === 3) && Math.random() < 0.12) {
                        symbolClass = wildSymbol;
                        if (isBonusGame) {
                            // Якщо бонуска - верстак отримує множник і стає липким
                            stickyWilds[`${x}-${y}`] = Math.random() > 0.5 ? 2 : 3;
                            block.innerHTML = `<div class="sticky-mult">x${stickyWilds[`${x}-${y}`]}</div>`;
                        }
                    } 
                    // Звичайний блок
                    else {
                        symbolClass = symbols[Math.floor(Math.random() * symbols.length)];
                    }

                    block.className = `mc-block ${symbolClass}`;
                    finalMatrix[y][x] = symbolClass;
                }
            }
            checkWin(finalMatrix, scatterCount);
        }

        async function checkWin(matrix, scatterCount) {
            let winAmount = 0;
            
            // Перевірка горизонтальних ліній
            for (let y = 0; y < 3; y++) {
                if (matrix[y][0] === matrix[y][1] || matrix[y][1] === wildSymbol) {
                    if (Math.random() > 0.4) {
                        // Світіння клітинок
                        document.getElementById(`cell-0-${y}`).classList.add('win-glow');
                        document.getElementById(`cell-1-${y}`).classList.add('win-glow');
                        document.getElementById(`cell-2-${y}`).classList.add('win-glow');
                        
                        let lineWin = currentBet * (Math.floor(Math.random() * 5) + 1);
                        let multiplier = 1;
                        for(let x = 1; x <= 3; x++) {
                            if(stickyWilds[`${x}-${y}`]) multiplier += stickyWilds[`${x}-${y}`];
                        }
                        winAmount += (lineWin * (multiplier > 1 ? multiplier : 1));
                    }
                }
            }

            if (winAmount > 0) {
                setStatus(`ВИГРАШ: +${winAmount}`, "var(--neon-green)");
                await userRef.once('value').then(s => { userRef.update({ chips: s.val().chips + winAmount }); });
            } else if (!isBonusGame) {
                setStatus("НЕ ПОЩАСТИЛО", "#888");
            }

            // Логіка старту/завершення бонусної гри
            setTimeout(() => {
                if (!isBonusGame && scatterCount >= 3) {
                    startBonusGame();
                } else if (isBonusGame && freeSpinsLeft <= 0) {
                    endBonusGame();
                } else if (isBonusGame && freeSpinsLeft > 0) {
                    setStatus(`КРАФТІВ ЗАЛИШИЛОСЬ: ${freeSpinsLeft}`, "var(--red)");
                    isSpinning = false; lockButtons(false); document.getElementById('buy-bonus-btn').disabled = true;
                } else {
                    isSpinning = false; lockButtons(false); setStatus("ОЧІКУВАННЯ СТАВКИ...", "var(--gold)");
                }
            }, 1200);
        }

        function startBonusGame() {
            isBonusGame = true; 
            freeSpinsLeft = Math.floor(Math.random() * 8) + 7; // 7-15 фріспінів
            stickyWilds = {}; 
            
            showMsg(`🎰 ЗНАЙДЕНО СКАРБ!\nВиграно безкоштовних крафтів: ${freeSpinsLeft}\nВсі верстаки тепер залипають!`);
            setStatus(`КРАФТІВ ЗАЛИШИЛОСЬ: ${freeSpinsLeft}`, "var(--red)");
            
            isSpinning = false; lockButtons(false); document.getElementById('buy-bonus-btn').disabled = true;
        }

        function endBonusGame() {
            showMsg("Безкоштовна гра завершена!");
            isBonusGame = false; stickyWilds = {};
            
            // Видаляємо множники з екрану
            document.querySelectorAll('.sticky-mult').forEach(el => el.remove());
            
            isSpinning = false; lockButtons(false); setStatus("ОЧІКУВАННЯ СТАВКИ...", "var(--gold)");
        }
    </script>
</body>
</html>
