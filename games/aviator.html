<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Aviator | Diamond Casino</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-main: #000000; 
            --bg-panel: #1b1c1d; 
            --bg-box: #252528;
            --aviator-red: #e5053a; 
            --aviator-green: #28a745; 
            --aviator-orange: #d97d0d;
            --text-gray: #9ca3af;
            
            --hist-blue: #34b4ff;
            --hist-purple: #913fea;
            --hist-pink: #c01f5c;
        }
        
        body { margin: 0; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; background: var(--bg-main); user-select: none;}

        /* НАВІГАЦІЯ */
        .nav-bar { padding: 0 20px; background: #111112; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; z-index: 100; height: 50px; box-sizing: border-box;}
        .back-btn { background: transparent; color: #fff; border: 1px solid #444; padding: 6px 15px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-weight: bold; font-size: 11px; text-transform: uppercase;}
        .back-btn:hover { background: #333; border-color: #666;}
        .header-center { font-size: 13px; color: #888; font-weight: bold; display: flex; align-items: center;}
        .header-center span { color: #fff; margin-left: 5px; }
        .balance-display { font-size: 16px; font-weight: 900; color: var(--aviator-green); text-shadow: 0 0 10px rgba(40,167,69,0.3);}

        /* ЛЕЙАУТ */
        .game-layout { display: flex; flex: 1; height: calc(100vh - 50px); padding: 10px; gap: 10px; box-sizing: border-box;}

        /* 1. ЛІВА ПАНЕЛЬ */
        .left-panel { width: 340px; background: var(--bg-panel); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #2a2a2b;}
        
        .total-bets-header { padding: 15px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; background: #161617;}
        .tb-left { display: flex; flex-direction: column;}
        .tb-count { font-size: 16px; font-weight: 900; color: white;}
        .tb-label { font-size: 11px; color: #888; margin-top: 2px;}
        .tb-right { text-align: right;}
        .tb-amount { font-size: 20px; font-weight: 900; color: white;}
        
        .panel-subheader { padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; background: #1b1c1d; border-bottom: 1px solid #222;}
        .panel-subheader div { font-size: 10px; color: var(--text-gray); font-weight: bold; text-transform: uppercase;}
        
        .bets-list { flex: 1; overflow-y: auto; padding: 5px; background: #121212;}
        .bet-item { display: flex; justify-content: space-between; padding: 6px 10px; background: #1b1c1d; margin-bottom: 3px; border-radius: 8px; font-size: 13px; align-items: center; border: 1px solid #1b1c1d; transition: 0.2s;}
        
        .bet-item.won { border-color: rgba(40, 167, 69, 0.5); background: rgba(40, 167, 69, 0.1);}
        .bet-item.won .bet-multi { color: var(--aviator-green); background: rgba(40,167,69,0.15); font-weight: bold;}
        .bet-item.won .bet-win { color: var(--aviator-green); font-weight: 900;}
        
        .bet-item.lost { border-color: rgba(229, 5, 58, 0.5); background: rgba(229, 5, 58, 0.1);}
        .bet-item.lost .bet-amount { color: var(--aviator-red); text-decoration: line-through;}
        
        .bet-user { display: flex; align-items: center; gap: 8px; width: 40%; overflow: hidden; color: #ccc; font-size: 12px;}
        .avatar { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; background: #333;}
        .bet-amount { color: #fff; width: 20%; text-align: left; font-weight: bold;}
        .bet-multi { color: var(--text-gray); width: 15%; text-align: center; background: rgba(255,255,255,0.05); padding: 2px 4px; border-radius: 6px; font-size: 12px;}
        .bet-win { color: white; font-weight: bold; width: 25%; text-align: right;}

        /* 2. ПРАВА ПАНЕЛЬ */
        .right-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 600px;}

        /* ІСТОРІЯ ІКСІВ */
        .history-bar { display: flex; align-items: center; background: #121414; padding: 5px 15px; border-radius: 12px; border: 1px solid #2a2a2b; height: 35px; gap: 8px; overflow-x: auto;}
        .history-bar::-webkit-scrollbar { display: none; }
        .hist-bubble { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 900; background: rgba(0,0,0,0.4); border: 1px solid transparent; flex-shrink: 0; cursor: pointer; transition: 0.2s;}
        .hist-bubble:hover { background: rgba(255,255,255,0.1); }
        .hist-blue { color: var(--hist-blue); border-color: rgba(52, 180, 255, 0.3);}
        .hist-purple { color: var(--hist-purple); border-color: rgba(145, 63, 234, 0.3);}
        .hist-pink { color: var(--hist-pink); border-color: rgba(192, 31, 92, 0.3);}

        /* ЕКРАН ГРИ */
        .game-screen { flex: 1; background: #121414; border-radius: 12px; border: 1px solid #2a2a2b; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: background 1.5s ease;}
        
        .sunburst { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: repeating-conic-gradient(from 0deg, rgba(255,255,255,0.02) 0deg 10deg, transparent 10deg 20deg); animation: rotate-bg 90s linear infinite; z-index: 1;}
        @keyframes rotate-bg { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #gameCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5;}

        .multiplier-text { position: absolute; z-index: 10; font-size: 140px; font-weight: 900; color: white; text-shadow: 0 0 30px rgba(0,0,0,0.9); pointer-events: none; font-family: 'Arial Black', sans-serif; letter-spacing: -3px; display: flex; align-items: baseline;}
        .crashed-text { position: absolute; z-index: 10; font-size: 45px; font-weight: 900; color: var(--aviator-red); top: 25%; text-shadow: 0 0 20px rgba(0,0,0,0.9); opacity: 0; transition: 0.3s; letter-spacing: 2px;}
        
        .loading-container { position: absolute; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 15px; display: none;}
        .loading-text { font-size: 32px; font-weight: 900; color: var(--aviator-red); text-shadow: 0 0 15px rgba(229,5,58,0.5);}
        .loading-bar { width: 400px; height: 10px; background: #222; border-radius: 5px; overflow: hidden; box-shadow: inset 0 0 5px rgba(0,0,0,0.8);}
        .loading-fill { height: 100%; background: var(--aviator-red); width: 100%; box-shadow: 0 0 15px var(--aviator-red);}

        /* ПАНЕЛЬ КЕРУВАННЯ */
        .controls-area { display: flex; gap: 10px; height: 160px;}
        .bet-box { flex: 1; background: var(--bg-box); border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box;}
        
        .bet-tabs { display: flex; justify-content: center; gap: 30px; margin-bottom: 10px;}
        .bet-tab { color: #888; font-size: 12px; font-weight: bold; cursor: pointer; padding-bottom: 4px; transition: 0.2s;}
        .bet-tab.active { color: white; border-bottom: 2px solid var(--aviator-red);}

        .bet-main-row { display: flex; gap: 10px; flex: 1;}

        .bet-inputs { display: flex; flex-direction: column; justify-content: space-between; width: 170px;}
        .amount-control { display: flex; align-items: center; justify-content: space-between; background: #000; border-radius: 20px; border: 1px solid #444; padding: 2px 4px;}
        .amt-btn { background: transparent; border: none; color: #888; font-size: 20px; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: 0.2s;}
        .amt-btn:hover { background: #333; color: white;}
        .amt-input { flex: 1; background: transparent; border: none; color: white; font-size: 18px; font-weight: bold; text-align: center; outline: none; width: 100%;}
        
        .quick-bets { display: grid; grid-template-columns: 1fr 1fr; gap: 6px;}
        .q-btn { background: #1b1c1d; color: #aaa; border: 1px solid #333; border-radius: 20px; font-size: 13px; font-weight: bold; padding: 5px 0; cursor: pointer; transition: 0.2s;}
        .q-btn:hover { background: #333; color: white;}

        .action-container { flex: 1; display: flex;}
        .action-btn { flex: 1; border-radius: 12px; border: none; cursor: pointer; font-size: 26px; font-weight: 900; text-transform: uppercase; transition: 0.1s; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.4); letter-spacing: 1px;}
        .action-btn:active { transform: scale(0.98); }
        
        .btn-bet { background: #28a745; color: white; border: 1px solid #1e7e34;}
        .btn-bet:hover { background: #2fbc4f; }
        
        .btn-cancel { background: #cb0432; color: white; border: 1px solid #a30328;}
        .btn-cancel:hover { background: #e5053a; }
        
        .btn-cashout { background: #d97d0d; color: white; font-size: 22px; border: 1px solid #b56708;}
        .btn-cashout:hover { background: #f28b0d; }
        
        .btn-disabled { background: #2b2c2e; color: #555; cursor: not-allowed; box-shadow: none; border: 1px solid #333;}

        .cashout-amount { font-size: 18px; font-weight: 900; margin-top: 2px;}
        .btn-text-small { font-size: 14px; font-weight: normal; opacity: 0.9; text-transform: none; margin-top: 2px;}

    </style>
</head>
<body>

    <div class="nav-bar">

                        <div class="bet-inputs">
                            <div class="amount-control">
                                <button class="amt-btn" onclick="adjustBet(2, -10)">-</button>
                                <input type="number" class="amt-input" id="input-2" value="10" min="10" step="10" readonly>

                            <button class="action-btn btn-bet" id="btn-2" onclick="handleAction(2)">

    <script>
        // ==========================================
        // ІНІЦІАЛІЗАЦІЯ ТА СЕРВЕРНИЙ ЧАС (ФІКС СИНХРОНІЗАЦІЇ)
        // ==========================================
        const username = localStorage.getItem('casino_user');
        if (!username) window.location.href = '../index.html';

        const firebaseConfig = {
            apiKey: "AIzaSyC1HOC3_im8YiziljGqpR_0AvHLQctIfxQ",
            authDomain: "kurahivka-casino.firebaseapp.com",
            databaseURL: "https://kurahivka-casino-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "kurahivka-casino"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const myName = username.toLowerCase();
        document.getElementById('player-name').innerText = username;

        // Синхронізація часу з Firebase (ФІКС РАССИНХРОНУ)
        let serverTimeOffset = 0;
        database.ref(".info/serverTimeOffset").on("value", function(snap) {
            serverTimeOffset = snap.val() || 0;
        });

        function getServerTime() {
            return Date.now() + serverTimeOffset;
        }

        let currentBalance = 0;
        database.ref('users_by_name/' + myName).on('value', snap => {
            const data = snap.val();
            if (data && data.in_casino === false) {
                alert("Ви вийшли з казино!");
                window.location.href = '../index.html';
            }
            currentBalance = data ? (data.chips || 0) : 0;
            document.getElementById('balance-amount').innerText = currentBalance;
        });

        // ==========================================
        // РУШІЙ КІМНАТИ ТА ПЕРЕХОДИ
        // ==========================================
        const roomRef = database.ref('tables/aviator_1');
        const betsRef = database.ref('tables/aviator_1/bets');
        
        let gameState = 'waiting'; 
        let crashPoint = 1.00;
        let flightStartTime = 0;
        let currentMultiplier = 1.00;
        let waitingEndTime = 0;

        roomRef.once('value', snap => {
            if(!snap.exists() || getServerTime() - snap.val().lastUpdate > 20000) {
                startNewRound();
            }
        });

        roomRef.on('value', snap => {
            const data = snap.val();
            if (!data) return;

            // Локальна обробка станів для запобігання блиманням
            if (data.status === 'waiting') {
                gameState = 'waiting';
                window.localCrashTriggered = false;
            } else if (data.status === 'flying') {
                if (!window.localCrashTriggered) gameState = 'flying';
            } else if (data.status === 'crashed') {
                gameState = 'crashed';
            }

            crashPoint = data.crashPoint;
            flightStartTime = data.startTime;
            waitingEndTime = data.waitingEndTime;
            
            renderHistory(data.history || []);

            // Хост логіка: тільки перший, хто побачив кінець очікування
            if (gameState === 'waiting' && getServerTime() > waitingEndTime) {
                if (!window.hostLocked) {
                    window.hostLocked = true;
                    setTimeout(() => {
                        roomRef.once('value', s => {
                            if(s.val() && s.val().status === 'waiting') {
                                roomRef.update({ status: 'flying', startTime: getServerTime(), lastUpdate: getServerTime() });
                            }
                        });
                    }, Math.random() * 300); // Захист від одночасних записів
                }
            }
        });

        function triggerLocalCrash() {
            gameState = 'crashed';
            window.localCrashTriggered = true;
            
            roomRef.once('value', s => {
                if(s.val() && s.val().status === 'flying') {
                    roomRef.update({ status: 'crashed', lastUpdate: getServerTime() });
                    setTimeout(() => { startNewRound(crashPoint); }, 3000); 
                }
            });
        }

        function startNewRound(lastCrash = null) {
            let crash = 0.99 / Math.random();
            if (crash < 1.01) crash = 1.00; 
            
            roomRef.once('value', snap => {
                if (snap.val() && snap.val().status === 'crashed' || !snap.val()) {
                    let hist = snap.val()?.history || [];
                    if (lastCrash) {
                        hist.unshift(parseFloat(lastCrash.toFixed(2)));
                        if(hist.length > 20) hist.pop();
                    }
                    
                    roomRef.update({
                        status: 'waiting',
                        waitingEndTime: getServerTime() + 10000, 
                        crashPoint: parseFloat(crash.toFixed(2)),
                        lastUpdate: getServerTime(),
                        history: hist
                    });
                    betsRef.remove(); 
                    resetMyBets();
                }
            });
        }

        function resetMyBets() {
            for(let i=1; i<=2; i++) {
                if(window.myBets[i].state === 'cashed_out' || window.myBets[i].state === 'lost') {
                    window.myBets[i].state = 'none';
                    window.myBets[i].amount = 0;
                }
                if(window.myBets[i].state === 'queued') {
                    window.myBets[i].state = 'bet_placed';
                    placeBetToFirebase(i, window.myBets[i].amount);
                }
            }
        }

        // ==========================================
        // МУЛЬТИПЛЕЄР СТАВКИ
        // ==========================================
        let allBets = {};
        betsRef.on('value', snap => {
            allBets = snap.val() || {};
            renderBetsList();
        });

        const avatarColors = ['#e53935', '#8e24aa', '#3949ab', '#039be5', '#00897b', '#fdd835', '#fb8c00', '#d81b60'];

        function renderBetsList() {
            const list = document.getElementById('bets-list');
            list.innerHTML = '';
            
            let totalAmount = 0;
            let totalCount = 0;

            Object.keys(allBets).sort((a,b) => allBets[b].win - allBets[a].win).forEach(key => {
                let bet = allBets[key];
                totalAmount += bet.amount;
                totalCount++;

                let isMe = bet.user === myName;
                let div = document.createElement('div');
                div.className = `bet-item ${bet.status === 'cashed_out' ? 'won' : ''} ${bet.status === 'lost' ? 'lost' : ''}`;
                
                let initial = bet.user.charAt(0).toUpperCase();
                let color = avatarColors[initial.charCodeAt(0) % avatarColors.length];

                div.innerHTML = `
                    <div class="bet-user">
                        <div class="avatar" style="background:${color}">${initial}</div>
                        ${isMe ? bet.user : bet.user.substring(0,3)+'***'}
                    </div>
                    <div class="bet-amount">${bet.amount.toFixed(2)}</div>
                    <div class="bet-multi">${bet.multi > 0 ? bet.multi.toFixed(2)+'x' : '-'}</div>
                    <div class="bet-win">${bet.win > 0 ? bet.win.toFixed(2) : ''}</div>
                `;
                list.appendChild(div);
            });

            document.getElementById('total-bets-count').innerText = totalCount;
            document.getElementById('total-bets-amount').innerText = totalAmount.toFixed(2);
        }

        function renderHistory(hist) {
            const bar = document.getElementById('history-bar');
            bar.innerHTML = '';
            hist.forEach(val => {
                let colorClass = val < 2 ? 'hist-blue' : (val < 10 ? 'hist-purple' : 'hist-pink');
                bar.innerHTML += `<div class="hist-bubble ${colorClass}">${val.toFixed(2)}x</div>`;
            });
        }

        // ==========================================
        // ЛОГІКА МОЇХ СТАВОК
        // ==========================================
        window.myBets = {
            1: { state: 'none', amount: 0, fbKey: null }, 
            2: { state: 'none', amount: 0, fbKey: null }
        };

        window.adjustBet = function(box, amount) {
            if (window.myBets[box].state !== 'none' && window.myBets[box].state !== 'lost' && window.myBets[box].state !== 'cashed_out') return;
            let input = document.getElementById(`input-${box}`);
            let val = parseInt(input.value) + amount;
            if (val < 10) val = 10;
            input.value = val;
            document.getElementById(`subtext-${box}`).innerText = val + ' 🪙';
        };

        window.setBet = function(box, amount) {
            if (window.myBets[box].state !== 'none' && window.myBets[box].state !== 'lost' && window.myBets[box].state !== 'cashed_out') return;
            document.getElementById(`input-${box}`).value = amount;
            document.getElementById(`subtext-${box}`).innerText = amount + ' 🪙';
        };

        async function placeBetToFirebase(box, amount) {
            await database.ref('users_by_name/' + myName).once('value').then(s => { 
                database.ref('users_by_name/' + myName).update({ chips: s.val().chips - amount }); 
            });
            let ref = betsRef.push();
            ref.set({ user: myName, amount: amount, status: 'playing', win: 0, multi: 0 });
            window.myBets[box].fbKey = ref.key;
        }

        window.handleAction = async function(box) {
            let betObj = window.myBets[box];
            let inputAmt = parseInt(document.getElementById(`input-${box}`).value);
            
            if (betObj.state === 'none') {
                if (inputAmt > currentBalance) return alert("Недостатньо фішок!");
                
                if (gameState === 'waiting') {
                    betObj.state = 'bet_placed';
                    betObj.amount = inputAmt;
                    placeBetToFirebase(box, inputAmt);
                } else {
                    betObj.state = 'queued';
                    betObj.amount = inputAmt;
                }
                
            } else if (betObj.state === 'bet_placed' || betObj.state === 'queued') {
                if (betObj.state === 'bet_placed') {
                    await database.ref('users_by_name/' + myName).once('value').then(s => { 
                        database.ref('users_by_name/' + myName).update({ chips: s.val().chips + betObj.amount }); 
                    });
                    if(betObj.fbKey) betsRef.child(betObj.fbKey).remove();
                }
                betObj.state = 'none';
                betObj.amount = 0;
                
            } else if (betObj.state === 'playing' && gameState === 'flying') {
                let winAmt = Math.floor(betObj.amount * currentMultiplier);
                await database.ref('users_by_name/' + myName).once('value').then(s => { 
                    database.ref('users_by_name/' + myName).update({ chips: s.val().chips + winAmt }); 
                });
                
                betObj.state = 'cashed_out';
                if(betObj.fbKey) {
                    betsRef.child(betObj.fbKey).update({ status: 'cashed_out', win: winAmt, multi: currentMultiplier });
                }
            }
        };

        // ==========================================
        // ІДЕАЛЬНИЙ 3D CANVAS & РЕНДЕР 60FPS
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const multiDisplay = document.getElementById('multiplier-display');
        const crashMsg = document.getElementById('crashed-msg');
        const loadingContainer = document.getElementById('loading-container');
        const loadingFill = document.getElementById('loading-fill');
        const gameScreen = document.getElementById('game-screen');

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function calculateMultiplier(ms) {
            return Math.max(1.00, Math.pow(Math.E, 0.06 * (ms / 1000)));
        }

        // Малюємо літак як об'єкт
        function drawPlane(ctx) {
            ctx.fillStyle = '#e5053a';
            ctx.beginPath();
            ctx.moveTo(35, 0); 
            ctx.lineTo(10, -5); 
            ctx.lineTo(-15, -20); 
            ctx.lineTo(-5, -5); 
            ctx.lineTo(-25, -10); 
            ctx.lineTo(-25, 10); 
            ctx.lineTo(-5, 5); 
            ctx.lineTo(-15, 20); 
            ctx.lineTo(10, 5); 
            ctx.closePath();
            ctx.fill();
            
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-20, -5); ctx.lineTo(-15, 5);
            ctx.moveTo(-15, -5); ctx.lineTo(-20, 5);
            ctx.stroke();
        }

        let crashedPlaneX = 0;
        let crashedPlaneY = 0;

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let now = getServerTime();

            // Оновлення UI
            if (gameState === 'waiting') {
                multiDisplay.style.display = "none";
                crashMsg.style.opacity = 0;
                loadingContainer.style.display = "flex";
                gameScreen.style.background = "#121414"; 
                
                let timeLeft = waitingEndTime - now;
                let pct = Math.max(0, Math.min(100, (timeLeft / 10000) * 100));
                loadingFill.style.width = pct + '%';

            } else if (gameState === 'flying') {
                multiDisplay.style.display = "block";
                multiDisplay.style.color = "white";
                
                let ms = Math.max(0, now - flightStartTime);
                currentMultiplier = calculateMultiplier(ms);
                
                if (currentMultiplier >= crashPoint) {
                    currentMultiplier = crashPoint;
                    if (!window.localCrashTriggered) triggerLocalCrash();
                }

                let text = currentMultiplier.toFixed(2).split('.');
                multiDisplay.innerHTML = `${text[0]}.${text[1]}<span style="font-size: 80px; line-height: 1;">x</span>`;
                
                crashMsg.style.opacity = 0;
                loadingContainer.style.display = "none";

            } else if (gameState === 'crashed') {
                multiDisplay.style.color = "#e5053a";
                let text = crashPoint.toFixed(2).split('.');
                multiDisplay.innerHTML = `${text[0]}.${text[1]}<span style="font-size: 80px; line-height: 1;">x</span>`;
                crashMsg.style.opacity = 1;
            }

            // Оновлення стану кнопок
            for (let i = 1; i <= 2; i++) {
                let btn = document.getElementById(`btn-${i}`);
                let input = document.getElementById(`input-${i}`);
                let state = window.myBets[i].state;

                if (state === 'bet_placed' && gameState === 'flying') window.myBets[i].state = 'playing';
                if (state === 'playing' && gameState === 'crashed') {
                    window.myBets[i].state = 'lost';
                    if(window.myBets[i].fbKey) betsRef.child(window.myBets[i].fbKey).update({ status: 'lost' });
                }
                state = window.myBets[i].state; 

                if (state === 'none') {
                    btn.className = "action-btn btn-bet";
                    btn.innerHTML = `СТАВКА<div class="btn-text-small" id="subtext-${i}">${input.value} 🪙</div>`;
                    btn.disabled = false;
                    input.disabled = false;
                } else if (state === 'queued') {
                    btn.className = "action-btn btn-cancel";
                    btn.innerHTML = `СКАСУВАТИ<div class="btn-text-small" style="font-size:10px;">Очікуємо на новий раунд</div>`;
                    btn.disabled = false;
                    input.disabled = true;
                } else if (state === 'bet_placed') {
                    btn.className = "action-btn btn-cancel";
                    btn.innerHTML = `СКАСУВАТИ<div class="btn-text-small">Очікування старту</div>`;
                    btn.disabled = false;
                    input.disabled = true;
                } else if (state === 'playing') {
                    btn.className = "action-btn btn-cashout";
                    let win = Math.floor(window.myBets[i].amount * currentMultiplier);
                    btn.innerHTML = `ЗАБРАТИ<div class="cashout-amount">${win} 🪙</div>`;
                    btn.disabled = false;
                    input.disabled = true;
                } else if (state === 'cashed_out') {
                    btn.className = "action-btn btn-disabled";
                    btn.innerHTML = "ЗАБРАВ";
                    btn.disabled = true;
                } else if (state === 'lost') {
                    btn.className = "action-btn btn-disabled";
                    btn.innerHTML = "ПРОГРАШ";
                    btn.disabled = true;
                }
            }

            // Малювання на Canvas
            if (gameState === 'flying' || gameState === 'crashed') {
                if (gameState === 'flying') {
                    crashedPlaneX = 0;
                    crashedPlaneY = 0;
                }

                let progress = Math.min(1, Math.log10(currentMultiplier) / 2.0); // До 100x плавно йде вгору
                
                let startX = 0;
                let startY = canvas.height;
                let endX = 80 + (canvas.width * 0.7) * progress;
                let endY = canvas.height - 80 - (canvas.height * 0.7) * progress;

                if (gameState === 'crashed') {
                    crashedPlaneX += 30; 
                    crashedPlaneY -= 15;
                    endX += crashedPlaneX;
                    endY += crashedPlaneY;
                }

                if (gameState === 'flying') {
                    if (currentMultiplier >= 10) gameScreen.style.background = "#2b0a1a";
                    else gameScreen.style.background = "#121414";

                    let gradient = ctx.createLinearGradient(0, endY, 0, canvas.height);
                    gradient.addColorStop(0, 'rgba(229, 5, 58, 0.4)');
                    gradient.addColorStop(1, 'rgba(229, 5, 58, 0.0)');

                    ctx.beginPath();
                    ctx.moveTo(startX, canvas.height);
                    ctx.lineTo(startX, startY);
                    ctx.quadraticCurveTo(startX + (endX - startX)*0.5, canvas.height, endX, endY);
                    ctx.lineTo(endX, canvas.height);
                    ctx.fillStyle = gradient;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.quadraticCurveTo(startX + (endX - startX)*0.5, canvas.height, endX, endY);
                    ctx.strokeStyle = '#e5053a';
                    ctx.lineWidth = 6;
                    ctx.lineCap = 'round';
                    ctx.shadowColor = '#e5053a';
                    ctx.shadowBlur = 15;
                    ctx.stroke();
                    ctx.shadowBlur = 0; 
                }

                ctx.save();
                ctx.translate(endX, endY);
                ctx.rotate(-Math.PI / 10); 
                drawPlane(ctx);
                ctx.restore();
            }

            requestAnimationFrame(drawGame);
        }
        
        // Старт циклу рендеру
        requestAnimationFrame(drawGame);

    </script>
</body>
</html>
