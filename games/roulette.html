        /* ФОН ТА ЦИФРИ (Виправлена геометрія) */
        .wheel-bg { width: 100%; height: 100%; border-radius: 50%; position: absolute; top: 0; left: 0; }
        .numbers-overlay { width: 100%; height: 100%; border-radius: 50%; position: absolute; top: 0; left: 0; }
        .wheel-number { position: absolute; width: 40px; height: 50%; left: calc(50% - 20px); bottom: 50%; transform-origin: bottom center; text-align: center; color: white; font-weight: bold; font-size: 16px; padding-top: 8px; box-sizing: border-box; text-shadow: 1px 1px 2px black;}
        
        /* ЦЕНТР КОЛЕСА */
        .wheel-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 75px; height: 75px; background: radial-gradient(circle at 30% 30%, var(--gold-light), var(--gold), #5a4611); border-radius: 50%; z-index: 10; border: 4px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.9), inset 0 -5px 15px rgba(0,0,0,0.6);}
        
        /* ШАРИК */
        .ball-track { position: absolute; top: 16px; left: 16px; right: 16px; bottom: 16px; border-radius: 50%; pointer-events: none; transition: transform 6s cubic-bezier(0.25, 0.1, 0.15, 1); z-index: 5;}
        .ball { position: absolute; top: -3px; left: 50%; transform: translateX(-50%); width: 15px; height: 15px; background: radial-gradient(circle at 30% 30%, #fff, #d4d4d4, #777); border-radius: 50%; box-shadow: -3px 4px 8px rgba(0,0,0,0.9); }

        /* ПРЕМІУМ СТІЛ (GTA Style) */

        .cell { display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; border: 1px solid rgba(255,255,255,0.4); cursor: pointer; position: relative; user-select: none; transition: 0.2s; text-shadow: 1px 1px 2px black;}
        .cell:hover { background-color: rgba(255,255,255,0.25); box-shadow: inset 0 0 15px rgba(255,255,255,0.9); z-index: 2;}

        /* РЕАЛІСТИЧНІ ФІШКИ */
        .chip-on-table { position: absolute; width: 28px; height: 28px; border-radius: 50%; font-size: 11px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; pointer-events: none; z-index: 10; box-shadow: 2px 4px 6px rgba(0,0,0,0.8); text-shadow: 1px 1px 1px black; border: 3px dashed rgba(255,255,255,0.9); background-color: var(--chip-color);}

        /* СЕЛЕКТОР ФІШОК */
        .chip-selector { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;}
        .chip { width: 55px; height: 55px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; transition: 0.3s; box-shadow: 0 6px 12px rgba(0,0,0,0.6); border: 4px dashed rgba(255,255,255,0.8); text-shadow: 1px 1px 2px black;}
        .chip.active { transform: translateY(-8px) scale(1.1); box-shadow: 0 15px 25px var(--gold); border-color: var(--gold); }
        .c-10 { background-color: #7f8c8d; }
        .c-50 { background-color: #2980b9; }
        .c-100 { background-color: #27ae60; }
        .c-500 { background-color: #8e44ad; }
        .c-1000 { background-color: #f39c12; }

        .btn-ready { padding: 18px; font-size: 16px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: 0.3s; background: linear-gradient(to bottom, var(--gold-light), var(--gold)); color: black; width: 100%; box-shadow: 0 5px 15px rgba(212,175,55,0.4); text-transform: uppercase; letter-spacing: 1px;}
        .btn-ready:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(212,175,55,0.6); }
        .btn-ready:disabled { background: #444; color: #777; cursor: not-allowed; box-shadow: none; transform: none;}

        /* СПИСОК ГРАВЦІВ */
        .players-list { list-style: none; padding: 0; margin: 0; }
        .players-list li { padding: 12px 15px; background: rgba(0,0,0,0.6); margin-bottom: 8px; border-radius: 6px; display: flex; align-items: center; border: 1px solid #222;}
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #c62828; margin-right: 15px; transition: 0.3s; box-shadow: 0 0 5px #c62828;}
        .status-dot.ready { background: #00ff9d; box-shadow: 0 0 15px #00ff9d;}
        
        /* ІСТОРІЯ (НОВЕ) */
        .history-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
        .history-item { padding: 10px 0; text-align: center; font-weight: bold; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); text-shadow: 1px 1px 2px black; font-size: 18px;}
        .history-item.red { background: #e62e2e; }

        .history-item.green { background: #00b347; }
        .history-item.won { border: 2px solid var(--gold); box-shadow: 0 0 15px var(--gold); transform: scale(1.05); } /* Підсвітка якщо виграв */
        .history-item.lost { opacity: 0.5; } /* Тускло якщо грав і програв */

        #status-text { font-size: 26px; font-weight: bold; color: var(--gold); min-height: 35px; text-align: center; width: 100%; text-shadow: 0 0 15px rgba(212,175,55,0.6); margin-bottom: 10px;}
        .payout-info { text-align: center; color: #777; font-size: 12px; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px;}
    </style>
</head>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC1HOC3_im8YiziljGqpR_0AvHLQctIfxQ",
            authDomain: "kurahivka-casino.firebaseapp.com",
            databaseURL: "https://kurahivka-casino-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "kurahivka-casino"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const username = localStorage.getItem('casino_user');
        if (!username) window.location.href = '../index.html';
        
        const urlParams = new URLSearchParams(window.location.search);
        const tableId = urlParams.get('table') || '1';
        document.getElementById('table-title').innerText = `VIP TABLE #${tableId}`;

        let currentBalance = 0;
        const userRef = database.ref('users_by_name/' + username.toLowerCase());
        
        userRef.on('value', snap => {
            const data = snap.val();
            if (data && data.in_casino === false) {
                document.getElementById('out-of-casino-overlay').style.display = 'flex';
                if (isReady) toggleReady(); 
            } else {
                document.getElementById('out-of-casino-overlay').style.display = 'none';
            }
            currentBalance = data ? (data.chips || 0) : 0;
            document.getElementById('balance-display').innerText = currentBalance;
        });

        // МУЛЬТИПЛЕЄР
        const tableRef = database.ref(`tables/table_${tableId}`);
        const myPlayerRef = tableRef.child('players/' + username.toLowerCase());
        
        myPlayerRef.set({ ready: false }); 
        myPlayerRef.onDisconnect().remove();

        let isReady = false;
        let isSpinningLocal = false;
        let localSpinId = null; 
        
        // Пам'ять моїх ігор для історії (spinId -> {won: boolean, played: boolean})
        let mySessionHistory = {}; 

        // Очищення завислих столів
        tableRef.once('value', snap => {
            const data = snap.val();
            if (!data || !data.players || Object.keys(data.players).length <= 1) {
                tableRef.update({ status: 'betting', result: null, currentRot: 0 });
            }
        });

        tableRef.on('value', snap => {
            const data = snap.val() || { status: 'betting', players: {}, currentRot: 0, history: [] };
            const players = data.players || {};
            
            // 1. Оновлення Гравців
            const ul = document.getElementById('players-ul');
            ul.innerHTML = '';
            let allReady = true;
            let playerCount = 0;

            for (const [name, info] of Object.entries(players)) {
                playerCount++;
                if (!info.ready) allReady = false;
                const dotClass = info.ready ? 'status-dot ready' : 'status-dot';
                ul.innerHTML += `<li><span class="${dotClass}"></span>${name.toUpperCase()}</li>`;
            }

            // 2. Оновлення Історії
            renderHistory(data.history || []);

            // 3. ЛОГІКА ХОСТА (Захист від подвійного спіну через isGenerating)
            if (allReady && playerCount > 0 && data.status === 'betting') {
                const sortedNames = Object.keys(players).sort();
                if (username.toLowerCase() === sortedNames[0].toLowerCase() && !window.isGenerating) {
                    window.isGenerating = true; // Блокуємо від повторного виклику
                    const resultIndex = Math.floor(Math.random() * 37);
                    const newTargetRot = (data.currentRot || 0) + (360 * 4) + Math.floor(Math.random() * 360);
                    
                    tableRef.update({ 
                        status: 'spinning', 
                        result: wheelOrder[resultIndex],
                        spinId: Date.now(), 
                        currentRot: newTargetRot
                    }).then(() => { window.isGenerating = false; });
                }
            }

            // 4. ЗАПУСК АНІМАЦІЇ 
            if (data.status === 'spinning' && data.spinId !== localSpinId) {
                localSpinId = data.spinId;
                playSpinAnimation(data.result, data.currentRot, data.spinId);
            }
        });

        function renderHistory(historyArray) {
            const container = document.getElementById('history-display');
            container.innerHTML = '';
            if(historyArray.length === 0) {
                container.innerHTML = '<div style="grid-column: span 5; text-align: center; color: #777; font-size: 14px;">Немає даних</div>';
                return;
            }

            historyArray.forEach(spin => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerText = spin.num;
                
                let colorClass = (spin.num === 0) ? 'green' : (redNumbers.includes(spin.num) ? 'red' : 'black');
                div.classList.add(colorClass);

                // Перевіряємо, чи грали ми в цей раунд і чи виграли
                if (mySessionHistory[spin.id]) {
                    if (mySessionHistory[spin.id].won) div.classList.add('won');
                    else div.classList.add('lost');
                }

                container.appendChild(div);
            });
        }

        function leaveTable() {
            myPlayerRef.remove().then(() => { window.location.href = '../index.html'; });
        }

        function toggleReady() {
            if (isSpinningLocal) return;

            isReady = !isReady;
            myPlayerRef.update({ ready: isReady });

            const btn = document.getElementById('ready-btn');
            if (isReady) {
                btn.innerText = "✅ ОЧІКУВАННЯ...";
                btn.style.background = "var(--green)";
                btn.style.color = "white";
                
                // СОЛО РЕЖИМ
                tableRef.once('value', snap => {
                    const data = snap.val() || {};
                    const players = data.players || {};
                    if (Object.keys(players).length === 1 && data.status === 'betting' && !window.isGenerating) {
                        window.isGenerating = true;
                        const resultIndex = Math.floor(Math.random() * 37);
                        const newTargetRot = (data.currentRot || 0) + (360 * 4) + Math.floor(Math.random() * 360);
                        tableRef.update({ 
                            status: 'spinning', result: wheelOrder[resultIndex], spinId: Date.now(), currentRot: newTargetRot
                        }).then(() => { window.isGenerating = false; });
                    }
                });
            } else {
                btn.innerText = "ПІДТВЕРДИТИ СТАВКУ";
                btn.style.background = "linear-gradient(to bottom, var(--gold-light), var(--gold))";
                btn.style.color = "black";
            }
        }

        // === ІДЕАЛЬНА ГЕОМЕТРІЯ КОЛЕСА ===
        const wheelOrder = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        const redNumbers = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
        const sliceAngle = 360 / 37;
        const offset = sliceAngle / 2; // Зсув для ідеального центрування

        let gradientParts = [];
        const overlay = document.getElementById('numbers-overlay');
        wheelOrder.forEach((num, index) => {
            let color = (num === 0) ? '#00b347' : (redNumbers.includes(num) ? '#e62e2e' : '#1a1a1a');
            let start = index * sliceAngle;
            let end = (index + 1) * sliceAngle;
            gradientParts.push(`${color} ${start}deg ${end}deg`);
            
            const numDiv = document.createElement('div');
            numDiv.className = 'wheel-number';
            numDiv.innerText = num;
            // Цифра ідеально по центру сектора
            numDiv.style.transform = `rotate(${index * sliceAngle}deg)`;
            overlay.appendChild(numDiv);
        });
        
        // Зсув фону назад на половину сектора
        document.getElementById('wheel-bg').style.background = `conic-gradient(from -${offset}deg, ${gradientParts.join(', ')})`;

        // Стіл
        const board = document.getElementById('betting-board');
        let col = 2;
        for (let i = 1; i <= 36; i += 3) {
            createCell(i + 2, 'row-1', col); createCell(i + 1, 'row-2', col); createCell(i, 'row-3', col); col++;
        }
        board.innerHTML += `<div class="bottom-bets"><div class="cell-red-bet" onclick="placeBet('red')">ЧЕРВОНЕ</div><div class="cell-black-bet" onclick="placeBet('black')">ЧОРНЕ</div></div>`;

        function createCell(num, rowClass, colNum) {
            const cell = document.createElement('div');
            cell.className = `cell ${rowClass}`;
            cell.style.background = redNumbers.includes(num) ? '#e62e2e' : '#1a1a1a';
            cell.style.gridColumn = colNum;
            cell.innerText = num;
            cell.onclick = () => placeBet(num.toString());
            board.appendChild(cell);
        }

        // === СТАВКИ ===
        let selectedChipValue = 10;
        let selectedChipColor = '#7f8c8d';
        let activeBets = {}; 
        let totalBetAmount = 0;

        function selectChip(value, el, color) {
            selectedChipValue = value;
            selectedChipColor = color;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function placeBet(target) {
            if (isReady || isSpinningLocal) return;
            if (totalBetAmount + selectedChipValue > currentBalance) return alert("Недостатньо фішок!");

            if (!activeBets[target]) activeBets[target] = 0;
            activeBets[target] += selectedChipValue;
            totalBetAmount += selectedChipValue;
            document.getElementById('current-bet-display').innerText = totalBetAmount;

            let tElem = (target === '0') ? document.querySelector('.cell-zero') : (target === 'red') ? document.querySelector('.cell-red-bet') : (target === 'black') ? document.querySelector('.cell-black-bet') : [...document.querySelectorAll('.cell')].find(c => c.innerText === target && !c.classList.contains('cell-zero'));
            if (tElem) {
                const chip = document.createElement('div');
                chip.className = 'chip-on-table chip-temp';
                chip.style.setProperty('--chip-color', selectedChipColor); // Для CSS змінних
                chip.innerText = activeBets[target] >= 1000 ? (activeBets[target]/1000).toFixed(1)+'k' : activeBets[target];
                chip.style.transform = `translate(${Math.random() * 8 - 4}px, ${Math.random() * 8 - 4}px)`;
                tElem.querySelectorAll('.chip-temp').forEach(c => c.remove());
                tElem.appendChild(chip);
            }
        }

        function clearBets() {
            if (isReady || isSpinningLocal) return;
            activeBets = {}; totalBetAmount = 0;
            document.getElementById('current-bet-display').innerText = 0;
            document.querySelectorAll('.chip-temp').forEach(c => c.remove());
        }

        // === ІДЕАЛЬНА СИНХРОННА АНІМАЦІЯ ===
        async function playSpinAnimation(winningNumber, targetRot, spinId) {
            isSpinningLocal = true;
            document.getElementById('status-text').innerText = "Ставки закриті. Кулька крутиться!";
            document.getElementById('status-text').style.color = "white";
            document.getElementById('ready-btn').disabled = true;

            const spinAudio = document.getElementById('sound-spin');
            if(spinAudio) spinAudio.play().catch(()=>{});

            if (totalBetAmount > 0) {
                await userRef.update({ chips: currentBalance - totalBetAmount });
            }

            // МАТЕМАТИКА АБСОЛЮТНОЇ ТОЧНОСТІ ШАРИКА
            const winningIndex = wheelOrder.indexOf(winningNumber);
            const targetAbsoluteAngle = targetRot + (winningIndex * sliceAngle);
            const ballTarget = targetAbsoluteAngle - (360 * 6); // Кулька крутиться назад

            document.getElementById('wheel').style.transform = `rotate(${targetRot}deg)`;
            const track = document.getElementById('ball-track');
            track.style.transform = `rotate(${ballTarget}deg) scale(0.85)`; 

            setTimeout(() => {
                track.style.transform = `rotate(${ballTarget}deg) scale(1)`; 
                setTimeout(() => evaluateLocalBets(winningNumber, spinId), 500);
            }, 5500);
        }

        async function evaluateLocalBets(winningNumber, spinId) {
            let winAmount = 0;
            const winningColor = (winningNumber === 0) ? 'green' : (redNumbers.includes(winningNumber) ? 'red' : 'black');

            // НЕРФ ШАНСІВ: Число x30, Колір x1.8
            for (const [target, amount] of Object.entries(activeBets)) {
                if (target === winningNumber.toString()) winAmount += amount * 30;
                else if (target === winningColor) winAmount += Math.floor(amount * 1.8);
            }

            // Запис в локальну пам'ять для історії
            if (totalBetAmount > 0) {
                mySessionHistory[spinId] = { played: true, won: (winAmount > 0) };
            }

            const statusText = document.getElementById('status-text');
            if (winAmount > 0) {
                statusText.innerHTML = `Випало: <span style="color:var(--${winningColor})">${winningNumber}</span>. Виграш: +${winAmount} 🪙`;
                statusText.style.color = "var(--neon)";
                document.getElementById('sound-win').play().catch(()=>{});
                await userRef.once('value').then(s => { userRef.update({ chips: s.val().chips + winAmount }); });
            } else if (totalBetAmount > 0) {
                statusText.innerHTML = `Випало: <span style="color:var(--${winningColor})">${winningNumber}</span>. Ставки згоріли.`;
                statusText.style.color = "var(--red)";
                document.getElementById('sound-lose').play().catch(()=>{});
            } else {
                statusText.innerHTML = `Випало: <span style="color:var(--${winningColor})">${winningNumber}</span>.`;
                statusText.style.color = "white";
            }

            setTimeout(() => {
                activeBets = {}; totalBetAmount = 0; document.getElementById('current-bet-display').innerText = 0;
                document.querySelectorAll('.chip-temp').forEach(c => c.remove());
                
                isSpinningLocal = false;
                isReady = false;
                
                const btn = document.getElementById('ready-btn');
                btn.disabled = false;
                btn.innerText = "ПІДТВЕРДИТИ СТАВКУ";
                btn.style.background = "linear-gradient(to bottom, var(--gold-light), var(--gold))";
                btn.style.color = "black";
                
                myPlayerRef.update({ ready: false });

                // Хост оновлює історію та переводить стіл назад в режим betting
                tableRef.once('value', s => {
                    const currentData = s.val() || {};
                    const p = currentData.players || {};
                    const sorted = Object.keys(p).sort();
                    if (username.toLowerCase() === sorted[0].toLowerCase()) {
                        let newHistory = currentData.history || [];
                        newHistory.unshift({ num: winningNumber, id: spinId });
                        if (newHistory.length > 10) newHistory.pop(); // Зберігаємо лише 10 останніх
                        
                        tableRef.update({ status: 'betting', result: null, history: newHistory });
                    }
                });
                
                statusText.innerText = "Очікування гравців...";
                statusText.style.color = "var(--gold)";
            }, 4000);
        }
    </script>
