<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Diamond Casino | The Dog House Premium</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --gold: #f5d76e; --gold-glow: rgba(245, 215, 110, 0.5);
            --neon-green: #00ff9d; --neon-red: #ff2a5f; --neon-blue: #00d4ff;
            --bg-dark: #0f1016; --glass-panel: rgba(20, 22, 30, 0.85);
        }
        
        * { box-sizing: border-box; }

        body { 
            margin: 0; padding: 0;
            background: radial-gradient(circle at 50% 0%, #2a1145 0%, var(--bg-dark) 80%); 
            color: white; font-family: 'Montserrat', 'Segoe UI', sans-serif; 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column;
        }

        /* --- ФОНОВІ ЕФЕКТИ --- */
        .ambient-light {
            position: absolute; top: -20%; left: 50%; transform: translateX(-50%);
            width: 80vw; height: 50vh; background: radial-gradient(ellipse, rgba(255, 42, 95, 0.15) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        /* --- НАВІГАЦІЯ --- */
        .nav-bar { 
            padding: 15px 40px; background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .back-btn { 
            background: rgba(255,255,255,0.05); color: #aaa; 
            border: 1px solid rgba(255,255,255,0.1); padding: 12px 30px; border-radius: 12px; 
            cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
            transition: all 0.3s;
        }
        .back-btn:hover { background: white; color: black; box-shadow: 0 0 20px rgba(255,255,255,0.3); }

        .balance-badge {
            font-size: 20px; font-weight: bold; background: rgba(0, 255, 157, 0.1); 
            padding: 10px 25px; border-radius: 15px; border: 1px solid rgba(0, 255, 157, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.1);
        }
        #balance-display { color: var(--neon-green); font-size: 26px; text-shadow: 0 0 15px var(--neon-green); margin-left: 8px; }

        /* --- ГОЛОВНИЙ ЛЕЙАУТ --- */
        .main-layout { display: flex; justify-content: center; align-items: center; flex: 1; padding: 20px; gap: 60px; z-index: 10; }

        /* --- СЛОТ-МАШИНА (Елітний вигляд) --- */
        .slot-wrapper { position: relative; filter: drop-shadow(0 40px 50px rgba(0,0,0,0.8)); }

        .slot-header {
            text-align: center; margin-bottom: 20px;
        }
        .slot-title {
            font-size: 65px; font-weight: 900; margin: 0;
            background: linear-gradient(to bottom, #ffffff, #a3a3a3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 8px;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
        }
        .slot-subtitle { color: var(--neon-red); font-size: 20px; letter-spacing: 12px; font-weight: bold; text-shadow: 0 0 10px var(--neon-red); text-transform: uppercase; }

        .slot-container {
            background: linear-gradient(145deg, #1e2029, #13141a);
            border: 2px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px;
            box-shadow: inset 0 0 50px rgba(0,0,0,1), 0 0 0 10px rgba(15, 16, 22, 0.8), 0 0 0 12px rgba(255, 255, 255, 0.1);
        }

        .slot-grid {
            display: grid; grid-template-columns: repeat(5, 140px); grid-template-rows: repeat(3, 130px);
            gap: 12px; background: #07080a; padding: 15px; border-radius: 12px;
            box-shadow: inset 0 20px 40px rgba(0,0,0,0.9);
        }

        /* БАРАБАНИ ТА СИМВОЛИ */
        .reel-item {
            background: linear-gradient(180deg, #1c1e26 0%, #111217 100%);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 10px 20px rgba(255,255,255,0.03), inset 0 -10px 20px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.6);
            position: relative; user-select: none; transition: filter 0.1s; overflow: hidden;
        }
        .reel-item.spinning-blur { filter: blur(4px); transform: translateY(8px); }

        .slot-icon { width: 75%; height: 75%; object-fit: contain; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.6)); z-index: 2; }

        /* КАРТИ */
        .card-symbol { font-family: 'Arial Black', sans-serif; font-size: 80px; font-weight: 900; z-index: 2; }
        .color-a { color: #ff2a5f; text-shadow: 0 0 20px rgba(255, 42, 95, 0.6), 0 5px 5px rgba(0,0,0,0.8); }
        .color-k { color: #f5d76e; text-shadow: 0 0 20px rgba(245, 215, 110, 0.6), 0 5px 5px rgba(0,0,0,0.8); }
        .color-q { color: #00ff9d; text-shadow: 0 0 20px rgba(0, 255, 157, 0.6), 0 5px 5px rgba(0,0,0,0.8); }
        .color-j { color: #00d4ff; text-shadow: 0 0 20px rgba(0, 212, 255, 0.6), 0 5px 5px rgba(0,0,0,0.8); }

        /* WILD (БУДКА) */
        .reel-item.sticky {
            background: linear-gradient(180deg, rgba(255, 42, 95, 0.2) 0%, #111217 100%);
            border: 2px solid var(--neon-red);
            box-shadow: 0 0 30px rgba(255, 42, 95, 0.3), inset 0 0 20px rgba(255, 42, 95, 0.2);
        }
        .wild-multiplier {
            position: absolute; bottom: 8px; right: 8px; background: var(--neon-red); color: white; 
            font-size: 24px; font-weight: 900; padding: 4px 12px; border-radius: 8px; 
            box-shadow: 0 5px 10px rgba(0,0,0,0.8); z-index: 5; font-family: 'Arial Black', sans-serif;
        }

        /* --- ПАНЕЛЬ УПРАВЛІННЯ --- */
        .control-panel {
            background: var(--glass-panel); backdrop-filter: blur(30px); border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.05); padding: 35px; width: 400px; 
            display: flex; flex-direction: column; gap: 25px; box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }
        
        .status-box { 
            background: rgba(0,0,0,0.4); padding: 20px; border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.02); text-align: center; box-shadow: inset 0 5px 15px rgba(0,0,0,0.5); 
        }
        #status-text { font-size: 22px; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;}

        .bet-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px;}
        .bet-btn { 
            background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); 
            width: 60px; height: 60px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 24px; 
            transition: 0.2s; 
        }
        .bet-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }
        .bet-btn:active { transform: scale(0.95); }

        .spin-btn { 
            padding: 25px; font-size: 28px; font-weight: 900; border: none; border-radius: 16px; 
            cursor: pointer; transition: 0.2s; background: var(--neon-green); color: #000; 
            box-shadow: 0 10px 30px rgba(0, 255, 157, 0.3); text-transform: uppercase; letter-spacing: 3px; 
        }
        .spin-btn:hover:not(:disabled) { box-shadow: 0 10px 40px rgba(0, 255, 157, 0.5); transform: translateY(-3px); }
        .spin-btn:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 5px 15px rgba(0, 255, 157, 0.3); }
        .spin-btn:disabled { background: #333; color: #666; box-shadow: none; cursor: not-allowed; }

        .buy-bonus-btn { 
            background: transparent; border: 2px solid var(--neon-red); color: var(--neon-red); 
            padding: 18px; border-radius: 16px; font-size: 20px; font-weight: bold; cursor: pointer; 
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .buy-bonus-btn:hover:not(:disabled) { background: var(--neon-red); color: white; box-shadow: 0 10px 30px rgba(255, 42, 95, 0.4); }
        .buy-bonus-btn:disabled { border-color: #444; color: #555; cursor: not-allowed; }

        /* --- КАСТОМНІ МОДАЛЬНІ ВІКНА --- */
        .custom-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 9999; opacity: 0; transition: opacity 0.3s ease; }
        .custom-modal-overlay.show { display: flex; opacity: 1; }
        .custom-modal { background: #15161c; border: 1px solid rgba(255,255,255,0.1); padding: 50px; border-radius: 24px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.8); transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); min-width: 450px; }
        .custom-modal-overlay.show .custom-modal { transform: scale(1); }
        .custom-modal h2 { margin: 0 0 20px 0; font-size: 36px; color: white; letter-spacing: 2px; }
        .custom-modal p { font-size: 20px; color: #aaa; margin-bottom: 40px; line-height: 1.6; }
        .modal-buttons { display: flex; justify-content: center; gap: 20px; }
        .modal-btn { padding: 16px 40px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .modal-btn.confirm { background: white; color: black; }
        .modal-btn.confirm:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.2); }
        .modal-btn.cancel { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .modal-btn.cancel:hover { background: rgba(255,255,255,0.05); }

        .bonus-active { color: var(--neon-red) !important; text-shadow: 0 0 20px var(--neon-red) !important; animation: bonusGlow 1s infinite alternate; }
        @keyframes bonusGlow { from { filter: brightness(1); } to { filter: brightness(1.3); transform: scale(1.02); } }
    </style>
</head>
<body>

    <div class="ambient-light"></div>

    <div class="nav-bar">
        <button class="back-btn" onclick="leaveGame()">Вихід</button>
        <div class="balance-badge">
            БАЛАНС <span id="balance-display">0</span>
        </div>
    </div>

    <div class="custom-modal-overlay" id="ui-modal">
        <div class="custom-modal">
            <h2 id="modal-title">TITLE</h2>
            <p id="modal-desc">Description</p>
            <div class="modal-buttons" id="modal-actions"></div>
        </div>
    </div>

    <div class="main-layout">
        
        <div class="slot-wrapper">
            <div class="slot-header">
                <h1 class="slot-title">The Dog House</h1>
                <div class="slot-subtitle">VIP Edition</div>
            </div>
            <div class="slot-container">
                <div class="slot-grid" id="slot-grid"></div>
            </div>
        </div>

        <div class="control-panel">
            <div class="status-box">
                <div id="status-text">Готовий до гри</div>
            </div>
            
            <div class="status-box">
                <div style="color: #aaa; font-size: 14px; font-weight: bold; letter-spacing: 2px;">ВАША СТАВКА</div>
                <div class="bet-controls">
                    <button class="bet-btn" onclick="changeBet(-10)">-</button>
                    <span id="current-bet" style="font-size: 38px; font-weight: 900; color: white;">10</span>
                    <button class="bet-btn" onclick="changeBet(10)">+</button>
                </div>
            </div>
            
            <button class="spin-btn" id="spin-btn" onclick="spin()">Spin</button>
            <button class="buy-bonus-btn" id="buy-bonus-btn" onclick="requestBonusBuy()">
                Купити Бонус <span id="bonus-cost-text" style="font-weight: normal; opacity: 0.7;">(1000)</span>
            </button>
        </div>
    </div>

    <script>
        // ==========================================
        // МОДАЛЬНІ ВІКНА
        // ==========================================
        function showModal(title, desc, isConfirm = false, onConfirm = null) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            const actionsBox = document.getElementById('modal-actions');
            actionsBox.innerHTML = '';

            if (isConfirm) {
                const btnConfirm = document.createElement('button');
                btnConfirm.className = 'modal-btn confirm'; btnConfirm.innerText = 'ТАК';
                btnConfirm.onclick = () => { closeModal(); if(onConfirm) onConfirm(); };
                
                const btnCancel = document.createElement('button');
                btnCancel.className = 'modal-btn cancel'; btnCancel.innerText = 'НІ';
                btnCancel.onclick = closeModal;

                actionsBox.appendChild(btnConfirm); actionsBox.appendChild(btnCancel);
            } else {
                const btnOk = document.createElement('button');
                btnOk.className = 'modal-btn confirm'; btnOk.innerText = 'ОК';
                btnOk.onclick = closeModal; actionsBox.appendChild(btnOk);
            }
            const overlay = document.getElementById('ui-modal');
            overlay.style.display = 'flex'; setTimeout(() => overlay.classList.add('show'), 10);
        }
        function closeModal() {
            const overlay = document.getElementById('ui-modal');
            overlay.classList.remove('show'); setTimeout(() => overlay.style.display = 'none', 300);
        }

        // ==========================================
        // FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyC1HOC3_im8YiziljGqpR_0AvHLQctIfxQ",
            authDomain: "kurahivka-casino.firebaseapp.com",
            databaseURL: "https://kurahivka-casino-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "kurahivka-casino"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const username = localStorage.getItem('casino_user');
        if (!username) window.location.href = '../index.html';

        let currentBalance = 0;
        const userRef = database.ref('users_by_name/' + username.toLowerCase());
        
        userRef.on('value', snap => {
            const data = snap.val();
            if (data && data.in_casino === false) {
                showModal("Доступ Заблоковано", "Ви покинули територію казино.", false, () => leaveGame());
            }
            currentBalance = data ? (data.chips || 0) : 0;
            document.getElementById('balance-display').innerText = currentBalance;
        });

        function leaveGame() { window.location.href = '../index.html'; }

        // ==========================================
        // ЛОГІКА СЛОТА ТА НАДІЙНІ СИМВОЛИ (Twemoji/SVG CDN)
        // ==========================================
        // Використовуємо наднадійний CDN Cloudflare для SVG (вони ніколи не ламаються)
        const standardSymbols = [
            '<img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f436.svg" class="slot-icon">', // Собака 1
            '<img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f429.svg" class="slot-icon">', // Пудель
            '<img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f43a.svg" class="slot-icon">', // Хаскі/Вовк
            '<img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f9b4.svg" class="slot-icon">', // Кістка
            '<img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f969.svg" class="slot-icon">', // М'ясо
            '<span class="card-symbol color-a">A</span>',
            '<span class="card-symbol color-k">K</span>',
            '<span class="card-symbol color-q">Q</span>',
            '<span class="card-symbol color-j">J</span>'
        ]; 
        const scatterSymbol = '<img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f43e.svg" class="slot-icon">'; // Лапа
        const wildSymbol = '<img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f3e0.svg" class="slot-icon">'; // Будка

        const gridElement = document.getElementById('slot-grid');
        let isSpinning = false; let isBonusGame = false;
        let freeSpinsLeft = 0; let stickyWilds = {}; 
        let currentBet = 10;

        function changeBet(amount) {
            if (isSpinning || isBonusGame) return;
            let newBet = currentBet + amount;
            if (newBet >= 10 && newBet <= 5000) {
                currentBet = newBet;
                document.getElementById('current-bet').innerText = currentBet;
                document.getElementById('bonus-cost-text').innerText = `(${currentBet * 100})`;
            }
        }

        function drawGrid(matrix, applyBlur = false) {
            gridElement.innerHTML = '';
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 5; c++) {
                    const div = document.createElement('div');
                    div.className = 'reel-item';
                    if (applyBlur) div.classList.add('spinning-blur');
                    
                    if (isBonusGame && stickyWilds[`${r}-${c}`]) {
                        div.innerHTML = `${wildSymbol}<div class="wild-multiplier">x${stickyWilds[`${r}-${c}`]}</div>`;
                        div.classList.add('sticky'); div.classList.remove('spinning-blur'); 
                    } else if (!applyBlur && matrix[r][c] === wildSymbol) {
                        let mult = Math.random() > 0.5 ? 2 : 3;
                        div.innerHTML = `${wildSymbol}<div class="wild-multiplier">x${mult}</div>`;
                        div.classList.add('sticky');
                    } else {
                        div.innerHTML = matrix[r][c] || '';
                    }
                    gridElement.appendChild(div);
                }
            }
        }
        drawGrid([[],[],[]]); 

        function generateRandomMatrix(forceScatters = false) {
            let matrix = [];
            for (let r = 0; r < 3; r++) {
                let row = [];
                for (let c = 0; c < 5; c++) {
                    if (forceScatters && r === 1 && (c === 0 || c === 2 || c === 4)) {
                        row.push(scatterSymbol); continue;
                    }
                    let isScatterReel = (c === 0 || c === 2 || c === 4);
                    if (!isBonusGame && !forceScatters && isScatterReel && Math.random() < 0.05) {
                        row.push(scatterSymbol);
                    } else {
                        if ((c === 1 || c === 2 || c === 3) && Math.random() < 0.12) {
                            row.push(wildSymbol);
                        } else {
                            row.push(standardSymbols[Math.floor(Math.random() * standardSymbols.length)]);
                        }
                    }
                }
                matrix.push(row);
            }
            return matrix;
        }

        function requestBonusBuy() {
            const cost = currentBet * 100;
            if (isSpinning || isBonusGame) return;
            if (currentBalance < cost) {
                showModal("Помилка", `Недостатньо фішок!\nПотрібно: ${cost}\nВаш баланс: ${currentBalance}`); return;
            }
            showModal("Купівля Бонусу", `Списати ${cost} фішок для запуску бонусної гри?`, true, () => executeBonusBuy(cost));
        }

        async function executeBonusBuy(cost) {
            isSpinning = true; lockButtons(true);
            await userRef.update({ chips: currentBalance - cost });
            setStatus("АКТИВАЦІЯ БОНУСУ...", "white");
            runSpinAnimation(true);
        }

        async function spin() {
            if (isSpinning) return;
            if (!isBonusGame && currentBalance < currentBet) {
                showModal("Помилка", "Недостатньо фішок для ставки!"); return;
            }
            isSpinning = true; lockButtons(true);
            setStatus("КРУТИМО...", "white");

            if (!isBonusGame) await userRef.update({ chips: currentBalance - currentBet });
            else freeSpinsLeft--;

            runSpinAnimation(false);
        }

        function runSpinAnimation(forceScatters) {
            let spinsCount = 0;
            let spinInterval = setInterval(() => {
                drawGrid(generateRandomMatrix(), true); 
                spinsCount++;
                if (spinsCount > 12) { clearInterval(spinInterval); finalizeSpin(forceScatters); }
            }, 80);
        }

        async function finalizeSpin(forceScatters) {
            let finalMatrix = generateRandomMatrix(forceScatters);
            let scatterCount = 0;

            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 5; c++) {
                    if (isBonusGame && !stickyWilds[`${r}-${c}`] && finalMatrix[r][c] === wildSymbol && (c === 1 || c === 2 || c === 3)) {
                        stickyWilds[`${r}-${c}`] = Math.random() > 0.5 ? 2 : 3; 
                    }
                    if (finalMatrix[r][c] === scatterSymbol) scatterCount++;
                }
            }
            drawGrid(finalMatrix, false);
            await checkWin(finalMatrix, scatterCount);
        }

        async function checkWin(matrix, scatterCount) {
            let winAmount = 0;

            for (let r = 0; r < 3; r++) {
                if (matrix[r][0] === matrix[r][1] || matrix[r][1] === wildSymbol) {
                    if(Math.random() > 0.5) {
                        let lineWin = currentBet * (Math.floor(Math.random() * 5) + 1);
                        let multiplier = 1;
                        for(let c = 1; c <= 3; c++) if(stickyWilds[`${r}-${c}`]) multiplier += stickyWilds[`${r}-${c}`];
                        winAmount += (lineWin * (multiplier > 1 ? multiplier : 1));
                    }
                }
            }

            if (winAmount > 0) {
                setStatus(`ВИГРАШ: +${winAmount}`, "var(--neon-green)");
                await userRef.once('value').then(s => { userRef.update({ chips: s.val().chips + winAmount }); });
            } else if (!isBonusGame) {
                setStatus("НЕ ПОЩАСТИЛО", "#666");
            }

            setTimeout(() => {
                if (!isBonusGame && scatterCount >= 3) startBonusGame();
                else if (isBonusGame && freeSpinsLeft <= 0) endBonusGame();
                else if (isBonusGame && freeSpinsLeft > 0) {
                    setStatus(`ФРІСПІНИ: ${freeSpinsLeft}`, "var(--neon-red)", true);
                    document.getElementById('spin-btn').disabled = false; isSpinning = false;
                } else resetControls();
            }, 800);
        }

        function startBonusGame() {
            isBonusGame = true; freeSpinsLeft = Math.floor(Math.random() * 10) + 9; stickyWilds = {}; 
            setStatus(`🔥 БОНУСКА: ${freeSpinsLeft} 🔥`, "var(--neon-red)", true);
            showModal("БОНУСНА ГРА", `🐾 Ви спіймали Скатери!\nБезкоштовних обертань: ${freeSpinsLeft}.\nВсі будки тепер залипають!`);
            isSpinning = false; document.getElementById('spin-btn').disabled = false;
        }

        function endBonusGame() {
            showModal("БОНУС ЗАВЕРШЕНО", "Усі безкоштовні обертання використані.");
            isBonusGame = false; stickyWilds = {}; resetControls();
        }

        function resetControls() {
            isSpinning = false; lockButtons(false); setStatus("ГОТОВИЙ ДО ГРИ", "#888", false);
        }

        function lockButtons(lock) {
            document.getElementById('spin-btn').disabled = lock; document.getElementById('buy-bonus-btn').disabled = lock;
            document.querySelectorAll('.bet-btn').forEach(btn => btn.disabled = lock);
        }

        function setStatus(text, color, isBonus = false) {
            const st = document.getElementById('status-text');
            st.innerText = text; st.style.color = color;
            if(isBonus) st.classList.add('bonus-active'); else st.classList.remove('bonus-active');
        }
    </script>
</body>
</html>
