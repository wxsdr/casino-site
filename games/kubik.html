    <style>
        * {
            margin: 0;

            user-select: none;
        }
        
        body {
            background: radial-gradient(ellipse at 30% 40%, #0d1117 0%, #05080f 100%);

        .top-bar {
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 25px;
            background: rgba(8, 12, 20, 0.95);

            border-bottom: 1px solid rgba(255, 215, 0, 0.25);
        }
        
        .btn-exit {
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 800;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-exit:hover {
            background: #ff4433;
            border-color: #ff4433;
        }
        
        .balance-badge {
            font-size: 18px;
            font-weight: 900;
            background: rgba(0, 255, 157, 0.1);
            padding: 8px 25px;
            border-radius: 40px;

        }
        .balance-badge span {
            color: #00ff88;
            font-size: 24px;
            margin-left: 8px;
        }

        #game-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            position: relative;
        }

        .game-table {
            background: linear-gradient(145deg, #0a5a3a, #064a2a);
            border-radius: 50px;
            border: 3px solid #d4af37;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            padding: 25px 35px;
            width: 950px;
            max-width: 95vw;
            height: auto;
            min-height: 580px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .table-neon {
            position: absolute;
            inset: -3px;
            border-radius: 52px;
            z-index: -1;
            filter: blur(15px);
            opacity: 0.4;
            background: linear-gradient(45deg, #d4af37, #00ff88, #00f2ff);
            animation: tableGlow 3s infinite alternate;
        }
        
        @keyframes tableGlow {
            0% { opacity: 0.2; filter: blur(12px); }
            100% { opacity: 0.5; filter: blur(20px); }
        }

        .table-title {
            text-align: center;
            margin-bottom: 15px;
        }
        .table-title h1 {
            font-family: 'Rubik', sans-serif;
            font-size: 24px;
            background: linear-gradient(135deg, #d4af37, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .table-title p {
            font-size: 10px;
            color: rgba(255, 215, 0, 0.5);
            margin-top: 4px;
        }

        .dice-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        
        .dice-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
        }
        
        .dice {
            font-size: 80px;
            filter: drop-shadow(0 8px 15px rgba(0, 0, 0, 0.3));
        }
        
        .dice.rolling {
            animation: diceRoll 0.1s infinite;
        }
        
        @keyframes diceRoll {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.1); }
            50% { transform: rotate(180deg) scale(1.2); }
            75% { transform: rotate(270deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }

        .sum-display {
            font-size: 24px;
            font-weight: 900;
            color: #d4af37;
            text-align: center;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
            min-height: 45px;
        }
        
        .bet-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 15px;
        }
        
        .bet-option {
            background: linear-gradient(135deg, #1a1a2a, #0f0f1a);

        .result-area {

            padding: 10px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 40px;
            backdrop-filter: blur(10px);

            display: flex;
            align-items: center;
            justify-content: center;

        .result-text {
            font-size: 18px;
            font-weight: 900;
        }
        
        .result-win { color: #00ff88; }
        .result-lose { color: #ff4433; }

        .bet-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 50px;
            margin-top: 10px;
        }
        
        .bet-label {
            color: #d4af37;
            font-weight: 800;
            font-size: 13px;
        }
        
        .chip-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #d4af37, #aa8833);
            border: 2px solid #ffd700;
            color: #1a1a2a;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
        }
        .chip-btn:active { transform: scale(0.95); }
        
        .bet-input {
            background: #0a0e18;
            color: #d4af37;
            border: 2px solid #d4af37;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 900;
            text-align: center;
            width: 100px;
            height: 40px;
            outline: none;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 12px;
        }
        
        .action-btn {
            background: linear-gradient(135deg, #1a1a2a, #0f0f1a);
            border: 2px solid #d4af37;
            color: #d4af37;
            border-radius: 40px;
            padding: 10px 30px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
        }
        .action-btn:hover:not(:disabled) {
            background: #d4af37;
            color: #0a0e18;
            transform: scale(1.02);
        }
        .action-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .action-btn.primary {
            background: linear-gradient(135deg, #00ff88, #00aa55);
            border-color: #00ff88;
            color: #0a1a0a;
        }

        .history-panel {
            position: absolute;
            right: -240px;
            top: 50%;
            transform: translateY(-50%);
            width: 220px;
            background: rgba(8, 12, 20, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            border-left: 3px solid #00ff88;
            padding: 12px;
            pointer-events: auto;
        }
        .history-panel h4 {
            color: #00ff88;
            font-size: 12px;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 2px;
        }
        .history-list {
            max-height: 350px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .history-list div {
            padding: 5px 8px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            border-left: 2px solid;
            font-size: 10px;
            font-weight: 600;
        }
        .history-list .win { color: #00ff88; border-left-color: #00ff88; }
        .history-list .lose { color: #ff4433; border-left-color: #ff4433; }
        .history-list .big-win { color: #ffd700; border-left-color: #ffd700; font-weight: 900; background: rgba(255, 215, 0, 0.1); }
        .history-list .push { color: #d4af37; border-left-color: #d4af37; }
        
        @media (max-width: 1200px) {
            .history-panel {
                position: static;
                transform: none;
                width: 100%;
                margin-top: 15px;
                order: 1;
            }
            .game-table {
                width: 90vw;
                padding: 20px;
            }
            .dice {
                font-size: 60px;
            }
            .bet-option {
                min-width: 75px;
                padding: 6px 12px;
                font-size: 11px;
            }
            .result-text {
                font-size: 14px;
            }
            .action-btn {
                padding: 8px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="top-bar">

    <script>
        // ========== ЗВУКИ ==========
        let audioContext = null;
        let diceAudio = null;
        
        // Функція для ініціалізації аудіо
        function initAudio() {
            if (diceAudio) return;
            // Звук кидання кубиків з файлу dice.mp3
            diceAudio = new Audio('dice.mp3');
            diceAudio.volume = 0.5;
        }
        
        // Звук кидання кубиків (з файлу)
        function playDiceSound() {
            try {
                initAudio();
                if (diceAudio) {
                    diceAudio.currentTime = 0;
                    diceAudio.play().catch(e => console.log('Audio play error:', e));
                }
            } catch(e) { console.log('Audio error:', e); }
        }
        
        // Звук виграшу (синтезований)
        function playWinSound() {
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') audioContext.resume();
                const now = audioContext.currentTime;
                const notes = [523.25, 659.25, 783.99];
                notes.forEach((freq, i) => {
                    const osc = audioContext.createOscillator();
                    const g = audioContext.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    g.gain.value = 0.07;
                    osc.connect(g);
                    g.connect(audioContext.destination);
                    osc.start();
                    osc.stop(now + 0.15 + i * 0.12);
                    g.gain.exponentialRampToValueAtTime(0.00001, now + 0.18 + i * 0.12);
                });
            } catch(e) {}
        }
        
        // Звук програшу (синтезований)
        function playLoseSound() {
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') audioContext.resume();
                const now = audioContext.currentTime;
                const osc = audioContext.createOscillator();
                const g = audioContext.createGain();
                osc.type = 'sine';
                osc.frequency.value = 440;
                g.gain.value = 0.06;
                osc.connect(g);
                g.connect(audioContext.destination);
                osc.start();
                osc.stop(now + 0.25);
                g.gain.exponentialRampToValueAtTime(0.00001, now + 0.25);
            } catch(e) {}
        }
        
        // Звук великого виграшу (синтезований)
        function playBigWinSound() {
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') audioContext.resume();
                const now = audioContext.currentTime;
                const notes = [523.25, 659.25, 783.99, 1046.50];
                notes.forEach((freq, i) => {
                    const osc = audioContext.createOscillator();
                    const g = audioContext.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    g.gain.value = 0.08;
                    osc.connect(g);
                    g.connect(audioContext.destination);
                    osc.start();
                    osc.stop(now + 0.1 + i * 0.1);
                    g.gain.exponentialRampToValueAtTime(0.00001, now + 0.15 + i * 0.1);
                });
            } catch(e) {}
        }

        // Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyC1HOC3_im8YiziljGqpR_0AvHLQctIfxQ",
            authDomain: "kurahivka-casino.firebaseapp.com",
            databaseURL: "https://kurahivka-casino-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "kurahivka-casino"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const username = localStorage.getItem('casino_user');
        const userRef = database.ref('users_by_name/' + (username ? username.toLowerCase() : 'guest'));
        
        let currentBalance = 0;
        let currentBet = 10;
        let selectedBet = null;
        let isRolling = false;
        
        const betInput = document.getElementById('bet-input');
        const dice1El = document.getElementById('dice1');
        const dice2El = document.getElementById('dice2');
        const sumDisplay = document.getElementById('sum-display');
        const resultText = document.getElementById('result-text');
        const rollBtn = document.getElementById('roll-btn');
        const betOptions = document.querySelectorAll('.bet-option');
        
        const diceEmojis = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        
        function updateBalanceDisplay() {
            document.getElementById('balance-amount').innerText = currentBalance;
        }
        
        userRef.on('value', snap => {
            const data = snap.val();
            currentBalance = data ? (data.chips || 1000) : 1000;
            updateBalanceDisplay();
        });
        
        function updateBetUI() { betInput.value = currentBet; }
        
        function updateBet(delta) {
            if (isRolling) return;
            let newVal = currentBet + delta;
            if (newVal >= 10 && newVal <= Math.min(50000, currentBalance)) {
                currentBet = newVal;
                updateBetUI();
            }
        }
        
        function manualBetChange() {
            if (isRolling) return;
            let val = parseInt(betInput.value);
            if (isNaN(val)) val = 10;
            if (val < 10) val = 10;
            if (val > 50000) val = 50000;
            if (val > currentBalance) val = currentBalance;
            currentBet = val;
            updateBetUI();
        }
        
        function addToHistory(message, type = 'win') {
            const historyDiv = document.getElementById('history-list');
            if (historyDiv.children.length === 1 && historyDiv.children[0].innerText.includes('немає записів')) {
                historyDiv.innerHTML = '';
            }
            const newEntry = document.createElement('div');
            newEntry.className = type;
            const time = new Date().toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            newEntry.innerHTML = `[${time}] ${message}`;
            historyDiv.prepend(newEntry);
            while (historyDiv.children.length > 20) historyDiv.removeChild(historyDiv.lastChild);
        }
        
        function selectBet(betType) {
            if (isRolling) return;
            selectedBet = betType;
            betOptions.forEach(option => {
                if (option.dataset.bet === betType) {
                    option.classList.add('selected');
                } else {
                    option.classList.remove('selected');
                }
            });
        }
        
        function getBetMultiplier(betType) {
            switch(betType) {
                case 'even': return 2;
                case 'odd': return 2;
                case 'over6': return 2;
                case 'under6': return 2;
                case 'exact6': return 5;
                default: return 1;
            }
        }
        
        function checkWin(betType, sum) {
            switch(betType) {
                case 'even': return sum % 2 === 0;
                case 'odd': return sum % 2 === 1;
                case 'over6': return sum > 6;
                case 'under6': return sum < 6;
                case 'exact6': return sum === 6;
                default: return false;
            }
        }
        
        function getBetName(betType) {
            const names = {
                'even': 'ПАРНЕ',
                'odd': 'НЕПАРНЕ',
                'over6': 'БІЛЬШЕ 6',
                'under6': 'МЕНШЕ 6',
                'exact6': 'РІВНО 6'
            };
            return names[betType] || betType;
        }
        
        function showResult(message, type) {
            resultText.style.opacity = '1';
            resultText.className = `result-text result-${type}`;
            resultText.innerHTML = message;
        }
        
        function clearResult() {
            resultText.style.opacity = '0';
            resultText.innerHTML = '&nbsp;';
        }
        
        async function animateDice(finalValue1, finalValue2) {
            return new Promise((resolve) => {
                let rolls = 0;
                const maxRolls = 12;
                const interval = setInterval(() => {
                    const random1 = Math.floor(Math.random() * 6);
                    const random2 = Math.floor(Math.random() * 6);
                    dice1El.innerHTML = diceEmojis[random1];
                    dice2El.innerHTML = diceEmojis[random2];
                    dice1El.classList.add('rolling');
                    dice2El.classList.add('rolling');
                    rolls++;
                    
                    if (rolls >= maxRolls) {
                        clearInterval(interval);
                        setTimeout(() => {
                            dice1El.classList.remove('rolling');
                            dice2El.classList.remove('rolling');
                            dice1El.innerHTML = diceEmojis[finalValue1 - 1];
                            dice2El.innerHTML = diceEmojis[finalValue2 - 1];
                            resolve();
                        }, 100);
                    }
                }, 60);
            });
        }
        
        async function updateBalance(changeAmount) {
            const snap = await userRef.once('value');
            const currentData = snap.val();
            const freshBalance = currentData ? (currentData.chips || 1000) : 1000;
            const newBalance = freshBalance + changeAmount;
            await userRef.update({ chips: newBalance });
            currentBalance = newBalance;
            updateBalanceDisplay();
            return newBalance;
        }
        
        async function rollDice() {
            if (isRolling) return;
            if (selectedBet === null) {
                showResult('❌ ОБЕРІТЬ СТАВКУ!', 'lose');
                playLoseSound();
                return;
            }
            if (currentBet > currentBalance) {
                showResult(`❌ НЕДОСТАТНЬО КОШТІВ! ПОТРІБНО ${currentBet}, Є ${currentBalance}`, 'lose');
                playLoseSound();
                return;
            }
            
            isRolling = true;
            rollBtn.disabled = true;
            betOptions.forEach(opt => opt.style.pointerEvents = 'none');
            
            clearResult();
            sumDisplay.innerHTML = '';
            
            await updateBalance(-currentBet);
            
            const dice1 = Math.floor(Math.random() * 6) + 1;
            const dice2 = Math.floor(Math.random() * 6) + 1;
            const sum = dice1 + dice2;
            
            // Звук кидання кубиків з файлу dice.mp3
            playDiceSound();
            
            await animateDice(dice1, dice2);
            
            sumDisplay.innerHTML = `СУМА: ${sum}`;
            
            const isWin = checkWin(selectedBet, sum);
            const multiplier = getBetMultiplier(selectedBet);
            const betName = getBetName(selectedBet);
            
            let winAmount = 0;
            let resultMessage = '';
            let resultType = '';
            
            if (isWin) {
                winAmount = currentBet * multiplier;
                resultType = 'win';
                resultMessage = `🎉 ВИГРАШ! ${betName} - СУМА ${sum}! ВИ ВИГРАЛИ ${winAmount} 🪙`;
                await updateBalance(winAmount);
                await saveGameResult("Кубики", currentBet, winAmount - currentBet);
                addToHistory(`🎲 +${winAmount} 🪙 (${betName}, сума ${sum}, ставка ${currentBet})`, 
                            winAmount >= currentBet * 8 ? 'big-win' : 'win');
                if (winAmount >= currentBet * 8) {
                    playBigWinSound();
                } else {
                    playWinSound();
                }
            } else if (selectedBet === 'exact6' && sum !== 6) {
                resultType = 'lose';
                resultMessage = `😔 НЕ ВГАДАЛИ! СУМА ${sum}, А ВИ СТАВИЛИ НА РІВНО 6. ВИ ПРОГРАЛИ ${currentBet} 🪙`;
                addToHistory(`🎲 -${currentBet} 🪙 (РІВНО 6, випало ${sum})`, 'lose');
                playLoseSound();
                await saveGameResult("Кубики", currentBet, -currentBet);
            } else if (selectedBet === 'over6' && sum <= 6) {
                if (sum === 6) {
                    resultType = 'push';
                    resultMessage = `🤝 НІЧИЯ! СУМА 6, СТАВКУ ПОВЕРНЕНО ${currentBet} 🪙`;
                    await updateBalance(currentBet);
                    addToHistory(`🔄 +${currentBet} 🪙 (НІЧИЯ, сума 6)`, 'push');
                    playWinSound();
                    await saveGameResult("Кубики", currentBet, -currentBet);
                } else {
                    resultType = 'lose';
                    resultMessage = `😔 ВИПАЛО ${sum}. ВИ ПРОГРАЛИ ${currentBet} 🪙`;
                    addToHistory(`🎲 -${currentBet} 🪙 (БІЛЬШЕ 6, випало ${sum})`, 'lose');
                    playLoseSound();
                    await saveGameResult("Кубики", currentBet, -currentBet);
                }
            } else if (selectedBet === 'under6' && sum >= 6) {
                if (sum === 6) {
                    resultType = 'push';
                    resultMessage = `🤝 НІЧИЯ! СУМА 6, СТАВКУ ПОВЕРНЕНО ${currentBet} 🪙`;
                    await updateBalance(currentBet);
                    addToHistory(`🔄 +${currentBet} 🪙 (НІЧИЯ, сума 6)`, 'push');
                    playWinSound();
                    await saveGameResult("Кубики", currentBet, -currentBet);
                } else {
                    resultType = 'lose';
                    resultMessage = `😔 ВИПАЛО ${sum}. ВИ ПРОГРАЛИ ${currentBet} 🪙`;
                    addToHistory(`🎲 -${currentBet} 🪙 (МЕНШЕ 6, випало ${sum})`, 'lose');
                    playLoseSound();
                    await saveGameResult("Кубики", currentBet, -currentBet);
                }
            } else if (selectedBet === 'even' && sum % 2 === 1) {
                resultType = 'lose';
                resultMessage = `😔 ВИПАЛО ${sum} (НЕПАРНЕ). ВИ ПРОГРАЛИ ${currentBet} 🪙`;
                addToHistory(`🎲 -${currentBet} 🪙 (ПАРНЕ, випало ${sum})`, 'lose');
                playLoseSound();
                await saveGameResult("Кубики", currentBet, -currentBet);
            } else if (selectedBet === 'odd' && sum % 2 === 0) {
                resultType = 'lose';
                resultMessage = `😔 ВИПАЛО ${sum} (ПАРНЕ). ВИ ПРОГРАЛИ ${currentBet} 🪙`;
                addToHistory(`🎲 -${currentBet} 🪙 (НЕПАРНЕ, випало ${sum})`, 'lose');
                playLoseSound();
                await saveGameResult("Кубики", currentBet, -currentBet);
            }
            
            showResult(resultMessage, resultType);
            
            isRolling = false;
            rollBtn.disabled = false;
            betOptions.forEach(opt => opt.style.pointerEvents = 'auto');
        }
        
        document.getElementById('bet-minus').onclick = () => updateBet(-10);
        document.getElementById('bet-plus').onclick = () => updateBet(10);
        betInput.onchange = manualBetChange;
        rollBtn.onclick = rollDice;
        
        betOptions.forEach(option => {
            option.onclick = () => selectBet(option.dataset.bet);
        });
        
        updateBetUI();
        
        // Ініціалізація аудіо контексту при першому кліку
        document.body.addEventListener('click', () => {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }, { once: true });

        async function saveGameResult(gameName, bet, profit) {
    const username = localStorage.getItem('casino_user');
    if (!username) return;
    const timestamp = firebase.database.ServerValue.TIMESTAMP;
    await database.ref('users_by_name/' + username.toLowerCase() + '/game_history').push({
        game: gameName,
        bet: parseFloat(bet),
        profit: parseFloat(profit),
        ts: timestamp
    });
    await database.ref('users_by_name/' + username.toLowerCase() + '/total_games')
        .set(firebase.database.ServerValue.increment(1));
}
    </script>
