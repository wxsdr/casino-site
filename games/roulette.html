    ╚══════════════════════════════════════════════════════════════════════╝
    -->
    <script>

    // 🔊 НАЛАШТУВАННЯ ЗВУКІВ — ЗМІНЮЙ ЦЕЙ БЛОК
    // ══════════════════════════════════════════════════════
    const SOUND_CONFIG = {
        // Обертання кола (довгий звук — грає під час спіну)
        spin:       null,  // 'https://raw.githubusercontent.com/USER/REPO/main/sounds/spin.mp3'

        // Виграш
        win:        null,  // 'https://raw.githubusercontent.com/USER/REPO/main/sounds/win.mp3'

        // Програш / Ставки згоріли
        lose:       null,  // 'https://raw.githubusercontent.com/USER/REPO/main/sounds/lose.mp3'

        // Розміщення фішки на столі
        chipPlace:  null,  // 'https://raw.githubusercontent.com/USER/REPO/main/sounds/chip.mp3'

        // Очищення ставок
        chipClear:  null,  // 'https://raw.githubusercontent.com/USER/REPO/main/sounds/chip_clear.mp3'

    };
    // ══════════════════════════════════════════════════════

    // ─── ЗВУКОВИЙ РУШІЙ ─────────────────────────────────
    const SoundEngine = (() => {
        let ctx = null;
        const cache = {};
        let spinNode = null;
        let spinGain = null;
        let masterVolume = 0.7;

        function getCtx() {
            if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
            return ctx;
        }

        // Завантажити і закешувати MP3
        async function loadBuffer(url) {
            if (cache[url]) return cache[url];
            try {
                const res = await fetch(url);
                const arr = await res.arrayBuffer();
                const buf = await getCtx().decodeAudioData(arr);
                cache[url] = buf;
                return buf;
            } catch(e) {
                console.warn('[SoundEngine] Не вдалося завантажити:', url, e);
                return null;
            }
        }

        // Програти буфер один раз
        async function playBuffer(url, options = {}) {
            if (!url) return null;
            const ac = getCtx();
            const buf = await loadBuffer(url);
            if (!buf) return null;
            const src = ac.createBufferSource();
            src.buffer = buf;
            src.loop = options.loop || false;
            if (options.playbackRate) src.playbackRate.value = options.playbackRate;
            const gain = ac.createGain();
            gain.gain.value = (options.volume ?? 1.0) * masterVolume;
            src.connect(gain);
            gain.connect(ac.destination);
            src.start(options.when ?? ac.currentTime);
            return { src, gain };
        }

        // ── СИНТЕТИЧНІ (РЕЗЕРВНІ) ЗВУКИ ─────────────────

        function synthSpin() {
            const ac = getCtx();
            spinGain = ac.createGain();
            spinGain.gain.value = 0.18 * masterVolume;
            spinGain.connect(ac.destination);

            // Шум обертання: filtered white noise
            const bufLen = ac.sampleRate * 0.5;
            const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1);
            const noise = ac.createBufferSource();
            noise.buffer = buf;
            noise.loop = true;
            const filter = ac.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 900;
            filter.Q.value = 0.8;
            noise.connect(filter);
            filter.connect(spinGain);
            noise.start();
            spinNode = noise;
        }

        function synthBallTick(pitch = 1) {
            const ac = getCtx();
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1400 * pitch, ac.currentTime);
            osc.frequency.exponentialRampToValueAtTime(700 * pitch, ac.currentTime + 0.05);
            gain.gain.setValueAtTime(0.25 * masterVolume, ac.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.06);
            osc.connect(gain);
            gain.connect(ac.destination);
            osc.start();
            osc.stop(ac.currentTime + 0.07);
        }

        function synthBallDrop() {
            const ac = getCtx();
            // Тук + реверберація
            for (let i = 0; i < 3; i++) {
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                const delay = i * 0.07;
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800 - i * 120, ac.currentTime + delay);
                osc.frequency.exponentialRampToValueAtTime(200, ac.currentTime + delay + 0.15);
                gain.gain.setValueAtTime(0.3 * masterVolume * (1 - i * 0.25), ac.currentTime + delay);
                gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + 0.18);
                osc.connect(gain);
                gain.connect(ac.destination);
                osc.start(ac.currentTime + delay);
                osc.stop(ac.currentTime + delay + 0.2);
            }
        }

        function synthWin() {
            const ac = getCtx();
            const notes = [523, 659, 784, 1047];
            notes.forEach((freq, i) => {
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                const t = ac.currentTime + i * 0.12;
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.3 * masterVolume, t + 0.04);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
                osc.connect(gain);
                gain.connect(ac.destination);
                osc.start(t);
                osc.stop(t + 0.55);
            });
        }

        function synthLose() {
            const ac = getCtx();
            const notes = [400, 320, 260];
            notes.forEach((freq, i) => {
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                const t = ac.currentTime + i * 0.15;
                osc.type = 'sawtooth';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.2 * masterVolume, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
                osc.connect(gain);
                gain.connect(ac.destination);
                osc.start(t);
                osc.stop(t + 0.38);
            });
        }

        function synthChip() {
            const ac = getCtx();
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(1800, ac.currentTime);
            osc.frequency.exponentialRampToValueAtTime(900, ac.currentTime + 0.04);
            gain.gain.setValueAtTime(0.15 * masterVolume, ac.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.06);
            osc.connect(gain);
            gain.connect(ac.destination);
            osc.start();
            osc.stop(ac.currentTime + 0.07);
        }

        function synthChipClear() {
            const ac = getCtx();
            for (let i = 0; i < 4; i++) {
                setTimeout(() => synthChip(), i * 40);
            }
        }

        function synthReady() {
            const ac = getCtx();
            [600, 900].forEach((freq, i) => {
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                const t = ac.currentTime + i * 0.1;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.18 * masterVolume, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                osc.connect(gain);
                gain.connect(ac.destination);
                osc.start(t);
                osc.stop(t + 0.18);
            });
        }

        // ── ПУБЛІЧНИЙ API ────────────────────────────────
        return {
            play: async function(name, options = {}) {
                try { getCtx().resume(); } catch(e) {}
                const url = SOUND_CONFIG[name];

                if (name === 'spin') {
                    if (url) await playBuffer(url, { loop: true, volume: 0.4, ...options });
                    else synthSpin();
                    return;
                }
                if (name === 'ballTick') {
                    if (url) await playBuffer(url, { volume: 0.6, ...options });
                    else synthBallTick(options.pitch || 1);
                    return;
                }
                if (name === 'ballDrop') {
                    if (url) await playBuffer(url, { volume: 0.8, ...options });
                    else synthBallDrop();
                    return;
                }
                if (name === 'win') {
                    if (url) await playBuffer(url, options);
                    else synthWin();
                    return;
                }
                if (name === 'lose') {
                    if (url) await playBuffer(url, options);
                    else synthLose();
                    return;
                }
                if (name === 'chipPlace') {
                    if (url) await playBuffer(url, { volume: 0.5, ...options });
                    else synthChip();
                    return;
                }
                if (name === 'chipClear') {
                    if (url) await playBuffer(url, options);
                    else synthChipClear();
                    return;
                }
                if (name === 'btnReady') {
                    if (url) await playBuffer(url, options);
                    else synthReady();
                    return;
                }
            },

            stopSpin: function() {
                if (spinNode) {
                    try {
                        if (spinGain) {
                            const ac = getCtx();
                            spinGain.gain.linearRampToValueAtTime(0, ac.currentTime + 0.5);
                        }
                        spinNode.stop(getCtx().currentTime + 0.5);
                    } catch(e) {}
                    spinNode = null; spinGain = null;
                }
            },

            setVolume: function(v) { masterVolume = Math.max(0, Math.min(1, v)); }
        };
    })();

        const tableId = urlParams.get('table') || '1';
        document.getElementById('table-title').innerText = `ROULETTE TABLE #${tableId}`;

        let currentBalance = 0;
        const userRef = database.ref('users_by_name/' + username.toLowerCase());
        
        userRef.on('value', snap => {
            const data = snap.val();
            if (data && data.in_casino === false) {
                document.getElementById('out-of-casino-overlay').style.display = 'flex';
                if (isReady) toggleReady(); 
            } else document.getElementById('out-of-casino-overlay').style.display = 'none';
            currentBalance = data ? (data.chips || 0) : 0;
            document.getElementById('balance-display').innerText = currentBalance;
        });

        const tableRef = database.ref(`tables/table_${tableId}`);
        const myPlayerRef = tableRef.child('players/' + username.toLowerCase());
        myPlayerRef.set({ ready: false }); 
        myPlayerRef.onDisconnect().remove();

        let isReady = false;
        let isSpinningLocal = false;
        let localSpinId = null; 
        let mySessionHistory = {}; 

        tableRef.once('value', snap => {
            const data = snap.val();
            if (!data || !data.players || Object.keys(data.players).length <= 1) {
                tableRef.update({ status: 'betting', result: null, currentRot: 0 });
            }
        });

        tableRef.on('value', snap => {
            const data = snap.val() || { status: 'betting', players: {}, history: [] };
            const players = data.players || {};
            
            const ul = document.getElementById('players-ul');
            ul.innerHTML = '';
            let allReady = true; let playerCount = 0;
            for (const [name, info] of Object.entries(players)) {
                playerCount++;
                if (!info.ready) allReady = false;
                const dotClass = info.ready ? 'status-dot ready' : 'status-dot';
                ul.innerHTML += `<li><span class="${dotClass}"></span>${name.toUpperCase()}</li>`;
            }

            renderHistory(data.history || []);

            if (allReady && playerCount > 0 && data.status === 'betting') {
                const sortedNames = Object.keys(players).sort();
                if (username.toLowerCase() === sortedNames[0].toLowerCase() && !window.isGenerating) {
                    window.isGenerating = true; 
                    const resultIndex = Math.floor(Math.random() * 37);
                    const newTargetRot = (data.currentRot || 0) + (Math.PI * 2 * 4) + Math.random() * Math.PI * 2;
                    tableRef.update({ 
                        status: 'spinning', result: wheelOrder[resultIndex],
                        spinId: Date.now(), currentRot: newTargetRot
                    }).then(() => { window.isGenerating = false; });
                }
            }

            if (data.status === 'spinning' && data.spinId !== localSpinId) {
                localSpinId = data.spinId;
                playSpinAnimation(data.result, data.currentRot, data.spinId);
            }
        });

        function renderHistory(historyArray) {
            const container = document.getElementById('history-display');
            container.innerHTML = '';
            if(historyArray.length === 0) return container.innerHTML = '<div style="color: #777;">Немає даних</div>';
            
            historyArray.forEach(spin => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerText = spin.num;
                div.classList.add((spin.num === 0) ? 'green' : (redNumbers.includes(spin.num) ? 'red' : 'black'));
                if (mySessionHistory[spin.id]) div.classList.add(mySessionHistory[spin.id].won ? 'won' : 'lost');
                container.appendChild(div);
            });
        }

        function leaveTable() { myPlayerRef.remove().then(() => { window.location.href = '../index.html'; }); }

        function toggleReady() {
            if (isSpinningLocal) return;
            isReady = !isReady;
            myPlayerRef.update({ ready: isReady });
            SoundEngine.play('btnReady');

            const btn = document.getElementById('ready-btn');
            if (isReady) {
                btn.innerText = "ОЧІКУВАННЯ...";
                btn.style.background = "var(--green)";
                btn.style.color = "white";
                
                tableRef.once('value', snap => {
                    const data = snap.val() || {};
                    const players = data.players || {};
                    if (Object.keys(players).length === 1 && data.status === 'betting' && !window.isGenerating) {
                        window.isGenerating = true;
                        const resultIndex = Math.floor(Math.random() * 37);
                        const newTargetRot = (data.currentRot || 0) + (Math.PI * 2 * 4) + Math.random() * Math.PI * 2;
                        tableRef.update({ status: 'spinning', result: wheelOrder[resultIndex], spinId: Date.now(), currentRot: newTargetRot })
                            .then(() => { window.isGenerating = false; });
                    }
                });
            } else {
                btn.innerText = "ПІДТВЕРДИТИ";
                btn.style.background = "linear-gradient(to bottom, var(--gold), #997a00)";
                btn.style.color = "black";
            }
        }

        // ==========================================
        // ІГРОВИЙ СТІЛ (Генерація копії фото)
        // ==========================================
        const wheelOrder = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        const redNumbers = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
        
        const board = document.getElementById('betting-board');
        
        // 0
        board.innerHTML += `<div class="b-cell cell-zero" onclick="placeBet('0')">0</div>`;
        
        // Числа 1-36
        for(let r=1; r<=3; r++) {
            let col = 2;
            for(let i = (4-r); i<=36; i+=3) {
                let colorClass = redNumbers.includes(i) ? 'bg-red' : 'bg-black';
                board.innerHTML += `<div class="b-cell" style="grid-row: ${r}; grid-column: ${col};" onclick="placeBet('${i}')">
                                        <div class="num-pill ${colorClass}">${i}</div>
                                    </div>`;
                col++;
            }
        }

        // Колонки 2to1
        board.innerHTML += `<div class="b-cell cell-col" style="grid-row: 1; grid-column: 14;" onclick="placeBet('col3')">2 to 1</div>`;
        board.innerHTML += `<div class="b-cell cell-col" style="grid-row: 2; grid-column: 14;" onclick="placeBet('col2')">2 to 1</div>`;
        board.innerHTML += `<div class="b-cell cell-col" style="grid-row: 3; grid-column: 14;" onclick="placeBet('col1')">2 to 1</div>`;

        // Дюжини
        board.innerHTML += `<div class="b-cell cell-doz" style="grid-column: 2 / span 4;" onclick="placeBet('doz1')">1st 12</div>`;
        board.innerHTML += `<div class="b-cell cell-doz" style="grid-column: 6 / span 4;" onclick="placeBet('doz2')">2nd 12</div>`;
        board.innerHTML += `<div class="b-cell cell-doz" style="grid-column: 10 / span 4;" onclick="placeBet('doz3')">3rd 12</div>`;

        // Нижні ставки
        board.innerHTML += `<div class="b-cell cell-bot" style="grid-column: 2 / span 2;" onclick="placeBet('low')">1-18</div>`;
        board.innerHTML += `<div class="b-cell cell-bot" style="grid-column: 4 / span 2;" onclick="placeBet('even')">Even</div>`;
        board.innerHTML += `<div class="b-cell cell-bot" style="grid-column: 6 / span 2;" onclick="placeBet('black')"><span class="diamond black">♦</span></div>`;
        board.innerHTML += `<div class="b-cell cell-bot" style="grid-column: 8 / span 2;" onclick="placeBet('red')"><span class="diamond red">♦</span></div>`;
        board.innerHTML += `<div class="b-cell cell-bot" style="grid-column: 10 / span 2;" onclick="placeBet('odd')">Odd</div>`;
        board.innerHTML += `<div class="b-cell cell-bot" style="grid-column: 12 / span 2;" onclick="placeBet('high')">19 to 36</div>`;

        let selectedChipValue = 10; let selectedChipColor = '#555';
        let activeBets = {}; let totalBetAmount = 0;

        function selectChip(value, el, color) {
            selectedChipValue = value; selectedChipColor = color;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function placeBet(target) {
            if (isReady || isSpinningLocal) return;
            if (totalBetAmount + selectedChipValue > currentBalance) return alert("Недостатньо фішок!");
            if (!activeBets[target]) activeBets[target] = 0;
            activeBets[target] += selectedChipValue;
            totalBetAmount += selectedChipValue;
            document.getElementById('current-bet-display').innerText = totalBetAmount;
            SoundEngine.play('chipPlace');

            let tElem = document.querySelector(`[onclick="placeBet('${target}')"]`);
            if (tElem) {
                const chip = document.createElement('div');
                chip.className = 'chip-on-table chip-temp';
                chip.style.setProperty('--chip-color', selectedChipColor); 
                chip.innerText = activeBets[target] >= 1000 ? (activeBets[target]/1000).toFixed(1)+'k' : activeBets[target];
                chip.style.transform = `translate(${Math.random() * 8 - 4}px, ${Math.random() * 8 - 4}px)`;
                tElem.querySelectorAll('.chip-temp').forEach(c => c.remove());
                tElem.appendChild(chip);
            }
        }

        function clearBets() {
            if (isReady || isSpinningLocal) return;
            activeBets = {}; totalBetAmount = 0; document.getElementById('current-bet-display').innerText = 0;
            document.querySelectorAll('.chip-temp').forEach(c => c.remove());
            SoundEngine.play('chipClear');
        }

        // ==========================================
        // CANVAS ДВИЖОК (МЕТАЛЕВЕ КОЛЕСО)
        // ==========================================
        const canvas = document.getElementById('rouletteCanvas');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = 400 * dpr;
        canvas.height = 400 * dpr;
        ctx.scale(dpr, dpr);
        
        const cx = 200; const cy = 200; const wheelRadius = 150;
        const sliceAngle = (Math.PI * 2) / 37;

        let currentWheelRot = 0;
        let currentBallRot = 0;
        let currentBallRadius = 125; 

        function drawAll() {
            ctx.clearRect(0, 0, 400, 400);

            // МЕТАЛЕВИЙ ОБОДОК
            ctx.beginPath();
            ctx.arc(cx, cy, 195, 0, Math.PI*2);
            let rimGrad = ctx.createRadialGradient(cx, cy, 150, cx, cy, 195);
            rimGrad.addColorStop(0, '#111');
            rimGrad.addColorStop(0.5, '#444');
            rimGrad.addColorStop(1, '#222');
            ctx.fillStyle = rimGrad; ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = '#555'; ctx.stroke();

            // ДІАМАНТИ НА ОБОДКУ
            for(let i=0; i<8; i++) {
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate((Math.PI*2/8) * i);
                ctx.fillStyle = '#ccc';
                ctx.beginPath();
                ctx.moveTo(0, -175); ctx.lineTo(4, -170); ctx.lineTo(0, -165); ctx.lineTo(-4, -170); ctx.fill();
                ctx.restore();
            }

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(currentWheelRot - Math.PI/2); 

            // СЕКТОРИ
            for(let i=0; i<37; i++) {
                let num = wheelOrder[i];
                let color = (num === 0) ? '#008000' : (redNumbers.includes(num) ? '#c62828' : '#111');
                
                ctx.beginPath();
                ctx.moveTo(0,0);
                ctx.arc(0, 0, wheelRadius, i * sliceAngle, (i+1) * sliceAngle);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.lineWidth = 1; ctx.strokeStyle = '#fff'; ctx.stroke();

                ctx.save();
                ctx.rotate(i * sliceAngle + sliceAngle/2);
                ctx.translate(wheelRadius - 15, 0);
                ctx.rotate(Math.PI/2);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(num.toString(), 0, 0);
                ctx.restore();
            }

            // МЕТАЛЕВИЙ ЦЕНТР
            ctx.beginPath();
            ctx.arc(0, 0, 70, 0, Math.PI*2);
            let grad = ctx.createRadialGradient(0,0,0, 0,0,70);
            grad.addColorStop(0, '#fff');
            grad.addColorStop(0.2, '#aaa');
            grad.addColorStop(0.6, '#333');
            grad.addColorStop(1, '#111');
            ctx.fillStyle = grad; ctx.fill();
            ctx.restore();

            // ШАРИК
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(currentBallRot - Math.PI/2);
            ctx.beginPath();
            ctx.arc(currentBallRadius, 0, 6, 0, Math.PI*2);
            let ballGrad = ctx.createRadialGradient(currentBallRadius-2, -2, 2, currentBallRadius, 0, 6);
            ballGrad.addColorStop(0, '#ffffff'); ballGrad.addColorStop(1, '#999999');
            ctx.fillStyle = ballGrad;
            ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 4; ctx.shadowOffsetX = -2; ctx.shadowOffsetY = 2;
            ctx.fill();
            ctx.restore();
        }
        drawAll(); 

        let animationStart = null;
        let initialWheelRot = 0; let targetWheelRot = 0;
        let initialBallRot = 0; let targetBallRot = 0;

        async function playSpinAnimation(winningNumber, firebaseRot, spinId) {
            isSpinningLocal = true;
            document.getElementById('status-text').innerText = "ШАРИК ЛЕТИТЬ...";
            document.getElementById('ready-btn').disabled = true;

            SoundEngine.play('spin');
            if (totalBetAmount > 0) await userRef.update({ chips: currentBalance - totalBetAmount });

            initialWheelRot = currentWheelRot;
            initialBallRot = currentBallRot;
            targetWheelRot = firebaseRot; 
            
            const winningIndex = wheelOrder.indexOf(winningNumber);
            const targetSectorWorldAngle = targetWheelRot + (winningIndex + 0.5) * sliceAngle;

            let normalizedTarget = targetSectorWorldAngle % (Math.PI * 2);
            if(normalizedTarget < 0) normalizedTarget += Math.PI*2;
            let k = Math.floor((initialBallRot - normalizedTarget) / (Math.PI * 2)) + 6;
            targetBallRot = normalizedTarget - (k * Math.PI * 2);

            animationStart = null;
            requestAnimationFrame((ts) => animateSpin(ts, winningNumber, spinId));
        }

        let _lastTickProgress = 0;
        let _tickCount = 0;

        function animateSpin(timestamp, winningNumber, spinId) {
            if (!animationStart) {
                animationStart = timestamp;
                _lastTickProgress = 0;
                _tickCount = 0;
            }
            let progress = (timestamp - animationStart) / 6000; 
            if (progress > 1) progress = 1;

            // Кількість тіків зменшується з прогресом (шарик сповільнюється)
            const tickInterval = 0.02 + progress * 0.07;
            if (progress - _lastTickProgress >= tickInterval && progress < 0.88) {
                _lastTickProgress = progress;
                _tickCount++;
                // Підвищений тон на початку, нижній в кінці
                SoundEngine.play('ballTick', { pitch: 1.3 - progress * 0.5 });
            }

            let easeWheel = 1 - Math.pow(1 - progress, 3);
            currentWheelRot = initialWheelRot + (targetWheelRot - initialWheelRot) * easeWheel;

            let easeBall = 1 - Math.pow(1 - progress, 4);
            currentBallRot = initialBallRot + (targetBallRot - initialBallRot) * easeBall;

            if (progress > 0.75) currentBallRot += Math.sin((progress - 0.75) * 40) * 0.04 * (1 - progress);

            if (progress < 0.8) currentBallRadius = 175; 
            else {
                let dropProgress = (progress - 0.8) / 0.2;
                currentBallRadius = 175 - (50 * dropProgress) + Math.abs(Math.cos(dropProgress * Math.PI * 3)) * (1 - dropProgress) * 10;

                // Звук падіння шарика в момент приземлення
                if (dropProgress >= 0.95 && !SoundEngine._dropPlayed) {
                    SoundEngine._dropPlayed = true;
                    SoundEngine.stopSpin();
                    SoundEngine.play('ballDrop');
                }
            }

            drawAll();

            if (progress < 1) requestAnimationFrame((ts) => animateSpin(ts, winningNumber, spinId));
            else {
                SoundEngine._dropPlayed = false;
                SoundEngine.stopSpin();
                setTimeout(() => evaluateLocalBets(winningNumber, spinId), 500);
            }
        }

        async function evaluateLocalBets(winningNumber, spinId) {
            let winAmount = 0;
            const isRed = redNumbers.includes(winningNumber);
            const isBlack = winningNumber !== 0 && !isRed;
            
            for (const [target, amount] of Object.entries(activeBets)) {
                let m = 0;
                if (target === winningNumber.toString()) m = 36;
                else if (target === 'red' && isRed) m = 2;
                else if (target === 'black' && isBlack) m = 2;
                else if (target === 'even' && winningNumber !== 0 && winningNumber % 2 === 0) m = 2;
                else if (target === 'odd' && winningNumber !== 0 && winningNumber % 2 !== 0) m = 2;
                else if (target === 'low' && winningNumber >= 1 && winningNumber <= 18) m = 2;
                else if (target === 'high' && winningNumber >= 19 && winningNumber <= 36) m = 2;
                else if (target === 'doz1' && winningNumber >= 1 && winningNumber <= 12) m = 3;
                else if (target === 'doz2' && winningNumber >= 13 && winningNumber <= 24) m = 3;
                else if (target === 'doz3' && winningNumber >= 25 && winningNumber <= 36) m = 3;
                else if (target === 'col1' && winningNumber !== 0 && winningNumber % 3 === 1) m = 3;
                else if (target === 'col2' && winningNumber !== 0 && winningNumber % 3 === 2) m = 3;
                else if (target === 'col3' && winningNumber !== 0 && winningNumber % 3 === 0) m = 3;
                
                winAmount += amount * m;
            }

            if (totalBetAmount > 0) mySessionHistory[spinId] = { played: true, won: (winAmount > 0) };

            const statusText = document.getElementById('status-text');
            if (winAmount > 0) {
                statusText.innerHTML = `ВИПАЛО: ${winningNumber}. ВИГРАШ: +${winAmount} 🪙`;
                SoundEngine.play('win');
                await userRef.once('value').then(s => { userRef.update({ chips: s.val().chips + winAmount }); });
            } else if (totalBetAmount > 0) {
                statusText.innerHTML = `ВИПАЛО: ${winningNumber}. СТАВКИ ЗГОРІЛИ.`;
                SoundEngine.play('lose');
            } else {
                statusText.innerHTML = `ВИПАЛО: ${winningNumber}.`;
            }

            setTimeout(() => {
                activeBets = {}; totalBetAmount = 0; document.getElementById('current-bet-display').innerText = 0;
                document.querySelectorAll('.chip-temp').forEach(c => c.remove());
                
                isSpinningLocal = false; isReady = false;
                const btn = document.getElementById('ready-btn');
                btn.disabled = false; btn.innerText = "ПІДТВЕРДИТИ";
                btn.style.background = "linear-gradient(to bottom, var(--gold), #997a00)";
                myPlayerRef.update({ ready: false });

                tableRef.once('value', s => {
                    const data = s.val() || {};
                    const sorted = Object.keys(data.players || {}).sort();
                    if (username.toLowerCase() === sorted[0].toLowerCase()) {
                        let newHistory = data.history || [];
                        newHistory.unshift({ num: winningNumber, id: spinId });
                        if (newHistory.length > 15) newHistory.pop();
                        tableRef.update({ status: 'betting', result: null, history: newHistory });
                    }
                });
                
                statusText.innerText = "ОЧІКУВАННЯ СТАВОК...";
            }, 4000);
        }
    </script>
