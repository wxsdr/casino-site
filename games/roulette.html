<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Рулетка | Kurahivka RP</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --table-bg: #076324; --wood: #3e2312; --gold: #d4af37;
            --red: #d32f2f; --black: #111; --green: #2e7d32; --neon: #00ff9d;
        }
        body { margin: 0; background: #0a0a0c; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        .nav-bar { padding: 15px 30px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-between; border-bottom: 2px solid var(--gold); align-items: center;}
        .back-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 8px 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; font-weight: bold;}
        .back-btn:hover { background: var(--gold); color: black; }
        
        /* Виправлений лейаут */
        .main-layout { display: flex; flex-wrap: wrap; justify-content: center; max-width: 1300px; margin: 0 auto; padding: 30px 20px; gap: 50px; }
        .left-panel { display: flex; flex-direction: column; align-items: center; gap: 20px; min-width: 400px;}
        .right-panel { width: 320px; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 10px; border: 1px solid #333; height: fit-content;}

        /* КОЛЕСО (Ідеально рівне) */
        .wheel-wrapper { position: relative; width: 350px; height: 350px; padding: 20px; background: var(--wood); border-radius: 50%; box-shadow: 0 10px 20px rgba(0,0,0,0.8); border: 5px solid var(--gold); }
        .wheel { width: 100%; height: 100%; border-radius: 50%; position: absolute; transition: transform 6s cubic-bezier(0.25, 0.1, 0.15, 1); }
        
        /* Обертаємо фон і цифри разом, щоб нуль був ідеально по центру зверху */
        .wheel-bg, .numbers-overlay { width: 100%; height: 100%; border-radius: 50%; position: absolute; transform: rotate(-4.864deg); }
        .numbers-overlay { top: 0; left: 0; }
        
        .wheel-number { position: absolute; width: 40px; height: 50%; left: calc(50% - 20px); bottom: 50%; transform-origin: bottom center; text-align: center; color: white; font-weight: bold; font-size: 14px; padding-top: 5px; box-sizing: border-box;}
        .wheel-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: radial-gradient(circle, #ffd700, #b8860b); border-radius: 50%; z-index: 10; border: 3px solid #fff; }
        
        /* Кулька */
        .ball-track { position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px; border-radius: 50%; pointer-events: none; transition: transform 6s cubic-bezier(0.25, 0.1, 0.15, 1); z-index: 5;}
        .ball { position: absolute; top: 2px; left: 50%; transform: translateX(-50%); width: 12px; height: 12px; background: white; border-radius: 50%; box-shadow: -2px 2px 5px rgba(0,0,0,0.8); }

        /* ІГРОВИЙ СТІЛ */
        .table-wrapper { background: var(--wood); padding: 15px; border-radius: 15px; border: 3px solid var(--gold); width: fit-content;}
        .betting-board { display: grid; grid-template-columns: 70px repeat(12, 45px); grid-template-rows: repeat(3, 45px) 40px; background: var(--table-bg); gap: 2px; border: 2px solid white; padding: 2px; }
        .cell { display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; border: 1px solid rgba(255,255,255,0.5); cursor: pointer; position: relative; user-select: none; transition: 0.2s;}
        .cell:hover { opacity: 0.8; box-shadow: inset 0 0 10px white; z-index: 2;}
        .cell-zero { grid-row: 1 / 4; grid-column: 1; background: var(--green); }
        .row-1 { grid-row: 1; } .row-2 { grid-row: 2; } .row-3 { grid-row: 3; }
        .bottom-bets { grid-row: 4; grid-column: 2 / 14; display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
        .cell-red-bet { background: var(--red); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold;}
        .cell-black-bet { background: var(--black); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold;}
        
        .chip-on-table { position: absolute; width: 22px; height: 22px; background: radial-gradient(circle, #fff 30%, #2980b9 40%); border-radius: 50%; border: 2px solid white; font-size: 10px; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; pointer-events: none; z-index: 10;}

        /* КЕРУВАННЯ */
        .controls { display: flex; flex-direction: column; gap: 20px; align-items: center; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 10px; width: 100%; box-sizing: border-box;}
        .chip-selector { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;}
        .chip { width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; color: black; border: 2px dashed white; transition: 0.3s; background: #ecf0f1;}
        .chip.active { transform: scale(1.1); box-shadow: 0 0 15px var(--gold); border: 3px solid var(--gold); }
        .c-50 { background: #3498db; color: white;} .c-100 { background: #2ecc71; } .c-500 { background: #9b59b6; color: white;} .c-1000 { background: #f1c40f; }

        .btn-ready { padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; background: var(--gold); color: black; width: 100%;}
        .btn-ready:hover { transform: scale(1.02); }
        .btn-ready:disabled { background: #555; color: #888; cursor: not-allowed; }

        /* СПИСОК ГРАВЦІВ */
        .players-list { list-style: none; padding: 0; margin: 0; }
        .players-list li { padding: 10px; background: rgba(255,255,255,0.05); margin-bottom: 5px; border-radius: 5px; display: flex; align-items: center;}
        .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: red; margin-right: 15px;}
        .status-dot.ready { background: #00ff9d; box-shadow: 0 0 10px #00ff9d;}
        
        #status-text { font-size: 22px; font-weight: bold; color: var(--gold); min-height: 30px; margin-top: 10px; text-align: center; width: 100%;}
    </style>
</head>
<body>
    <div id="out-of-casino-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,12,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; backdrop-filter: blur(15px);">
        <h1 style="color: #ff003c; font-size: 50px; margin: 0; text-shadow: 0 0 20px #ff003c;">🚫 ДОСТУП ЗАБЛОКОВАНО</h1>
        <p style="color: #aaa; font-size: 24px; margin-top: 15px;">Ви покинули територію казино (або вийшли з гри).</p>
        <p style="color: white; font-size: 18px;">Поверніться до будівлі казино в Minecraft, щоб продовжити гру.</p>
        <button onclick="leaveTable()" style="width: auto; padding: 15px 40px; margin-top: 30px; background: #333; color: white; border:none; cursor:pointer; font-weight:bold; border-radius:8px;">Вийти в лобі</button>
    </div>

    <audio id="sound-spin" src="../sounds/spin.mp3" preload="auto"></audio>
    <audio id="sound-win" src="../sounds/win.mp3" preload="auto"></audio>
    <audio id="sound-lose" src="../sounds/lose.mp3" preload="auto"></audio>

    <div class="nav-bar">
        <button class="back-btn" onclick="leaveTable()">🔙 Вийти в Лобі</button>
        <h2 id="table-title" style="margin: 0; color: var(--gold);">Стіл #1</h2>
        <div style="font-size: 18px;">Баланс: <strong id="balance-display" style="color: var(--neon); font-size: 22px;">0</strong> 🪙</div>
    </div>

    <div class="main-layout">
        <div class="left-panel">
            <div class="wheel-wrapper">
                <div class="wheel" id="wheel">
                    <div class="wheel-bg" id="wheel-bg"></div>
                    <div class="numbers-overlay" id="numbers-overlay"></div>
                </div>
                <div class="ball-track" id="ball-track">
                    <div class="ball"></div>
                </div>
                <div class="wheel-center"></div>
            </div>

            <div id="status-text">Очікування гравців...</div>

            <div class="table-wrapper">
                <div class="betting-board" id="betting-board">
                    <div class="cell cell-zero" onclick="placeBet('0')">0</div>
                </div>
            </div>

            <button onclick="clearBets()" style="background: transparent; color: #888; border: 1px solid #555; padding: 8px 20px; border-radius: 5px; cursor:pointer; margin-top: 10px;">🗑️ Очистити мої ставки</button>
        </div>

        <div class="right-panel">
            <h3 style="margin-top:0; border-bottom: 1px solid #444; padding-bottom: 10px; text-align: center;">Гравці за столом</h3>
            <ul class="players-list" id="players-ul"></ul>

            <div class="controls" style="margin-top: 30px;">
                <div class="chip-selector">
                    <div class="chip c-10 active" onclick="selectChip(10, this)">10</div>
                    <div class="chip c-50" onclick="selectChip(50, this)">50</div>
                    <div class="chip c-100" onclick="selectChip(100, this)">100</div>
                    <div class="chip c-500" onclick="selectChip(500, this)">500</div>
                    <div class="chip c-1000" onclick="selectChip(1000, this)">1K</div>
                </div>
                
                <div style="text-align: center; margin: 10px 0;">Моя ставка: <br><strong id="current-bet-display" style="color: white; font-size: 24px;">0</strong></div>

                <button class="btn-ready" id="ready-btn" onclick="toggleReady()">ПІДТВЕРДИТИ</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC1HOC3_im8YiziljGqpR_0AvHLQctIfxQ",
            authDomain: "kurahivka-casino.firebaseapp.com",
            databaseURL: "https://kurahivka-casino-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "kurahivka-casino"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const username = localStorage.getItem('casino_user');
        if (!username) window.location.href = '../index.html';
        
        const urlParams = new URLSearchParams(window.location.search);
        const tableId = urlParams.get('table') || '1';
        document.getElementById('table-title').innerText = `VIP Стіл #${tableId}`;

        let currentBalance = 0;
        const userRef = database.ref('users_by_name/' + username);
        userRef.on('value', snap => {
            const data = snap.val();
            
            // --- ЛОГІКА БЛОКУВАННЯ НА СТОЛІ ---
            if (data && data.in_casino === false) {
                document.getElementById('out-of-casino-overlay').style.display = 'flex';
                // Автоматично робимо гравця "Не готовим", якщо він вийшов з казино
                if (isReady) toggleReady(); 
            } else {
                document.getElementById('out-of-casino-overlay').style.display = 'none';
            }

            currentBalance = data ? (data.chips || 0) : 0;
            document.getElementById('balance-display').innerText = currentBalance;
        });

        const tableRef = database.ref(`tables/table_${tableId}`);
        const myPlayerRef = tableRef.child('players/' + username);
        
        myPlayerRef.set({ ready: false }); 
        myPlayerRef.onDisconnect().remove();

        let isReady = false;
        let isSpinningLocal = false;
        let tableState = 'betting';

        tableRef.on('value', snap => {
            const data = snap.val() || { status: 'betting', players: {} };
            const players = data.players || {};
            
            const ul = document.getElementById('players-ul');
            ul.innerHTML = '';
            let allReady = true;
            let playerCount = 0;

            for (const [name, info] of Object.entries(players)) {
                playerCount++;
                if (!info.ready) allReady = false;
                const dotClass = info.ready ? 'status-dot ready' : 'status-dot';
                ul.innerHTML += `<li><span class="${dotClass}"></span>${name.toUpperCase()}</li>`;
            }

            // Якщо всі готові, запускаємо рулетку!
            if (allReady && playerCount > 0 && data.status === 'betting') {
                const sortedNames = Object.keys(players).sort();
                if (username === sortedNames[0]) {
                    const resultIndex = Math.floor(Math.random() * 37);
                    tableRef.update({ status: 'spinning', result: wheelOrder[resultIndex] });
                }
            }

            if (data.status === 'spinning' && tableState === 'betting') {
                tableState = 'spinning';
                playSpinAnimation(data.result);
            }
        });

        function leaveTable() {
            myPlayerRef.remove().then(() => { window.location.href = '../index.html'; });
        }

        function toggleReady() {
            if (isSpinningLocal) return;
            // ТЕПЕР МОЖНА НАТИСНУТИ "ГОТОВИЙ" НАВІТЬ ЗІ СТАВКОЮ 0 (ПРОСТО ПОДИВИТИСЯ)

            isReady = !isReady;
            myPlayerRef.update({ ready: isReady });

            const btn = document.getElementById('ready-btn');
            if (isReady) {
                btn.innerText = "✅ ГОТОВИЙ";
                btn.style.background = "var(--green)";
            } else {
                btn.innerText = "ПІДТВЕРДИТИ";
                btn.style.background = "var(--gold)";
            }
        }

        // === ГЕНЕРАЦІЯ КОЛЕСА (ВИПРАВЛЕНА ГЕОМЕТРІЯ) ===
        const wheelOrder = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        const redNumbers = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
        const sliceAngle = 360 / 37;
        
        let gradientParts = [];
        const overlay = document.getElementById('numbers-overlay');
        wheelOrder.forEach((num, index) => {
            let color = (num === 0) ? 'var(--green)' : (redNumbers.includes(num) ? 'var(--red)' : 'var(--black)');
            gradientParts.push(`${color} ${index * sliceAngle}deg ${(index + 1) * sliceAngle}deg`);
            
            const numDiv = document.createElement('div');
            numDiv.className = 'wheel-number';
            numDiv.innerText = num;
            // Зміщення на половину сектора, щоб цифра була ідеально по центру кольору!
            numDiv.style.transform = `rotate(${index * sliceAngle + (sliceAngle / 2)}deg)`;
            overlay.appendChild(numDiv);
        });
        document.getElementById('wheel-bg').style.background = `conic-gradient(${gradientParts.join(', ')})`;

        const board = document.getElementById('betting-board');
        let col = 2;
        for (let i = 1; i <= 36; i += 3) {
            createCell(i + 2, 'row-1', col); createCell(i + 1, 'row-2', col); createCell(i, 'row-3', col); col++;
        }
        board.innerHTML += `<div class="bottom-bets"><div class="cell-red-bet" onclick="placeBet('red')">ЧЕРВОНЕ</div><div class="cell-black-bet" onclick="placeBet('black')">ЧОРНЕ</div></div>`;

        function createCell(num, rowClass, colNum) {
            const cell = document.createElement('div');
            cell.className = `cell ${rowClass}`;
            cell.style.background = redNumbers.includes(num) ? 'var(--red)' : 'var(--black)';
            cell.style.gridColumn = colNum;
            cell.innerText = num;
            cell.onclick = () => placeBet(num.toString());
            board.appendChild(cell);
        }

        let selectedChipValue = 10;
        let activeBets = {}; 
        let totalBetAmount = 0;

        function selectChip(value, el) {
            selectedChipValue = value;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function placeBet(target) {
            if (isReady || isSpinningLocal) return;
            if (totalBetAmount + selectedChipValue > currentBalance) return alert("Недостатньо фішок!");

            if (!activeBets[target]) activeBets[target] = 0;
            activeBets[target] += selectedChipValue;
            totalBetAmount += selectedChipValue;
            document.getElementById('current-bet-display').innerText = totalBetAmount;

            let tElem = (target === '0') ? document.querySelector('.cell-zero') : (target === 'red') ? document.querySelector('.cell-red-bet') : (target === 'black') ? document.querySelector('.cell-black-bet') : [...document.querySelectorAll('.cell')].find(c => c.innerText === target && !c.classList.contains('cell-zero'));
            if (tElem) {
                const chip = document.createElement('div');
                chip.className = 'chip-on-table chip-temp';
                chip.innerText = activeBets[target] >= 1000 ? (activeBets[target]/1000).toFixed(1)+'k' : activeBets[target];
                chip.style.transform = `translate(${Math.random() * 10 - 5}px, ${Math.random() * 10 - 5}px)`;
                tElem.querySelectorAll('.chip-temp').forEach(c => c.remove());
                tElem.appendChild(chip);
            }
        }

        function clearBets() {
            if (isReady || isSpinningLocal) return;
            activeBets = {}; totalBetAmount = 0;
            document.getElementById('current-bet-display').innerText = 0;
            document.querySelectorAll('.chip-temp').forEach(c => c.remove());
        }

        let currentWheelRotation = 0;
        let currentBallRotation = 0;

        async function playSpinAnimation(winningNumber) {
            isSpinningLocal = true;
            document.getElementById('status-text').innerText = "Ставки закриті. Кулька крутиться!";
            document.getElementById('status-text').style.color = "white";
            document.getElementById('ready-btn').disabled = true;

            const spinAudio = document.getElementById('sound-spin');
            if(spinAudio) spinAudio.play().catch(()=>{});

            if (totalBetAmount > 0) {
                await userRef.update({ chips: currentBalance - totalBetAmount });
            }

            const winningIndex = wheelOrder.indexOf(winningNumber);
            currentWheelRotation += (360 * 4) + (Math.random() * 360);
            const targetAbsoluteAngle = currentWheelRotation + (winningIndex * sliceAngle);
            currentBallRotation = targetAbsoluteAngle - (360 * 6);

            document.getElementById('wheel').style.transform = `rotate(${currentWheelRotation}deg)`;
            const track = document.getElementById('ball-track');
            track.style.transform = `rotate(${currentBallRotation}deg) scale(0.85)`; 

            setTimeout(() => {
                track.style.transform = `rotate(${currentBallRotation}deg) scale(1)`; 
                setTimeout(() => evaluateLocalBets(winningNumber), 500);
            }, 5500);
        }

        async function evaluateLocalBets(winningNumber) {
            let winAmount = 0;
            const winningColor = (winningNumber === 0) ? 'green' : (redNumbers.includes(winningNumber) ? 'red' : 'black');

            for (const [target, amount] of Object.entries(activeBets)) {
                if (target === winningNumber.toString()) winAmount += amount * 36;
                else if (target === winningColor) winAmount += amount * 2;
            }

            const statusText = document.getElementById('status-text');
            if (winAmount > 0) {
                statusText.innerHTML = `Випало: <span style="color:var(--${winningColor})">${winningNumber}</span>. Виграш: +${winAmount} 🪙`;
                statusText.style.color = "var(--neon)";
                document.getElementById('sound-win').play().catch(()=>{});
                await userRef.once('value').then(s => { userRef.update({ chips: s.val().chips + winAmount }); });
            } else if (totalBetAmount > 0) {
                statusText.innerHTML = `Випало: <span style="color:var(--${winningColor})">${winningNumber}</span>. Ставки згоріли.`;
                statusText.style.color = "var(--red)";
                document.getElementById('sound-lose').play().catch(()=>{});
            } else {
                statusText.innerHTML = `Випало: <span style="color:var(--${winningColor})">${winningNumber}</span>.`;
                statusText.style.color = "white";
            }

            setTimeout(() => {
                activeBets = {}; totalBetAmount = 0; document.getElementById('current-bet-display').innerText = 0;
                document.querySelectorAll('.chip-temp').forEach(c => c.remove());
                
                isSpinningLocal = false;
                isReady = false;
                
                const btn = document.getElementById('ready-btn');
                btn.disabled = false;
                btn.innerText = "ПІДТВЕРДИТИ";
                btn.style.background = "var(--gold)";
                
                myPlayerRef.update({ ready: false });

                tableRef.once('value', s => {
                    const p = s.val().players || {};
                    const sorted = Object.keys(p).sort();
                    if (username === sorted[0]) tableRef.update({ status: 'betting', result: null });
                });
                
                statusText.innerText = "Очікування гравців...";
                statusText.style.color = "var(--gold)";
                tableState = 'betting';
            }, 4000);
        }
    </script>
</body>
</html>
