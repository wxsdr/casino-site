<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Kurahivka RP Casino | Elite</title>
    <style>
        :root { --neon: #00ff9d; --bg: #0a0a0c; --glass: rgba(255,255,255,0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; }
        
        /* Sidebar */
        .sidebar { width: 250px; height: 100vh; background: #151518; position: fixed; padding: 20px; }
        .nav-item { padding: 15px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .nav-item:hover { background: var(--neon); color: black; }
        
        /* Main Content */
        .content { margin-left: 290px; padding: 40px; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        
        /* Card Effect */
        .game-card { background: var(--glass); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333; cursor: pointer; transition: 0.4s; }
        .game-card:hover { transform: translateY(-10px); border-color: var(--neon); box-shadow: 0 0 20px rgba(0,255,157,0.2); }
        
        /* Animations */
        @keyframes glow { from { text-shadow: 0 0 5px #fff; } to { text-shadow: 0 0 20px var(--neon); } }
        h1 { animation: glow 2s infinite alternate; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>🎰 KURAHIVKA CASINO</h2>
    <div class="nav-item" onclick="showSection('table')">🎴 Настільні ігри</div>
    <div class="nav-item" onclick="showSection('slots')">🎰 Слоти та Автомати</div>
    <div class="nav-item" onclick="showSection('luck')">🎡 Колесо фортуни</div>
</div>

<div class="content">
    <h1>Обери свою гру</h1>
    <div id="game-container" class="game-grid">
        </div>
</div>

<script>
    const games = {
        table: ['Баккара', 'Блэкджек', 'Крэпс', 'Рулетка', 'Покер'],
        slots: ['Патинко', 'Слоти', 'Відеолотереї', 'Відеопокер', 'Бінго', 'Кено'],
        luck: ['Колесо фортуни', 'Случайні числа']
    };

    function showSection(category) {
        const container = document.getElementById('game-container');
        container.innerHTML = '';
        games[category].forEach(game => {
            container.innerHTML += `<div class="game-card"><h3>${game}</h3><button>ГРАТИ</button></div>`;
        });
    }
    
    // Ініціалізація
    showSection('table');
</script>

</body>
</html>
