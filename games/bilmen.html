<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINECRAFT ROYALE | БІЛЬШЕ/МЕНШЕ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Rubik:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            background: radial-gradient(ellipse at 30% 40%, #0d1117 0%, #05080f 100%);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 25px;
            background: rgba(8, 12, 20, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.25);
        }
        
        .btn-exit {
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 800;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-exit:hover {
            background: #ff4433;
            border-color: #ff4433;
        }
        
        .balance-badge {
            font-size: 18px;
            font-weight: 900;
            background: rgba(0, 255, 157, 0.1);
            padding: 8px 25px;
            border-radius: 40px;
            border: 1px solid rgba(0, 255, 157, 0.35);
            color: #00ff9d;
        }
        .balance-badge span {
            color: #00ff88;
            font-size: 24px;
            margin-left: 8px;
        }

        #game-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            position: relative;
        }

        .game-table {
            background: linear-gradient(145deg, #0a5a3a, #064a2a);
            border-radius: 50px;
            border: 3px solid #d4af37;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            padding: 25px 35px;
            width: 950px;
            max-width: 95vw;
            height: auto;
            min-height: 580px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .table-neon {
            position: absolute;
            inset: -3px;
            border-radius: 52px;
            z-index: -1;
            filter: blur(15px);
            opacity: 0.4;
            background: linear-gradient(45deg, #d4af37, #00ff88, #00f2ff);
            animation: tableGlow 3s infinite alternate;
        }
        
        @keyframes tableGlow {
            0% { opacity: 0.2; filter: blur(12px); }
            100% { opacity: 0.5; filter: blur(20px); }
        }

        .table-title {
            text-align: center;
            margin-bottom: 15px;
        }
        .table-title h1 {
            font-family: 'Rubik', sans-serif;
            font-size: 24px;
            background: linear-gradient(135deg, #d4af37, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .table-title p {
            font-size: 10px;
            color: rgba(255, 215, 0, 0.5);
            margin-top: 4px;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }
        
        /* CARDS */
        .cards-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .card {
            width: 120px;
            height: 168px;
            background: white;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
            position: relative;
        }
        
        .card.animate {
            animation: cardFlip 0.3s ease-out;
        }
        
        @keyframes cardFlip {
            0% { transform: rotateY(90deg); opacity: 0; }
            100% { transform: rotateY(0); opacity: 1; }
        }
        
        .card.red { color: #e33; }
        .card.black { color: #222; }
        
        .card-value {
            font-size: 48px;
            font-weight: 900;
        }
        
        .card-suit {
            font-size: 36px;
            margin-top: 8px;
        }
        
        .card-back {
            background: linear-gradient(135deg, #1a3a5a, #0a2a4a);
            border: 2px solid #d4af37;
            position: relative;
        }
        
        .card-back .card-value, .card-back .card-suit {
            display: none;
        }
        
        .card-back::before {
            content: "?";
            font-size: 48px;
            color: #d4af37;
            font-weight: 900;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .card-label {
            font-size: 14px;
            color: #d4af37;
            margin-top: 8px;
            font-weight: 600;
        }
        
        /* BET OPTIONS */
        .bet-options {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 15px 0;
        }
        
        .bet-option {
            background: linear-gradient(135deg, #1a1a2a, #0f0f1a);
            border: 2px solid #d4af37;
            border-radius: 20px;
            padding: 12px 25px;
            color: #d4af37;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            min-width: 120px;
        }
        
        .bet-option:hover:not(:disabled) {
            background: #d4af37;
            color: #0a0e18;
            transform: scale(1.02);
        }
        
        .bet-option.selected {
            background: #d4af37;
            color: #0a0e18;
            box-shadow: 0 0 20px #d4af37;
        }
        
        .bet-option .multiplier {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 4px;
        }
        
        .bet-option:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .result-area {
            text-align: center;
            margin: 12px 0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 40px;
            backdrop-filter: blur(10px);
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        
        .result-text {
            font-size: 18px;
            font-weight: 900;
        }
        
        .result-win { color: #00ff88; }
        .result-lose { color: #ff4433; }
        .result-push { color: #d4af37; }

        .bet-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 50px;
            margin-top: 10px;
        }
        
        .bet-label {
            color: #d4af37;
            font-weight: 800;
            font-size: 13px;
        }
        
        .chip-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #d4af37, #aa8833);
            border: 2px solid #ffd700;
            color: #1a1a2a;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
        }
        .chip-btn:active { transform: scale(0.95); }
        
        .bet-input {
            background: #0a0e18;
            color: #d4af37;
            border: 2px solid #d4af37;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 900;
            text-align: center;
            width: 100px;
            height: 40px;
            outline: none;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 12px;
        }
        
        .action-btn {
            background: linear-gradient(135deg, #1a1a2a, #0f0f1a);
            border: 2px solid #d4af37;
            color: #d4af37;
            border-radius: 40px;
            padding: 10px 30px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
        }
        .action-btn:hover:not(:disabled) {
            background: #d4af37;
            color: #0a0e18;
            transform: scale(1.02);
        }
        .action-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .action-btn.primary {
            background: linear-gradient(135deg, #00ff88, #00aa55);
            border-color: #00ff88;
            color: #0a1a0a;
        }

        .history-panel {
            position: absolute;
            right: -240px;
            top: 50%;
            transform: translateY(-50%);
            width: 220px;
            background: rgba(8, 12, 20, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            border-left: 3px solid #00ff88;
            padding: 12px;
            pointer-events: auto;
        }
        .history-panel h4 {
            color: #00ff88;
            font-size: 12px;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 2px;
        }
        .history-list {
            max-height: 350px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .history-list div {
            padding: 5px 8px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            border-left: 2px solid;
            font-size: 10px;
            font-weight: 600;
        }
        .history-list .win { color: #00ff88; border-left-color: #00ff88; }
        .history-list .lose { color: #ff4433; border-left-color: #ff4433; }
        .history-list .big-win { color: #ffd700; border-left-color: #ffd700; font-weight: 900; background: rgba(255, 215, 0, 0.1); }
        .history-list .push { color: #d4af37; border-left-color: #d4af37; }
        
        @media (max-width: 1200px) {
            .history-panel {
                position: static;
                transform: none;
                width: 100%;
                margin-top: 15px;
                order: 1;
            }
            .game-table {
                width: 90vw;
                padding: 20px;
            }
            .card {
                width: 80px;
                height: 112px;
            }
            .card-value { font-size: 32px; }
            .card-suit { font-size: 24px; }
            .bet-option {
                min-width: 90px;
                padding: 8px 16px;
                font-size: 14px;
            }
            .result-text { font-size: 14px; }
            .action-btn { padding: 8px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn-exit" onclick="window.location.href='../index.html'">✧ ВИЙТИ ✧</button>
        <div class="balance-badge">💎 БАЛАНС <span id="balance-amount">0</span></div>
    </div>

    <div id="game-wrapper">
        <div class="game-table">
            <div class="table-neon"></div>
            <div class="table-title">
                <h1>🎴 HIGH / LOW 🎴</h1>
                <p>✦ БІЛЬШЕ | МЕНШЕ | ДОРІВНЮЄ ✦</p>

                        <div class="multiplier">×2</div>

                    <div class="bet-option" data-bet="lower">

                        <div class="multiplier">×2</div>

                        🎯 ДОРІВНЮЄ

                <button class="chip-btn" id="bet-plus">+</button>
            </div>
            
            <div class="action-buttons">
                <button class="action-btn primary" id="play-btn">🎴 ЗІГРАТИ</button>
                <button class="action-btn" id="new-game-btn">🔄 НОВА ГРА</button>
            </div>
        </div>
        
        <div class="history-panel">
            <h4>📜 ІСТОРІЯ ІГОР</h4>
            <div class="history-list" id="history-list">
                <div style="color:#555; text-align:center;">─ немає записів ─</div>
            </div>
        </div>
    </div>

    <script>
        // ========== ЗВУКИ ==========
        let audioContext = null;
        
        function initAudio() {
            if (audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playCardSound() {
            try {
                initAudio();
                if (audioContext.state === 'suspended') audioContext.resume();
                const now = audioContext.currentTime;
                const gainNode = audioContext.createGain();
                gainNode.connect(audioContext.destination);
                gainNode.gain.value = 0.08;
                const osc = audioContext.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 880;
                osc.connect(gainNode);
                osc.start();
                osc.stop(now + 0.08);
            } catch(e) {}
        }
        
        function playWinSound() {
            try {
                initAudio();
                if (audioContext.state === 'suspended') audioContext.resume();
                const now = audioContext.currentTime;
                const notes = [523.25, 659.25, 783.99];
                notes.forEach((freq, i) => {
                    const osc = audioContext.createOscillator();
                    const g = audioContext.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    g.gain.value = 0.07;
                    osc.connect(g);
                    g.connect(audioContext.destination);
                    osc.start();
                    osc.stop(now + 0.15 + i * 0.12);
                    g.gain.exponentialRampToValueAtTime(0.00001, now + 0.18 + i * 0.12);
                });
            } catch(e) {}
        }
        
        function playLoseSound() {
            try {
                initAudio();
                if (audioContext.state === 'suspended') audioContext.resume();
                const now = audioContext.currentTime;
                const osc = audioContext.createOscillator();
                const g = audioContext.createGain();
                osc.type = 'sine';
                osc.frequency.value = 440;
                g.gain.value = 0.06;
                osc.connect(g);
                g.connect(audioContext.destination);
                osc.start();
                osc.stop(now + 0.25);
                g.gain.exponentialRampToValueAtTime(0.00001, now + 0.25);
            } catch(e) {}
        }
        
        function playBigWinSound() {
            try {
                initAudio();
                if (audioContext.state === 'suspended') audioContext.resume();
                const now = audioContext.currentTime;
                const notes = [523.25, 659.25, 783.99, 1046.50];
                notes.forEach((freq, i) => {
                    const osc = audioContext.createOscillator();
                    const g = audioContext.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    g.gain.value = 0.08;
                    osc.connect(g);
                    g.connect(audioContext.destination);
                    osc.start();
                    osc.stop(now + 0.1 + i * 0.1);
                    g.gain.exponentialRampToValueAtTime(0.00001, now + 0.15 + i * 0.1);
                });
            } catch(e) {}
        }

        // Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyC1HOC3_im8YiziljGqpR_0AvHLQctIfxQ",
            authDomain: "kurahivka-casino.firebaseapp.com",
            databaseURL: "https://kurahivka-casino-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "kurahivka-casino"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const username = localStorage.getItem('casino_user');
        const userRef = database.ref('users_by_name/' + (username ? username.toLowerCase() : 'guest'));
        
        let currentBalance = 0;
        let currentBet = 10;
        let selectedBet = null;
        let isPlaying = false;
        let currentCard = null;
        let nextCard = null;
        let gameActive = true;
        
        const betInput = document.getElementById('bet-input');
        const currentCardDiv = document.getElementById('current-card');
        const nextCardDiv = document.getElementById('next-card');
        const resultArea = document.getElementById('result-area');
        const resultText = document.getElementById('result-text');
        const playBtn = document.getElementById('play-btn');
        const newGameBtn = document.getElementById('new-game-btn');
        const betOptions = document.querySelectorAll('.bet-option');
        
        // Масті та значення карт
        const suits = ['♥', '♦', '♣', '♠'];
        const cardValues = [
            { name: '2', value: 2 }, { name: '3', value: 3 }, { name: '4', value: 4 },
            { name: '5', value: 5 }, { name: '6', value: 6 }, { name: '7', value: 7 },
            { name: '8', value: 8 }, { name: '9', value: 9 }, { name: '10', value: 10 },
            { name: 'J', value: 11 }, { name: 'Q', value: 12 }, { name: 'K', value: 13 },
            { name: 'A', value: 14 }
        ];
        
        function getRandomCard() {
            const suit = suits[Math.floor(Math.random() * suits.length)];
            const valueObj = cardValues[Math.floor(Math.random() * cardValues.length)];
            return { suit, value: valueObj.value, name: valueObj.name };
        }
        
        function getCardDisplay(card) {
            const isRed = card.suit === '♥' || card.suit === '♦';
            return `<div class="card ${isRed ? 'red' : 'black'} animate">
                        <div class="card-value">${card.name}</div>
                        <div class="card-suit">${card.suit}</div>
                    </div>`;
        }
        
        function updateUI() {
            if (currentCard) {
                currentCardDiv.innerHTML = getCardDisplay(currentCard);
            }
            if (nextCard) {
                nextCardDiv.innerHTML = getCardDisplay(nextCard);
            } else {
                nextCardDiv.innerHTML = `<div class="card card-back"></div>`;
            }
        }
        
        function updateBalanceDisplay() {
            document.getElementById('balance-amount').innerText = currentBalance;
        }
        
        userRef.on('value', snap => {
            const data = snap.val();
            currentBalance = data ? (data.chips || 1000) : 1000;
            updateBalanceDisplay();
        });
        
        function updateBetUI() { betInput.value = currentBet; }
        
        function updateBet(delta) {
            if (isPlaying) return;
            let newVal = currentBet + delta;
            if (newVal >= 10 && newVal <= Math.min(50000, currentBalance)) {
                currentBet = newVal;
                updateBetUI();
            }
        }
        
        function manualBetChange() {
            if (isPlaying) return;
            let val = parseInt(betInput.value);
            if (isNaN(val)) val = 10;
            if (val < 10) val = 10;
            if (val > 50000) val = 50000;
            if (val > currentBalance) val = currentBalance;
            currentBet = val;
            updateBetUI();
        }
        
        function addToHistory(message, type = 'win') {
            const historyDiv = document.getElementById('history-list');
            if (historyDiv.children.length === 1 && historyDiv.children[0].innerText.includes('немає записів')) {
                historyDiv.innerHTML = '';
            }
            const newEntry = document.createElement('div');
            newEntry.className = type;
            const time = new Date().toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            newEntry.innerHTML = `[${time}] ${message}`;
            historyDiv.prepend(newEntry);
            while (historyDiv.children.length > 20) historyDiv.removeChild(historyDiv.lastChild);
        }
        
        function selectBet(betType) {
            if (isPlaying) return;
            selectedBet = betType;
            betOptions.forEach(option => {
                if (option.dataset.bet === betType) {
                    option.classList.add('selected');
                } else {
                    option.classList.remove('selected');
                }
            });
        }
        
        function getBetMultiplier(betType) {
            switch(betType) {
                case 'higher': return 2;
                case 'lower': return 2;
                case 'equal': return 10;
                default: return 1;
            }
        }
        
        function getBetName(betType) {
            const names = {
                'higher': 'БІЛЬШЕ',
                'lower': 'МЕНШЕ',
                'equal': 'ДОРІВНЮЄ'
            };
            return names[betType] || betType;
        }
        
        function checkWin(betType, currentVal, nextVal) {
            switch(betType) {
                case 'higher': return nextVal > currentVal;
                case 'lower': return nextVal < currentVal;
                case 'equal': return nextVal === currentVal;
                default: return false;
            }
        }
        
        function showResult(message, type) {
            resultText.style.opacity = '1';
            resultText.className = `result-text result-${type}`;
            resultText.innerHTML = message;
        }
        
        function clearResult() {
            resultText.style.opacity = '0';
            resultText.innerHTML = '&nbsp;';
        }
        
        async function updateBalance(changeAmount) {
            const snap = await userRef.once('value');
            const currentData = snap.val();
            const freshBalance = currentData ? (currentData.chips || 1000) : 1000;
            const newBalance = freshBalance + changeAmount;
            await userRef.update({ chips: newBalance });
            currentBalance = newBalance;
            updateBalanceDisplay();
            return newBalance;
        }
        
        async function newGame() {
            if (isPlaying) return;
            gameActive = true;
            currentCard = getRandomCard();
            nextCard = null;
            selectedBet = null;
            betOptions.forEach(opt => opt.classList.remove('selected'));
            clearResult();
            updateUI();
            playBtn.disabled = false;
            playBtn.innerText = '🎴 ЗІГРАТИ';
        }
        
        async function playGame() {
            if (isPlaying) return;
            if (selectedBet === null) {
                showResult('❌ ОБЕРІТЬ СТАВКУ! (БІЛЬШЕ/МЕНШЕ/ДОРІВНЮЄ)', 'lose');
                playLoseSound();
                return;
            }
            if (currentBet > currentBalance) {
                showResult(`❌ НЕДОСТАТНЬО КОШТІВ! ПОТРІБНО ${currentBet}, Є ${currentBalance}`, 'lose');
                playLoseSound();
                return;
            }
            
            isPlaying = true;
            playBtn.disabled = true;
            betOptions.forEach(opt => opt.style.pointerEvents = 'none');
            
            clearResult();
            
            // Знімаємо ставку
            await updateBalance(-currentBet);
            
            // Генеруємо наступну карту
            nextCard = getRandomCard();
            
            // Анімація появи карти
            playCardSound();
            updateUI();
            
            const currentVal = currentCard.value;
            const nextVal = nextCard.value;
            const isWin = checkWin(selectedBet, currentVal, nextVal);
            const multiplier = getBetMultiplier(selectedBet);
            const betName = getBetName(selectedBet);
            
            let winAmount = 0;
            let resultMessage = '';
            let resultType = '';
            
            if (isWin) {
                winAmount = currentBet * multiplier;
                resultType = 'win';
                resultMessage = `🎉 ВИГРАШ! ${betName} - ${currentCard.name} → ${nextCard.name}! ВИ ВИГРАЛИ ${winAmount} 🪙`;
                await updateBalance(winAmount);
                addToHistory(`🎴 +${winAmount} 🪙 (${betName}, ${currentCard.name}→${nextCard.name})`, 
                            winAmount >= currentBet * 8 ? 'big-win' : 'win');
                if (winAmount >= currentBet * 8) {
                    playBigWinSound();
                } else {
                    playWinSound();
                }
            } else if (selectedBet === 'equal') {
                resultType = 'lose';
                resultMessage = `😔 НЕ ВГАДАЛИ! ВИПАЛО ${nextCard.name}, А ВИ СТАВИЛИ НА ДОРІВНЮЄ ${currentCard.name}. ВИ ПРОГРАЛИ ${currentBet} 🪙`;
                addToHistory(`🎴 -${currentBet} 🪙 (ДОРІВНЮЄ, ${currentCard.name}→${nextCard.name})`, 'lose');
                playLoseSound();
            } else if (selectedBet === 'higher' && nextVal <= currentVal) {
                resultType = 'lose';
                resultMessage = `😔 ВИПАЛО ${nextCard.name} (${nextVal} ≤ ${currentVal}). ВИ ПРОГРАЛИ ${currentBet} 🪙`;
                addToHistory(`🎴 -${currentBet} 🪙 (БІЛЬШЕ, ${currentCard.name}→${nextCard.name})`, 'lose');
                playLoseSound();
            } else if (selectedBet === 'lower' && nextVal >= currentVal) {
                resultType = 'lose';
                resultMessage = `😔 ВИПАЛО ${nextCard.name} (${nextVal} ≥ ${currentVal}). ВИ ПРОГРАЛИ ${currentBet} 🪙`;
                addToHistory(`🎴 -${currentBet} 🪙 (МЕНШЕ, ${currentCard.name}→${nextCard.name})`, 'lose');
                playLoseSound();
            }
            
            showResult(resultMessage, resultType);
            
            isPlaying = false;
            playBtn.disabled = false;
            betOptions.forEach(opt => opt.style.pointerEvents = 'auto');
            
            // Починаємо нову гру автоматично після паузи
            setTimeout(() => {
                currentCard = nextCard;
                nextCard = null;
                selectedBet = null;
                betOptions.forEach(opt => opt.classList.remove('selected'));
                updateUI();
                clearResult();
            }, 2000);
        }
        
        document.getElementById('bet-minus').onclick = () => updateBet(-10);
        document.getElementById('bet-plus').onclick = () => updateBet(10);
        betInput.onchange = manualBetChange;
        playBtn.onclick = playGame;
        newGameBtn.onclick = newGame;
        
        betOptions.forEach(option => {
            option.onclick = () => selectBet(option.dataset.bet);
        });
        
        // Ініціалізація
        newGame();
        updateBetUI();
        
        document.body.addEventListener('click', () => {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }, { once: true });
    </script>
</body>
</html>
