            showMsg("ОБЕРІТЬ ЦІЛЬ!", "msg-goal");
        }

        function updateUI() {
            if (currentStep === -1) {
                playBtn.style.display = "flex"; collectBtn.style.display = "none";
                targetZones.classList.remove('active'); winDisplay.innerText = "0.00";
            } else {
                playBtn.style.display = "none"; collectBtn.style.display = "flex";
                targetZones.classList.add('active');
                
                if (currentStep === 0) {
                    collectBtn.disabled = true; collectBtn.style.filter = "grayscale(1)";
                } else {
                    collectBtn.disabled = false; collectBtn.style.filter = "none";
                }
                winDisplay.innerText = potentialWin.toFixed(2);
            }

            for (let i = 0; i < 5; i++) {
                const stepEl = document.getElementById(`step-${i}`);
                stepEl.className = "step";
                if (i < currentStep) stepEl.classList.add('passed');
                if (i === currentStep) stepEl.classList.add('active');
            }
        }

        function showMsg(text, className) {
            msgBox.innerText = text; msgBox.className = className;
            msgBox.classList.add('show');
            setTimeout(() => { msgBox.classList.remove('show'); }, 1500);
        }

        function addHistory(isWin) {
            const item = document.createElement('div');
            item.className = `history-item ${isWin ? 'hist-win' : 'hist-loss'}`;
            item.innerHTML = isWin ? '⚽' : '❌';
            historyList.prepend(item);
            
            if (historyList.children.length > 8) {
                historyList.removeChild(historyList.lastChild);
            }
        }

        function shoot(target) {
            if (currentStep === -1 || isAnimating) return;
            isAnimating = true;
            targetZones.classList.remove('active');
            collectBtn.disabled = true;

            // ЗВУК УДАРУ
            let soundKick = document.getElementById('sound-kick');
            soundKick.currentTime = 0; soundKick.play().catch(()=>{});

            const ball = document.getElementById('ball');
            const goalie = document.getElementById('goalkeeper');

            // ІДЕАЛЬНА БАЛІСТИКА М'ЯЧА (Виправлені координати дев'яток і кутів)
            const targets = {
                // Дев'ятки - летять високо і сильно зменшуються
                'tl': { x: '-400px', y: '-580px', s: 0.25 },
                'tc': { x: '0px',    y: '-580px', s: 0.25 },
                'tr': { x: '400px',  y: '-580px', s: 0.25 },
                // Нижні кути - летять нижче і менше зменшуються
                'bl': { x: '-420px', y: '-220px', s: 0.35 },
                'br': { x: '420px',  y: '-220px', s: 0.35 }
            };

            const dives = [
                { id: 'tl', t: 'translate(-280px, -250px) rotate(-60deg) scale(1.1)' },
                { id: 'tc', t: 'translate(0, -220px) scale(1.2)' },
                { id: 'tr', t: 'translate(280px, -250px) rotate(60deg) scale(1.1)' },
                { id: 'bl', t: 'translate(-300px, -40px) rotate(-85deg) scale(1.1)' },
                { id: 'br', t: 'translate(300px, -40px) rotate(85deg) scale(1.1)' }
            ];

            const isGoal = Math.random() < WIN_CHANCE;

            let goalieDive;
            if (!isGoal) goalieDive = dives.find(d => d.id === target).t;
            else {
                const wrongDives = dives.filter(d => d.id !== target); 
                goalieDive = wrongDives[Math.floor(Math.random() * wrongDives.length)].t;
            }

            const pos = targets[target];
            
            // Якщо гол — м'яч плавно залітає в сітку.
            if (isGoal) {
                ball.style.transition = 'transform 0.45s cubic-bezier(0.1, 0.9, 0.2, 1)';
                ball.style.transform = `translateX(calc(-50% + ${pos.x})) translateY(${pos.y}) scale(${pos.s}) rotate(${Math.random() * 1080}deg)`;
            } else {
                // ЯКЩО СЕЙВ: М'яч летить до воротаря, а потім РІЗКО ВІДЛІТАЄ за екран і зникає!
                
                // 1. Летить до воротаря
                ball.style.transition = 'transform 0.35s ease-out';
                ball.style.transform = `translateX(calc(-50% + ${pos.x})) translateY(${pos.y}) scale(${pos.s}) rotate(${Math.random() * 1080}deg)`;
                
                // 2. Воротар відбиває (через 350мс м'яч різко змінює траєкторію)
                setTimeout(() => {
                    const bounceX = (Math.random() > 0.5 ? 1 : -1) * (1500 + Math.random() * 1000); // Вилітає дуже далеко
                    const bounceY = -800 - Math.random() * 1000; 
                    const bounceS = 0.2 + Math.random() * 0.3; 
                    
                    // Різкий відскок + зникнення (opacity: 0)
                    ball.style.transition = 'transform 0.3s cubic-bezier(0.5, 0, 1, 0.5), opacity 0.3s ease-in';
                    ball.style.transform = `translateX(calc(-50% + ${bounceX}px)) translateY(${bounceY}px) scale(${bounceS}) rotate(${Math.random() * 2000}deg)`;
                    ball.style.opacity = '0'; // М'яч розчиняється
                }, 350);
            }
            
            setTimeout(() => { goalie.style.transform = goalieDive; }, 80);

            // Оцінка удару 
            setTimeout(() => {
                if (isGoal) {
                    goalNet.classList.add('goal-hit');
                    setTimeout(() => goalNet.classList.remove('goal-hit'), 400);

                    potentialWin = Math.floor(currentBet * multipliers[currentStep]);
                    currentStep++;
                    addHistory(true);
                    showMsg("ГОЛ!", "msg-goal");
                    document.getElementById('sound-win').currentTime = 0;
                    document.getElementById('sound-win').play().catch(()=>{});
                    
                    if (currentStep >= 5) setTimeout(() => collectWinnings(), 1500); 
                    else setTimeout(() => resetPitch(), 1500); 
                } else {
                    addHistory(false);
                    showMsg("СЕЙВ!", "msg-save");
                    document.getElementById('sound-lose').currentTime = 0;
                    document.getElementById('sound-lose').play().catch(()=>{});
                    saveGameResult("Penalty", currentBet, -currentBet);
                    currentStep = -1; potentialWin = 0;
                    setTimeout(() => resetPitch(), 2000);
                }
            }, 400); 
        }

        async function collectWinnings() {
            if (potentialWin <= 0 || (isAnimating && currentStep < 5)) return;
            isAnimating = true;

            showMsg(`ВИГРАШ:\n${potentialWin} 🪙`, "msg-win");
            document.getElementById('sound-collect').currentTime = 0;
            document.getElementById('sound-collect').play().catch(()=>{});
            
            await userRef.once('value').then(s => { userRef.update({ chips: s.val().chips + potentialWin }); });
            await saveGameResult("Penalty", currentBet, potentialWin - currentBet);

            setTimeout(() => {
                currentStep = -1; potentialWin = 0; resetPitch();
            }, 2500);
        }

        function resetPitch() {
            const ball = document.getElementById('ball');
            const goalie = document.getElementById('goalkeeper');
            
            ball.style.transition = 'none'; goalie.style.transition = 'none';
            ball.style.transform = 'translateX(-50%) translateY(0) scale(1) rotate(0deg)';
            ball.style.opacity = '1'; // Повертаємо видимість м'яча!
            goalie.style.transform = 'translateX(-50%) translateY(0) rotate(0deg) scale(1)';
            
            setTimeout(() => {
                // Відновлюємо плавні переходи (з урахуванням opacity)
                ball.style.transition = 'transform 0.45s cubic-bezier(0.1, 0.9, 0.2, 1), opacity 0.2s';
                goalie.style.transition = 'transform 0.45s cubic-bezier(0.2, 0.9, 0.3, 1.1)';
                isAnimating = false; updateUI();
            }, 50);
        }

        async function saveGameResult(gameName, bet, profit) {
    const username = localStorage.getItem('casino_user');
    if (!username) return;
    const timestamp = firebase.database.ServerValue.TIMESTAMP;
    await database.ref('users_by_name/' + username.toLowerCase() + '/game_history').push({
        game: gameName,
        bet: parseFloat(bet),
        profit: parseFloat(profit),
        ts: timestamp
    });
    await database.ref('users_by_name/' + username.toLowerCase() + '/total_games')
        .set(firebase.database.ServerValue.increment(1));
}
    </script>
