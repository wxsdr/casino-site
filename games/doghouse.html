<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Diamond Casino | The Dog House</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --gold: #ffdf00; --gold-dark: #b8860b; 
            --wood-light: #8b5a2b; --wood-dark: #4e2e11; --wood-border: #2e1a09;
            --neon: #00ff9d; --red: #ff3366; --bg-sky: #6cb4ee;
        }
        
        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%); 
            color: white; font-family: 'Segoe UI', Tahoma, sans-serif; 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column;
            position: relative;
        }

        /* АНІМОВАНИЙ ФОН */
        .sky-elements { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .sun-rays { position: absolute; top: -50%; left: 50%; width: 200%; height: 200%; margin-left: -100%; background: repeating-conic-gradient(from 0deg, rgba(255,255,255,0.1) 0deg 15deg, transparent 15deg 30deg); animation: rotateRays 60s linear infinite; }
        .cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.8; filter: blur(2px); animation: floatClouds linear infinite; }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
        .c1 { width: 150px; height: 50px; top: 10%; left: -200px; animation-duration: 40s; }
        .c1::before { width: 70px; height: 70px; top: -30px; left: 20px; }
        .c1::after { width: 50px; height: 50px; top: -20px; right: 20px; }
        .c2 { width: 200px; height: 60px; top: 30%; left: -250px; animation-duration: 55s; opacity: 0.5; transform: scale(0.8); }
        .c2::before { width: 90px; height: 90px; top: -40px; left: 30px; }
        .c2::after { width: 70px; height: 70px; top: -30px; right: 30px; }
        .grass-layer { position: absolute; bottom: 0; left: 0; width: 100%; height: 150px; background: linear-gradient(to bottom, #2e8b57, #006400); border-top: 5px solid #3cb371; z-index: 1; box-shadow: inset 0 20px 20px rgba(0,0,0,0.3); }

        @keyframes rotateRays { 100% { transform: rotate(360deg); } }
        @keyframes floatClouds { 100% { transform: translateX(120vw); } }

        /* НАВІГАЦІЯ */
        .nav-bar { 
            padding: 15px 40px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .back-btn { 
            background: linear-gradient(to bottom, #333, #111); color: var(--gold); 
            border: 1px solid var(--gold); padding: 10px 25px; border-radius: 8px; 
            cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.3s;
        }
        .back-btn:hover { background: var(--gold); color: black; box-shadow: 0 0 20px var(--gold); }

        .main-layout { display: flex; justify-content: center; align-items: center; flex: 1; padding: 20px; gap: 50px; z-index: 10; }

        /* ДИЗАЙН СОБАЧОЇ БУДКИ (ЕКСТРА-ДЕТАЛІЗАЦІЯ) */
        .dog-house-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; filter: drop-shadow(0 30px 40px rgba(0,0,0,0.6)); }

        .roof {
            width: 820px; height: 140px;
            background: linear-gradient(to bottom, #e53935, #b71c1c);
            border: 8px solid #3e2723; border-bottom: 12px solid #2e1a09;
            border-radius: 80px 80px 15px 15px; position: relative; z-index: 10;
            box-shadow: inset 0 15px 15px rgba(255,255,255,0.3), 0 15px 20px rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
        }
        .roof::before {
            content: ''; position: absolute; top: 10px; left: 20px; right: 20px; bottom: 10px;
            border-radius: 60px 60px 5px 5px; border: 3px solid rgba(255,255,255,0.1); pointer-events: none;
        }
        .roof-title {
            font-size: 58px; font-weight: 900; color: #ffdf00;
            text-shadow: 4px 4px 0 #8b0000, -2px -2px 0 #fff, 0 15px 20px rgba(0,0,0,0.8);
            letter-spacing: 3px; font-family: 'Impact', sans-serif; -webkit-text-stroke: 2px #5c3211;
        }

        .slot-container {
            background: linear-gradient(135deg, var(--wood-light), var(--wood-dark));
            border: 20px solid var(--wood-border); border-top: none;
            border-radius: 0 0 25px 25px; padding: 25px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9);
            position: relative; top: -15px;
        }
        
        .vine { position: absolute; font-size: 70px; filter: drop-shadow(3px 5px 5px rgba(0,0,0,0.6)); z-index: 20; }
        .vine.left { top: 10%; left: -55px; transform: rotate(-20deg); }
        .vine.right { top: 10%; right: -55px; transform: scaleX(-1) rotate(-20deg); }

        .slot-grid {
            display: grid; grid-template-columns: repeat(5, 130px); grid-template-rows: repeat(3, 120px);
            gap: 10px; background: #0a0a0a; padding: 12px; border-radius: 12px;
            border: 6px solid #1a0d04; box-shadow: inset 0 0 40px #000;
        }

        .reel-item {
            background: linear-gradient(180deg, #ffffff 0%, #d4e4f7 100%);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 65px; border: 2px solid #b0c4de;
            box-shadow: inset 0 10px 15px rgba(255,255,255,0.8), inset 0 -10px 20px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.6);
            position: relative; user-select: none; transition: filter 0.1s;
        }

        .reel-item.spinning-blur { filter: blur(3px); transform: translateY(5px); }

        .reel-item.sticky {
            background: radial-gradient(circle at center, #ffeaa7 0%, #fdcb6e 100%);
            border: 3px solid #d63031; box-shadow: 0 0 30px rgba(253, 203, 110, 0.8), inset 0 0 20px rgba(255,255,255,0.7);
            animation: wildPulse 1.5s infinite;
        }
        @keyframes wildPulse { 0% { filter: brightness(1); transform: scale(1); } 50% { filter: brightness(1.15); transform: scale(1.02); } 100% { filter: brightness(1); transform: scale(1); } }

        .wild-multiplier {
            position: absolute; bottom: 5px; right: 5px; background: #d63031; color: white; 
            font-size: 22px; font-weight: 900; padding: 2px 10px; border-radius: 6px; 
            border: 2px solid white; box-shadow: 2px 2px 8px rgba(0,0,0,0.6); font-family: 'Impact', sans-serif;
        }

        /* ПАНЕЛЬ УПРАВЛІННЯ (СКЛО ТА НЕОН) */
        .control-panel {
            background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(25px);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05); 
            padding: 30px; width: 380px; display: flex; flex-direction: column; gap: 20px;
        }

        .status-box { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center; box-shadow: inset 0 5px 15px rgba(0,0,0,0.5); }
        #status-text { font-size: 22px; font-weight: 900; color: var(--gold); text-transform: uppercase; text-shadow: 0 0 15px rgba(255,223,0,0.4); letter-spacing: 1px; }

        .bet-controls { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 10px; }
        .bet-btn { 
            background: linear-gradient(to bottom, #444, #222); color: white; border: 1px solid #555; 
            width: 50px; height: 50px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 20px;
            box-shadow: 0 4px 0 #111, 0 5px 10px rgba(0,0,0,0.5); transition: 0.1s;
        }
        .bet-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #111; }
        .bet-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .spin-btn {
            padding: 25px; font-size: 28px; font-weight: 900; border: none; border-radius: 15px; 
            cursor: pointer; transition: 0.2s; background: linear-gradient(to bottom, #00ff9d, #00b347); 
            color: #000; box-shadow: 0 8px 0 #006622, 0 15px 30px rgba(0, 255, 157, 0.4); 
            text-transform: uppercase; letter-spacing: 2px;
        }
        .spin-btn:active:not(:disabled) { transform: translateY(8px); box-shadow: 0 0 0 #006622; }
        .spin-btn:disabled { background: #444; color: #777; box-shadow: 0 8px 0 #222; cursor: not-allowed; }

        .buy-bonus-btn {
            background: linear-gradient(to bottom, #ff4757, #ff6b81); border: none; color: white; 
            padding: 15px; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 6px 0 #c0392b, 0 10px 20px rgba(255, 71, 87, 0.4); transition: 0.2s; text-transform: uppercase;
        }
        .buy-bonus-btn:active:not(:disabled) { transform: translateY(6px); box-shadow: 0 0 0 #c0392b; }
        .buy-bonus-btn:disabled { filter: grayscale(100%); opacity: 0.6; cursor: not-allowed; }

        /* КАСТОМНІ МОДАЛЬНІ ВІКНА (ЗАМІСТЬ ALERT) */
        .custom-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 9999;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .custom-modal-overlay.show { display: flex; opacity: 1; }
        .custom-modal {
            background: linear-gradient(135deg, #1e1e24, #121217); border: 2px solid var(--gold);
            padding: 40px 50px; border-radius: 20px; text-align: center;
            box-shadow: 0 0 60px rgba(255, 223, 0, 0.2), inset 0 0 20px rgba(255,255,255,0.05);
            transform: scale(0.8); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 400px;
        }
        .custom-modal-overlay.show .custom-modal { transform: scale(1); }
        .custom-modal h2 { margin: 0 0 15px 0; font-size: 32px; color: var(--gold); letter-spacing: 2px; }
        .custom-modal p { font-size: 20px; color: #ddd; margin-bottom: 30px; line-height: 1.5; }
        .modal-buttons { display: flex; justify-content: center; gap: 20px; }
        .modal-btn {
            padding: 15px 35px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        .modal-btn.confirm { background: var(--neon); color: black; box-shadow: 0 0 20px rgba(0,255,157,0.4); }
        .modal-btn.confirm:hover { transform: translateY(-3px); box-shadow: 0 0 30px rgba(0,255,157,0.6); }
        .modal-btn.cancel { background: #333; color: white; border: 1px solid #555; }
        .modal-btn.cancel:hover { background: #444; }

        .bonus-active { color: var(--red) !important; text-shadow: 0 0 25px var(--red) !important; font-size: 26px !important; animation: bonusGlow 1s infinite alternate; }
        @keyframes bonusGlow { from { filter: brightness(1); } to { filter: brightness(1.5); transform: scale(1.05); } }
    </style>
</head>
<body>

    <!-- ФОНОВІ ЕЛЕМЕНТИ -->
    <div class="sky-elements">
        <div class="sun-rays"></div>
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
    </div>
    <div class="grass-layer"></div>

    <div class="nav-bar">
        <button class="back-btn" onclick="leaveGame()">⬅ В лобі</button>
        <div style="font-size: 22px; font-weight: bold; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 12px; border: 1px solid var(--gold);">
            БАЛАНС: <strong id="balance-display" style="color: var(--neon); font-size: 28px; margin-left: 10px; text-shadow: 0 0 10px rgba(0,255,157,0.5);">0</strong> 🪙
        </div>
    </div>

    <!-- КАСТОМНЕ МОДАЛЬНЕ ВІКНО -->
    <div class="custom-modal-overlay" id="ui-modal">
        <div class="custom-modal">
            <h2 id="modal-title">ЗАГОЛОВОК</h2>
            <p id="modal-desc">Опис події</p>
            <div class="modal-buttons" id="modal-actions">
                <!-- Кнопки генеруються через JS -->
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div class="dog-house-wrapper">
            <div class="roof"><div class="roof-title">THE DOG HOUSE</div></div>
            <div class="slot-container">
                <div class="vine left">🌿</div>
                <div class="vine right">🌿</div>
                <div class="slot-grid" id="slot-grid"></div>
            </div>
        </div>

        <div class="control-panel">
            <div class="status-box">
                <div id="status-text">ОЧІКУВАННЯ СТАВКИ...</div>
            </div>

            <div class="status-box">
                <div style="color: #aaa; font-size: 16px; margin-bottom: 12px; font-weight: bold; letter-spacing: 1px;">СТАВКА (🪙)</div>
                <div class="bet-controls">
                    <button class="bet-btn" onclick="changeBet(-10)">-</button>
                    <span id="current-bet" style="font-size: 32px; font-weight: 900; color: white;">10</span>
                    <button class="bet-btn" onclick="changeBet(10)">+</button>
                </div>
            </div>

            <button class="spin-btn" id="spin-btn" onclick="spin()">КРУТИТИ</button>
            <button class="buy-bonus-btn" id="buy-bonus-btn" onclick="requestBonusBuy()">
                КУПИТИ БОНУС <br><span style="font-size: 16px; font-weight: normal; opacity: 0.9;" id="bonus-cost-text">(1000 🪙)</span>
            </button>
        </div>
    </div>

    <script>
        // ==========================================
        // UI МОДАЛЬНІ ВІКНА (Заміна Alert)
        // ==========================================
        function showModal(title, desc, isConfirm = false, onConfirm = null) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            
            const actionsBox = document.getElementById('modal-actions');
            actionsBox.innerHTML = '';

            if (isConfirm) {
                const btnConfirm = document.createElement('button');
                btnConfirm.className = 'modal-btn confirm';
                btnConfirm.innerText = 'ПІДТВЕРДИТИ';
                btnConfirm.onclick = () => { closeModal(); if(onConfirm) onConfirm(); };
                
                const btnCancel = document.createElement('button');
                btnCancel.className = 'modal-btn cancel';
                btnCancel.innerText = 'СКАСУВАТИ';
                btnCancel.onclick = closeModal;

                actionsBox.appendChild(btnConfirm);
                actionsBox.appendChild(btnCancel);
            } else {
                const btnOk = document.createElement('button');
                btnOk.className = 'modal-btn confirm';
                btnOk.innerText = 'ОК';
                btnOk.onclick = closeModal;
                actionsBox.appendChild(btnOk);
            }

            const overlay = document.getElementById('ui-modal');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('show'), 10);
        }

        function closeModal() {
            const overlay = document.getElementById('ui-modal');
            overlay.classList.remove('show');
            setTimeout(() => overlay.style.display = 'none', 300);
        }

        // ІНІЦІАЛІЗАЦІЯ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyC1HOC3_im8YiziljGqpR_0AvHLQctIfxQ",
            authDomain: "kurahivka-casino.firebaseapp.com",
            databaseURL: "https://kurahivka-casino-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "kurahivka-casino"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const username = localStorage.getItem('casino_user');
        if (!username) window.location.href = '../index.html';

        let currentBalance = 0;
        const userRef = database.ref('users_by_name/' + username.toLowerCase());
        
        userRef.on('value', snap => {
            const data = snap.val();
            // Блокування, якщо вийшов з казино
            if (data && data.in_casino === false) {
                showModal("🚫 ДОСТУП ЗАБЛОКОВАНО", "Ви покинули територію казино. Поверніться, щоб продовжити гру.", false, () => leaveGame());
            }
            currentBalance = data ? (data.chips || 0) : 0;
            document.getElementById('balance-display').innerText = currentBalance;
        });

        function leaveGame() { window.location.href = '../index.html'; }

        // ==========================================
        // ЛОГІКА СЛОТА
        // ==========================================
        const standardSymbols = ['🐕', '🐩', '🦮', '🦴', '📿', 'A', 'K', 'Q', 'J']; 
        const scatterSymbol = '🐾'; 
        const wildSymbol = '🏠'; 

        const gridElement = document.getElementById('slot-grid');
        let isSpinning = false;
        let isBonusGame = false;
        let freeSpinsLeft = 0;
        let stickyWilds = {}; 
        let currentBet = 10;

        function changeBet(amount) {
            if (isSpinning || isBonusGame) return;
            let newBet = currentBet + amount;
            if (newBet >= 10 && newBet <= 5000) {
                currentBet = newBet;
                document.getElementById('current-bet').innerText = currentBet;
                document.getElementById('bonus-cost-text').innerText = `(${currentBet * 100} 🪙)`;
            }
        }

        function drawGrid(matrix, applyBlur = false) {
            gridElement.innerHTML = '';
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 5; c++) {
                    const div = document.createElement('div');
                    div.className = 'reel-item';
                    if (applyBlur) div.classList.add('spinning-blur');
                    
                    if (isBonusGame && stickyWilds[`${r}-${c}`]) {
                        div.innerHTML = `${wildSymbol}<div class="wild-multiplier">x${stickyWilds[`${r}-${c}`]}</div>`;
                        div.classList.add('sticky');
                        div.classList.remove('spinning-blur'); // Будки не блюряться
                    } else if (!applyBlur && matrix[r][c] === wildSymbol) {
                        let mult = Math.random() > 0.5 ? 2 : 3;
                        div.innerHTML = `${wildSymbol}<div class="wild-multiplier">x${mult}</div>`;
                        div.classList.add('sticky');
                    } else {
                        div.innerHTML = matrix[r][c] || '❔';
                    }
                    gridElement.appendChild(div);
                }
            }
        }
        drawGrid([[],[],[]]); 

        function generateRandomMatrix(forceScatters = false) {
            let matrix = [];
            for (let r = 0; r < 3; r++) {
                let row = [];
                for (let c = 0; c < 5; c++) {
                    if (forceScatters && r === 1 && (c === 0 || c === 2 || c === 4)) {
                        row.push(scatterSymbol); continue;
                    }
                    let isScatterReel = (c === 0 || c === 2 || c === 4);
                    if (!isBonusGame && !forceScatters && isScatterReel && Math.random() < 0.05) {
                        row.push(scatterSymbol);
                    } else {
                        if ((c === 1 || c === 2 || c === 3) && Math.random() < 0.12) {
                            row.push(wildSymbol);
                        } else {
                            row.push(standardSymbols[Math.floor(Math.random() * standardSymbols.length)]);
                        }
                    }
                }
                matrix.push(row);
            }
            return matrix;
        }

        // КУПІВЛЯ БОНУСУ
        function requestBonusBuy() {
            const cost = currentBet * 100;
            if (isSpinning || isBonusGame) return;
            if (currentBalance < cost) {
                showModal("ПОМИЛКА", `Недостатньо фішок!\nПотрібно: ${cost} 🪙\nВаш баланс: ${currentBalance} 🪙`);
                return;
            }
            showModal("ПОКУПКА БОНУСУ", `Ви впевнені, що хочете купити бонусну гру за ${cost} 🪙?`, true, () => executeBonusBuy(cost));
        }

        async function executeBonusBuy(cost) {
            isSpinning = true;
            lockButtons(true);
            await userRef.update({ chips: currentBalance - cost });
            document.getElementById('status-text').innerText = "ПОКУПКА БОНУСУ...";
            runSpinAnimation(true);
        }

        // ЗВИЧАЙНИЙ СПІН
        async function spin() {
            if (isSpinning) return;
            if (!isBonusGame && currentBalance < currentBet) {
                showModal("ПОМИЛКА", "Недостатньо фішок для ставки!"); return;
            }
            isSpinning = true;
            lockButtons(true);
            const statusText = document.getElementById('status-text');
            statusText.innerText = "КРУТИМО...";
            statusText.style.color = "white";

            if (!isBonusGame) await userRef.update({ chips: currentBalance - currentBet });
            else freeSpinsLeft--;

            runSpinAnimation(false);
        }

        function runSpinAnimation(forceScatters) {
            let spinsCount = 0;
            let spinInterval = setInterval(() => {
                drawGrid(generateRandomMatrix(), true); // true = apply blur
                spinsCount++;
                if (spinsCount > 12) {
                    clearInterval(spinInterval);
                    finalizeSpin(forceScatters);
                }
            }, 80);
        }

        async function finalizeSpin(forceScatters) {
            let finalMatrix = generateRandomMatrix(forceScatters);
            let scatterCount = 0;

            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 5; c++) {
                    if (isBonusGame && !stickyWilds[`${r}-${c}`] && finalMatrix[r][c] === wildSymbol && (c === 1 || c === 2 || c === 3)) {
                        stickyWilds[`${r}-${c}`] = Math.random() > 0.5 ? 2 : 3; 
                    }
                    if (finalMatrix[r][c] === scatterSymbol) scatterCount++;
                }
            }
            drawGrid(finalMatrix, false); // Знімаємо блюр
            await checkWin(finalMatrix, scatterCount);
        }

        async function checkWin(matrix, scatterCount) {
            let winAmount = 0;
            const statusText = document.getElementById('status-text');

            for (let r = 0; r < 3; r++) {
                if (matrix[r][0] === matrix[r][1] || matrix[r][1] === wildSymbol) {
                    if(Math.random() > 0.6) {
                        let lineWin = currentBet * (Math.floor(Math.random() * 5) + 1);
                        let multiplier = 1;
                        for(let c = 1; c <= 3; c++) if(stickyWilds[`${r}-${c}`]) multiplier += stickyWilds[`${r}-${c}`];
                        winAmount += (lineWin * (multiplier > 1 ? multiplier : 1));
                    }
                }
            }

            if (winAmount > 0) {
                statusText.innerHTML = `ВИГРАШ: +${winAmount} 🪙`;
                statusText.style.color = "var(--neon)";
                await userRef.once('value').then(s => { userRef.update({ chips: s.val().chips + winAmount }); });
            } else if (!isBonusGame) {
                statusText.innerText = "НЕ ПОЩАСТИЛО";
                statusText.style.color = "var(--red)";
            }

            setTimeout(() => {
                if (!isBonusGame && scatterCount >= 3) startBonusGame();
                else if (isBonusGame && freeSpinsLeft <= 0) endBonusGame();
                else if (isBonusGame && freeSpinsLeft > 0) {
                    statusText.innerText = `ФРІСПІНИ: ${freeSpinsLeft}`;
                    document.getElementById('spin-btn').disabled = false;
                    isSpinning = false;
                } else resetControls();
            }, 800);
        }

        function startBonusGame() {
            isBonusGame = true;
            freeSpinsLeft = Math.floor(Math.random() * 10) + 9; 
            stickyWilds = {}; 
            
            const statusText = document.getElementById('status-text');
            statusText.innerText = `🔥 БОНУСКА: ${freeSpinsLeft} 🔥`;
            statusText.className = "bonus-active";
            
            const spinBtn = document.getElementById('spin-btn');
            spinBtn.innerText = "ФРІСПІН";
            spinBtn.style.background = "var(--red)";
            spinBtn.style.boxShadow = "0 8px 0 #8b0000";
            
            showModal("БОНУСНА ГРА", `🐾 Ви спіймали Скатери!\nОтримано безкоштовних обертань: ${freeSpinsLeft}.\nВсі будки тепер стають липкими!`);
            
            isSpinning = false;
            spinBtn.disabled = false;
        }

        function endBonusGame() {
            showModal("БОНУС ЗАВЕРШЕНО", "Усі безкоштовні обертання були використані. Повертаємось до звичайної гри.");
            isBonusGame = false;
            stickyWilds = {};
            document.getElementById('status-text').className = "";
            resetControls();
        }

        function resetControls() {
            isSpinning = false;
            lockButtons(false);
            document.getElementById('status-text').innerText = "ОЧІКУВАННЯ СТАВКИ...";
            document.getElementById('status-text').style.color = "var(--gold)";
            
            const spinBtn = document.getElementById('spin-btn');
            spinBtn.innerText = "КРУТИТИ";
            spinBtn.style.background = "linear-gradient(to bottom, #00ff9d, #00b347)";
            spinBtn.style.boxShadow = "0 8px 0 #006622, 0 15px 30px rgba(0, 255, 157, 0.4)";
        }

        function lockButtons(lock) {
            document.getElementById('spin-btn').disabled = lock;
            document.getElementById('buy-bonus-btn').disabled = lock;
            document.querySelectorAll('.bet-btn').forEach(btn => btn.disabled = lock);
        }
    </script>
</body>
</html>
