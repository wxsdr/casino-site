<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Aviator | Diamond Casino</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-main: #000000; 
            --bg-panel: #1b1c1d; 
            --bg-box: #252528;
            --aviator-red: #e5053a; 
            --aviator-green: #28a745; 
            --aviator-orange: #d97d0d;
            --text-gray: #9ca3af;
        }
        
        body { margin: 0; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; background: var(--bg-main); user-select: none;}

        /* НАВІГАЦІЯ */
        .nav-bar { padding: 0 20px; background: #111112; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; z-index: 100; height: 50px; box-sizing: border-box;}
        .back-btn { background: transparent; color: #fff; border: 1px solid #444; padding: 6px 15px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-weight: bold; font-size: 11px; text-transform: uppercase;}
        .back-btn:hover { background: #333; border-color: #666;}
        
        .header-center { font-size: 13px; color: #888; font-weight: bold; display: flex; align-items: center;}
        .header-center span { color: #fff; margin-left: 5px; }

        .balance-display { font-size: 14px; font-weight: 900; color: var(--aviator-green); border: 1px solid var(--aviator-green); padding: 4px 15px; border-radius: 20px; background: rgba(40, 167, 69, 0.1);}

        /* ЛЕЙАУТ */
        .game-layout { display: flex; flex: 1; height: calc(100vh - 50px); padding: 10px; gap: 10px; box-sizing: border-box;}

        /* 1. ЛІВА ПАНЕЛЬ (ІСТОРІЯ СТАВОК) */
        .left-panel { width: 320px; background: var(--bg-panel); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #222;}
        .panel-header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: #111112; border-bottom: 1px solid #222;}
        .panel-header div { font-size: 10px; color: #777; font-weight: 800; text-transform: uppercase;}
        
        .bets-list { flex: 1; overflow-y: auto; padding: 5px; background: #151516;}
        
        .bet-item { display: flex; justify-content: space-between; padding: 8px 10px; background: #1b1c1d; margin-bottom: 3px; border-radius: 6px; font-size: 12px; align-items: center; border: 1px solid transparent;}
        .bet-item.won { border-color: rgba(40, 167, 69, 0.3); background: rgba(40, 167, 69, 0.05);}
        .bet-user { display: flex; align-items: center; gap: 8px; width: 40%; overflow: hidden; color: #aaa;}
        .avatar { width: 22px; height: 22px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white;}
        .bet-amount { color: #fff; width: 20%; text-align: left; font-weight: bold;}
        .bet-multi { color: var(--text-gray); width: 15%; text-align: center; background: rgba(255,255,255,0.05); padding: 2px 5px; border-radius: 10px;}
        .bet-item.won .bet-multi { color: var(--aviator-green); background: rgba(40,167,69,0.1); font-weight: bold;}
        .bet-win { color: white; font-weight: bold; width: 25%; text-align: right;}

        /* 2. ПРАВА ПАНЕЛЬ (ГРА + КЕРУВАННЯ) */
        .right-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 600px;}

        /* ЕКРАН ГРИ */
        .game-screen { flex: 1; background: #121414; border-radius: 10px; border: 1px solid #222; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        
        /* Промені на фоні */
        .sunburst { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: repeating-conic-gradient(from 0deg, #1b1c1d 0deg 10deg, #161719 10deg 20deg); animation: rotate-bg 120s linear infinite; z-index: 1;}
        @keyframes rotate-bg { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Canvas для літака */
        #gameCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5;}

        /* Текст множника */
        .multiplier-text { position: absolute; z-index: 10; font-size: 110px; font-weight: 900; color: white; text-shadow: 0 0 20px rgba(0,0,0,0.8); pointer-events: none;}
        .crashed-text { position: absolute; z-index: 10; font-size: 40px; font-weight: 900; color: var(--aviator-red); top: 30%; text-shadow: 0 0 10px rgba(0,0,0,0.8); opacity: 0; transition: 0.3s;}
        
        /* Смужка очікування */
        .loading-container { position: absolute; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 10px; display: none;}
        .loading-text { font-size: 24px; font-weight: 900; color: var(--aviator-red); animation: pulse 1.5s infinite;}
        .loading-bar { width: 300px; height: 6px; background: #333; border-radius: 3px; overflow: hidden;}
        .loading-fill { height: 100%; background: var(--aviator-red); width: 100%;}
        @keyframes pulse { 0% { opacity: 1;} 50% { opacity: 0.5;} 100% { opacity: 1;} }

        /* ПАНЕЛЬ КЕРУВАННЯ (ДВІ СТАВКИ ЯК НА СКРІНІ) */
        .controls-area { display: flex; gap: 10px; height: 160px;}
        
        .bet-box { flex: 1; background: var(--bg-box); border-radius: 10px; border: 1px solid #333; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box;}
        
        /* Таби (Ставка / Авто) */
        .bet-tabs { display: flex; justify-content: center; gap: 30px; margin-bottom: 10px;}
        .bet-tab { color: #888; font-size: 12px; font-weight: bold; cursor: pointer; padding-bottom: 4px; transition: 0.2s;}
        .bet-tab.active { color: white; border-bottom: 2px solid var(--aviator-red);}

        .bet-main-row { display: flex; gap: 10px; flex: 1;}

        /* Ліва частина боксу (Сума) */
        .bet-inputs { display: flex; flex-direction: column; justify-content: space-between; width: 160px;}
        
        .amount-control { display: flex; align-items: center; justify-content: space-between; background: #000; border-radius: 20px; border: 1px solid #444; padding: 2px 4px;}
        .amt-btn { background: transparent; border: none; color: #888; font-size: 20px; width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: 0.2s;}
        .amt-btn:hover { background: #333; color: white;}
        .amt-input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; font-weight: bold; text-align: center; outline: none; width: 100%;}
        
        .quick-bets { display: grid; grid-template-columns: 1fr 1fr; gap: 6px;}
        .q-btn { background: #1b1c1d; color: #aaa; border: 1px solid #333; border-radius: 20px; font-size: 13px; font-weight: bold; padding: 5px 0; cursor: pointer; transition: 0.2s;}
        .q-btn:hover { background: #333; color: white;}

        /* Права частина боксу (Велика кнопка) */
        .action-container { flex: 1; display: flex;}
        
        .action-btn { flex: 1; border-radius: 10px; border: none; cursor: pointer; font-size: 24px; font-weight: 900; text-transform: uppercase; transition: 0.1s; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.4); text-shadow: 1px 1px 2px rgba(0,0,0,0.3);}
        .action-btn:active { transform: scale(0.98); }
        
        /* Стан кнопок */
        .btn-bet { background: #28a745; color: white; border: 1px solid #1e7e34;}
        .btn-bet:hover { background: #2fbc4f; }
        
        .btn-cancel { background: #cb0432; color: white; border: 1px solid #a30328;}
        .btn-cancel:hover { background: #e5053a; }
        
        .btn-cashout { background: #d97d0d; color: white; font-size: 20px; border: 1px solid #b56708;}
        .btn-cashout:hover { background: #f28b0d; }
        
        .cashout-amount { font-size: 16px; font-weight: 900; margin-top: 2px;}

        .btn-disabled { background: #2b2c2e; color: #555; cursor: not-allowed; box-shadow: none; border: 1px solid #333; text-shadow: none;}

        .btn-text-small { font-size: 14px; font-weight: normal; opacity: 0.9;}

    </style>
</head>

    <script>
        // ==========================================
        // БАЗА ДАНИХ FIREBASE ТА АВТОРИЗАЦІЯ
        // ==========================================
        const username = localStorage.getItem('casino_user');
        if (!username) {
            window.location.href = '../index.html';
        } else {
            initGame();
        }

        function initGame() {
            const firebaseConfig = {
                apiKey: "AIzaSyC1HOC3_im8YiziljGqpR_0AvHLQctIfxQ",
                authDomain: "kurahivka-casino.firebaseapp.com",
                databaseURL: "https://kurahivka-casino-default-rtdb.europe-west1.firebasedatabase.app/",
                projectId: "kurahivka-casino"
            };
            
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            const database = firebase.database();

            const myName = username.toLowerCase();
            document.getElementById('player-name').innerText = username;

            let currentBalance = 0;
            const userRef = database.ref('users_by_name/' + myName);
            
            userRef.on('value', snap => {
                const data = snap.val();
                if (data && data.in_casino === false) {
                    alert("Ви вийшли з казино!");
                    window.location.href = '../index.html';
                    return;
                }
                currentBalance = data ? (data.chips || 0) : 0;
                document.getElementById('balance-amount').innerText = currentBalance;
            });

            // ==========================================
            // СИНХРОНІЗАЦІЯ КІМНАТИ АВІАТОРА
            // ==========================================
            const roomRef = database.ref('tables/aviator_1');
            
            let gameState = 'waiting'; 
            let crashPoint = 1.00;
            let flightStartTime = 0;
            let currentMultiplier = 1.00;
            let waitingEndTime = 0;

            // Перевірка завислої кімнати
            roomRef.once('value', snap => {
                if(!snap.exists() || Date.now() - snap.val().lastUpdate > 15000) {
                    startNewRound(roomRef);
                }
            });

            roomRef.on('value', snap => {
                const data = snap.val();
                if (!data) return;

                gameState = data.status;
                crashPoint = data.crashPoint;
                flightStartTime = data.startTime;
                waitingEndTime = data.waitingEndTime;

                // Хост-логіка
                if (gameState === 'waiting' && Date.now() > waitingEndTime) {
                    if (!window.isGenerating) {
                        window.isGenerating = true;
                        roomRef.update({ status: 'flying', startTime: Date.now(), lastUpdate: Date.now() })
                            .then(() => { window.isGenerating = false; });
                    }
                }
                
                if (gameState === 'flying') {
                    let m = calculateMultiplier(Date.now() - flightStartTime);
                    if (m >= crashPoint) {
                        if (!window.isCrashing) {
                            window.isCrashing = true;
                            roomRef.update({ status: 'crashed', lastUpdate: Date.now() })
                                .then(() => { 
                                    setTimeout(() => {
                                        startNewRound(roomRef);
                                        window.isCrashing = false;
                                    }, 3000); 
                                });
                        }
                    }
                }

                updateUIVisuals();
            });

            // ==========================================
            // ЛОГІКА СТАВОК ТА КНОПОК
            // ==========================================
            window.myBets = {
                1: { state: 'none', amount: 0 }, 
                2: { state: 'none', amount: 0 }
            };

            window.adjustBet = function(box, amount) {
                let input = document.getElementById(`input-${box}`);
                let val = parseInt(input.value) + amount;
                if (val < 10) val = 10;
                input.value = val;
            };

            window.setBet = function(box, amount) {
                document.getElementById(`input-${box}`).value = amount;
            };

            window.handleAction = async function(box) {
                let betObj = window.myBets[box];
                let inputAmt = parseInt(document.getElementById(`input-${box}`).value);
                
                if (betObj.state === 'none' && gameState === 'waiting') {
                    if (inputAmt > currentBalance) return alert("Недостатньо фішок!");
                    await userRef.once('value').then(s => { userRef.update({ chips: s.val().chips - inputAmt }); });
                    
                    betObj.state = 'bet_placed';
                    betObj.amount = inputAmt;
                    addBetToList(username, inputAmt, '-', 0, false, `bet-row-${box}`); 
                    
                } else if (betObj.state === 'bet_placed' && gameState === 'waiting') {
                    await userRef.once('value').then(s => { userRef.update({ chips: s.val().chips + betObj.amount }); });
                    betObj.state = 'none';
                    betObj.amount = 0;
                    
                    let row = document.getElementById(`bet-row-${box}`);
                    if(row) row.remove();
                    
                } else if (betObj.state === 'playing' && gameState === 'flying') {
                    let winAmt = Math.floor(betObj.amount * currentMultiplier);
                    await userRef.once('value').then(s => { userRef.update({ chips: s.val().chips + winAmt }); });
                    
                    betObj.state = 'cashed_out';
                    
                    let row = document.getElementById(`bet-row-${box}`);
                    if(row) {
                        row.classList.add('won');
                        row.querySelector('.bet-multi').innerText = currentMultiplier.toFixed(2) + 'x';
                        row.querySelector('.bet-win').innerText = winAmt + ' 🪙';
                    }
                }
                updateButtons();
            };

            function updateButtons() {
                for (let i = 1; i <= 2; i++) {
                    let btn = document.getElementById(`btn-${i}`);
                    let input = document.getElementById(`input-${i}`);
                    let state = window.myBets[i].state;

                    if (state === 'bet_placed' && gameState === 'flying') window.myBets[i].state = 'playing';
                    if (state === 'playing' && gameState === 'crashed') window.myBets[i].state = 'lost';
                    state = window.myBets[i].state; 

                    if (state === 'none') {
                        btn.className = "action-btn btn-bet";
                        btn.innerHTML = gameState === 'waiting' ? `СТАВКА<div class="btn-text-small">${input.value} 🪙</div>` : "ОЧІКУВАННЯ...";
                        btn.disabled = gameState !== 'waiting';
                        if(gameState !== 'waiting') btn.classList.add('btn-disabled');
                        input.disabled = false;
                    } else if (state === 'bet_placed') {
                        btn.className = "action-btn btn-cancel";
                        btn.innerHTML = `СКАСУВАТИ<div class="btn-text-small">ОЧІКУВАННЯ СТАРТУ</div>`;
                        btn.disabled = false;
                        input.disabled = true;
                    } else if (state === 'playing') {
                        btn.className = "action-btn btn-cashout";
                        let win = Math.floor(window.myBets[i].amount * currentMultiplier);
                        btn.innerHTML = `ЗАБРАТИ<div class="cashout-amount">${win} 🪙</div>`;
                        btn.disabled = false;
                        input.disabled = true;
                    } else if (state === 'cashed_out') {
                        btn.className = "action-btn btn-disabled";
                        btn.innerHTML = "ЗАБРАВ";
                        btn.disabled = true;
                    } else if (state === 'lost') {
                        btn.className = "action-btn btn-disabled";
                        btn.innerHTML = "ПРОГРАШ";
                        btn.disabled = true;
                    }
                }
            }

            function addBetToList(user, amount, multi, win = 0, isWin = false, rowId = '') {
                let list = document.getElementById('bets-list');
                let div = document.createElement('div');
                div.className = `bet-item ${isWin ? 'won' : ''}`;
                if(rowId) div.id = rowId;
                let initial = user.charAt(0).toUpperCase();
                
                div.innerHTML = `
                    <div class="bet-user">
                        <div class="avatar">${initial}</div>
                        ${user}
                    </div>
                    <div class="bet-amount">${amount}</div>
                    <div class="bet-multi">${multi !== '-' ? multi : '-'}</div>
                    <div class="bet-win">${win > 0 ? win + ' 🪙' : ''}</div>
                `;
                list.prepend(div);
            }

            function startNewRound(dbRef) {
                let crash = 0.99 / Math.random();
                if (crash < 1.01) crash = 1.00; 
                
                dbRef.update({
                    status: 'waiting',
                    waitingEndTime: Date.now() + 5000, 
                    crashPoint: parseFloat(crash.toFixed(2)),
                    lastUpdate: Date.now()
                });

                for(let i=1; i<=2; i++) {
                    if(window.myBets[i].state === 'cashed_out' || window.myBets[i].state === 'lost') {
                        window.myBets[i].state = 'none';
                        window.myBets[i].amount = 0;
                    }
                }
                updateButtons();
                document.getElementById('bets-list').innerHTML = ''; 
            }

            // ==========================================
            // CANVAS АНІМАЦІЯ (АВІАТОР)
            // ==========================================
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const multiDisplay = document.getElementById('multiplier-display');
            const crashMsg = document.getElementById('crashed-msg');
            const loadingContainer = document.getElementById('loading-container');
            const loadingFill = document.getElementById('loading-fill');

            function resizeCanvas() {
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            function calculateMultiplier(ms) {
                return Math.max(1.00, Math.pow(Math.E, 0.06 * (ms / 1000)));
            }

            let crashedPlaneXOffset = 0;

            function drawGame() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (gameState === 'flying' || gameState === 'crashed') {
                    if (gameState === 'flying') {
                        currentMultiplier = calculateMultiplier(Date.now() - flightStartTime);
                        if (currentMultiplier > crashPoint) currentMultiplier = crashPoint;
                        crashedPlaneXOffset = 0; 
                    }

                    // Крива польоту (логарифмічна шкала для плавності)
                    let progress = Math.min(1, Math.log10(currentMultiplier) / 1.5); 
                    
                    let startX = 0;
                    let startY = canvas.height;
                    let endX = 50 + (canvas.width * 0.7) * progress;
                    let endY = canvas.height - 50 - (canvas.height * 0.7) * progress;

                    if (gameState === 'crashed') {
                        crashedPlaneXOffset += 30; // Літак різко відлітає вправо
                        endX += crashedPlaneXOffset;
                    }

                    if (gameState === 'flying') {
                        // Градієнт під кривою
                        let gradient = ctx.createLinearGradient(0, endY, 0, canvas.height);
                        gradient.addColorStop(0, 'rgba(229, 5, 58, 0.4)');
                        gradient.addColorStop(1, 'rgba(229, 5, 58, 0.0)');

                        ctx.beginPath();
                        ctx.moveTo(startX, canvas.height);
                        ctx.lineTo(startX, startY);
                        ctx.quadraticCurveTo(startX + (endX - startX)*0.5, canvas.height, endX, endY);
                        ctx.lineTo(endX, canvas.height);
                        ctx.fillStyle = gradient;
                        ctx.fill();

                        // Червона лінія
                        ctx.beginPath();
                        ctx.moveTo(startX, startY);
                        ctx.quadraticCurveTo(startX + (endX - startX)*0.5, canvas.height, endX, endY);
                        ctx.strokeStyle = '#e5053a';
                        ctx.lineWidth = 5;
                        ctx.stroke();
                    }

                    // Малювання червоного літака (SVG-like path)
                    ctx.save();
                    ctx.translate(endX, endY);
                    ctx.rotate(-Math.PI / 10); 
                    
                    ctx.fillStyle = '#e5053a';
                    ctx.beginPath();
                    ctx.moveTo(35, 0); 
                    ctx.lineTo(10, -5); 
                    ctx.lineTo(-15, -20); 
                    ctx.lineTo(-5, -5); 
                    ctx.lineTo(-25, -10); 
                    ctx.lineTo(-25, 10); 
                    ctx.lineTo(-5, 5); 
                    ctx.lineTo(-15, 20); 
                    ctx.lineTo(10, 5); 
                    ctx.closePath();
                    ctx.fill();
                    
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(-20, -5); ctx.lineTo(-15, 5);
                    ctx.moveTo(-15, -5); ctx.lineTo(-20, 5);
                    ctx.stroke();

                    ctx.restore();
                }

                requestAnimationFrame(drawGame);
            }
            drawGame();

            function updateUIVisuals() {
                if (gameState === 'waiting') {
                    multiDisplay.style.display = "none";
                    crashMsg.style.opacity = 0;
                    loadingContainer.style.display = "flex";
                    
                    let timeLeft = waitingEndTime - Date.now();
                    if(timeLeft < 0) timeLeft = 0;
                    loadingFill.style.width = `${(timeLeft / 5000) * 100}%`;

                } else if (gameState === 'flying') {
                    multiDisplay.style.display = "block";
                    multiDisplay.style.color = "white";
                    multiDisplay.innerText = currentMultiplier.toFixed(2) + "x";
                    
                    crashMsg.style.opacity = 0;
                    loadingContainer.style.display = "none";

                } else if (gameState === 'crashed') {
                    multiDisplay.style.color = "#e5053a";
                    multiDisplay.innerText = crashPoint.toFixed(2) + "x";
                    crashMsg.style.opacity = 1;
                }
                
                updateButtons();
            }

            setInterval(updateUIVisuals, 50);
        }
    </script>
</body>
</html>
