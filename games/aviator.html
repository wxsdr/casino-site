    <script>
        // ==========================================
        // ІНІЦІАЛІЗАЦІЯ
        // ==========================================
        const username = localStorage.getItem('casino_user');
        if (!username) window.location.href = '../index.html';

        const firebaseConfig = {
            apiKey: "AIzaSyC1HOC3_im8YiziljGqpR_0AvHLQctIfxQ",
            authDomain: "kurahivka-casino.firebaseapp.com",
            databaseURL: "https://kurahivka-casino-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "kurahivka-casino"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const myName = username.toLowerCase();
        document.getElementById('player-name').innerText = username;

        let serverTimeOffset = 0;
        database.ref(".info/serverTimeOffset").on("value", snap => {
            serverTimeOffset = snap.val() || 0;
        });
        function getServerTime() { return Date.now() + serverTimeOffset; }

        let currentBalance = 0;
        database.ref('users_by_name/' + myName).on('value', snap => {
            const data = snap.val();
            if (data && data.in_casino === false) {
                alert("Ви вийшли з казино!");
                window.location.href = '../index.html';
            }
            currentBalance = data ? (data.chips || 0) : 0;
            document.getElementById('balance-amount').innerText = currentBalance;
        });

        // ==========================================
        // СТАН ГРИ
        // ==========================================
        const roomRef = database.ref('tables/aviator_1');
        const betsRef = database.ref('tables/aviator_1/bets');

        let gameState = 'waiting';
        let crashPoint = 1.00;
        let flightStartTime = 0;
        let currentMultiplier = 1.00;
        let waitingEndTime = 0;
        let lastKnownRoundId = null;
        let prevGameState = null;

        // Таймер для запуску польоту — незалежний від Firebase listener
        let waitingTimer = null;
        // Захист від подвійного запису краш
        let crashWritten = false;

        // ==========================================
        // ІНІЦІАЛІЗАЦІЯ КІМНАТИ
        // ==========================================
        roomRef.once('value', snap => {
            const data = snap.val();
            const now = getServerTime();
            // Якщо кімнати немає або дані застаріли понад 25с — стартуємо новий раунд
            if (!data || (now - (data.lastUpdate || 0) > 25000)) {
                startNewRound();
            }
            // Якщо кімната є але вже минув час очікування і статус waiting — запускаємо
            else if (data.status === 'waiting' && now > (data.waitingEndTime || 0)) {
                triggerFlightStart();
            }
        });

        // ==========================================
        // FIREBASE LISTENER — ЄДИНЕ ДЖЕРЕЛО ПРАВДИ
        // ==========================================
        roomRef.on('value', snap => {
            const data = snap.val();
            if (!data) return;

            const newStatus = data.status;
            const newRoundId = data.roundId || data.waitingEndTime;
            const isNewRound = (newRoundId !== lastKnownRoundId);

            prevGameState = gameState;
            gameState = newStatus;

            if (isNewRound) {
                lastKnownRoundId = newRoundId;
            }

            crashPoint     = data.crashPoint  || 1.00;
            flightStartTime = data.startTime  || 0;
            waitingEndTime  = data.waitingEndTime || 0;

            renderHistory(data.history || []);

            // --- НОВИЙ РАУНД (waiting + новий roundId) ---
            if (newStatus === 'waiting' && isNewRound) {
                crashWritten = false;
                handleNewRound();
                // Ставимо таймер на запуск польоту
                scheduleFlightStart();
            }

            // --- waiting прийшов але roundId той самий (не новий раунд, просто повторний snap) ---
            if (newStatus === 'waiting' && !isNewRound) {
                // Перевіряємо чи таймер вже стоїть, якщо ні — ставимо
                if (!waitingTimer) {
                    scheduleFlightStart();
                }
            }

            // --- ПЕРЕХІД waiting -> flying ---
            if (prevGameState === 'waiting' && newStatus === 'flying') {
                activatePlacedBets();
            }

            // --- ПЕРЕХІД flying -> crashed ---
            if (prevGameState === 'flying' && newStatus === 'crashed') {
                markLostBets();
            }
        });

        // ==========================================
        // ТАЙМЕР ЗАПУСКУ ПОЛЬОТУ (незалежний від listener)
        // ==========================================
        function scheduleFlightStart() {
            // Очищаємо старий таймер якщо є
            if (waitingTimer) {
                clearTimeout(waitingTimer);
                waitingTimer = null;
            }

            const delay = Math.max(0, waitingEndTime - getServerTime());

            waitingTimer = setTimeout(() => {
                waitingTimer = null;
                triggerFlightStart();
            }, delay);
        }

        function triggerFlightStart() {
            // Читаємо актуальний стан і пишемо flying тільки якщо ще waiting
            roomRef.once('value', s => {
                const d = s.val();
                if (d && d.status === 'waiting') {
                    const now = getServerTime();
                    roomRef.update({
                        status: 'flying',
                        startTime: now,
                        lastUpdate: now
                    });
                }
            });
        }

        // ==========================================
        // КРАШ — виявляється в render loop
        // ==========================================
        function triggerCrash() {
            if (crashWritten) return;
            crashWritten = true;

            roomRef.once('value', s => {
                const d = s.val();
                if (d && d.status === 'flying') {
                    roomRef.update({ status: 'crashed', lastUpdate: getServerTime() });
                    setTimeout(() => startNewRound(crashPoint), 3000);
                }
            });
        }

        function startNewRound(lastCrash) {
            crashWritten = false;

            let crash = 0.99 / Math.random();
            if (crash < 1.01) crash = 1.00;
            crash = parseFloat(crash.toFixed(2));

            roomRef.once('value', snap => {
                const d = snap.val();
                if (!d || d.status === 'crashed') {
                    let hist = d ? (d.history || []) : [];
                    if (lastCrash != null) {
                        hist.unshift(parseFloat(parseFloat(lastCrash).toFixed(2)));
                        if (hist.length > 20) hist.pop();
                    }
                    const now = getServerTime();
                    roomRef.update({
                        status: 'waiting',
                        waitingEndTime: now + 10000,
                        crashPoint: crash,
                        startTime: 0,
                        lastUpdate: now,
                        roundId: now,
                        history: hist
                    });
                    betsRef.remove();
                }
            });
        }

        // ==========================================
        // УПРАВЛІННЯ СТАВКАМИ ПРИ ЗМІНІ РАУНДІВ
        // ==========================================

        // Новий раунд: скидаємо завершені, виставляємо queued
        // Використовуємо window.handleNewRound щоб авто-режим міг перевизначити
        function handleNewRound() { window.handleNewRound(); }
        window.handleNewRound = function() {
            for (let i = 1; i <= 2; i++) {
                const bet = window.myBets[i];

                if (bet.state === 'cashed_out' || bet.state === 'lost') {
                    bet.state = 'none';
                    bet.amount = 0;
                    bet.fbKey = null;
                }

                // Queued ставка — тепер ставимо її в цьому новому раунді
                if (bet.state === 'queued') {
                    const amt = bet.amount;
                    bet.state = 'placing';
                    placeBetToFirebase(i, amt).then(() => {
                        bet.state = 'bet_placed';
                    });
                }
            }
        };

        // Перехід waiting->flying: bet_placed стає playing
        function activatePlacedBets() {
            for (let i = 1; i <= 2; i++) {
                if (window.myBets[i].state === 'bet_placed' || window.myBets[i].state === 'placing') {
                    window.myBets[i].state = 'playing';
                }
            }
        }

        // Краш: playing стає lost
        function markLostBets() {
            for (let i = 1; i <= 2; i++) {
                const bet = window.myBets[i];
                if (bet.state === 'playing') {
                    bet.state = 'lost';
                    if (bet.fbKey) betsRef.child(bet.fbKey).update({ status: 'lost' });
                }
            }
        }

        // ==========================================
        // МУЛЬТИПЛЕЄР СТАВКИ
        // ==========================================
        let allBets = {};
        betsRef.on('value', snap => {
            allBets = snap.val() || {};
            renderBetsList();
        });

        const avatarColors = ['#e53935','#8e24aa','#3949ab','#039be5','#00897b','#fdd835','#fb8c00','#d81b60'];

        function renderBetsList() {
            const list = document.getElementById('bets-list');
            list.innerHTML = '';
            let totalAmount = 0, totalCount = 0;

            Object.keys(allBets).sort((a,b) => allBets[b].win - allBets[a].win).forEach(key => {
                const bet = allBets[key];
                totalAmount += bet.amount;
                totalCount++;
                const isMe = bet.user === myName;
                const div = document.createElement('div');
                div.className = `bet-item ${bet.status === 'cashed_out' ? 'won' : ''} ${bet.status === 'lost' ? 'lost' : ''}`;
                const initial = bet.user.charAt(0).toUpperCase();
                const color = avatarColors[initial.charCodeAt(0) % avatarColors.length];
                div.innerHTML = `
                    <div class="bet-user">
                        <div class="avatar" style="background:${color}">${initial}</div>
                        ${isMe ? bet.user : bet.user.substring(0,3)+'***'}
                    </div>
                    <div class="bet-amount">${bet.amount.toFixed(2)}</div>
                    <div class="bet-multi">${bet.multi > 0 ? bet.multi.toFixed(2)+'x' : '-'}</div>
                    <div class="bet-win">${bet.win > 0 ? bet.win.toFixed(2) : ''}</div>
                `;
                list.appendChild(div);
            });

            document.getElementById('total-bets-count').innerText = totalCount;
            document.getElementById('total-bets-amount').innerText = totalAmount.toFixed(2);
        }

        function renderHistory(hist) {
            const bar = document.getElementById('history-bar');
            bar.innerHTML = '';
            hist.forEach(val => {
                const colorClass = val < 2 ? 'hist-blue' : (val < 10 ? 'hist-purple' : 'hist-pink');
                bar.innerHTML += `<div class="hist-bubble ${colorClass}">${val.toFixed(2)}x</div>`;
            });
        }

        // ==========================================
        // МОЇ СТАВКИ
        // ==========================================
        window.myBets = {
            1: { state: 'none', amount: 0, fbKey: null },
            2: { state: 'none', amount: 0, fbKey: null }
        };

        window.adjustBet = function(box, amount) {
            const s = window.myBets[box].state;
            if (s !== 'none' && s !== 'lost' && s !== 'cashed_out') return;
            const input = document.getElementById(`input-${box}`);
            let val = parseInt(input.value) + amount;
            if (val < 10) val = 10;
            input.value = val;
            document.getElementById(`subtext-${box}`).innerText = val + ' 🪙';
        };

        window.setBet = function(box, amount) {
            const s = window.myBets[box].state;
            if (s !== 'none' && s !== 'lost' && s !== 'cashed_out') return;
            document.getElementById(`input-${box}`).value = amount;
            document.getElementById(`subtext-${box}`).innerText = amount + ' 🪙';
        };

        async function placeBetToFirebase(box, amount) {
            const userSnap = await database.ref('users_by_name/' + myName).once('value');
            await database.ref('users_by_name/' + myName).update({ chips: userSnap.val().chips - amount });
            const ref = betsRef.push();
            await ref.set({ user: myName, amount: amount, status: 'playing', win: 0, multi: 0 });
            window.myBets[box].fbKey = ref.key;
        }

        window.handleAction = async function(box) {
            const betObj = window.myBets[box];
            const inputAmt = parseInt(document.getElementById(`input-${box}`).value);

            if (betObj.state === 'none') {
                if (inputAmt > currentBalance) return alert("Недостатньо фішок!");

                if (gameState === 'waiting') {
                    // Ставка зараз — чекаємо старту цього раунду
                    betObj.state = 'bet_placed';
                    betObj.amount = inputAmt;
                    await placeBetToFirebase(box, inputAmt);

                } else if (gameState === 'flying') {
                    // Ставка на НАСТУПНИЙ раунд — тільки резервуємо, не знімаємо гроші зараз
                    betObj.state = 'queued';
                    betObj.amount = inputAmt;
                }

            } else if (betObj.state === 'bet_placed') {
                // Скасувати ставку під час waiting
                const userSnap = await database.ref('users_by_name/' + myName).once('value');
                await database.ref('users_by_name/' + myName).update({ chips: userSnap.val().chips + betObj.amount });
                if (betObj.fbKey) betsRef.child(betObj.fbKey).remove();
                betObj.state = 'none';
                betObj.amount = 0;
                betObj.fbKey = null;

            } else if (betObj.state === 'queued') {
                // Скасувати чергу
                betObj.state = 'none';
                betObj.amount = 0;
                betObj.fbKey = null;

            } else if (betObj.state === 'playing' && gameState === 'flying') {
                // Забрати виграш
                const winAmt = Math.floor(betObj.amount * currentMultiplier);
                const userSnap = await database.ref('users_by_name/' + myName).once('value');
                await database.ref('users_by_name/' + myName).update({ chips: userSnap.val().chips + winAmt });
                await saveGameResult("Aviator", betObj.amount, winAmt - betObj.amount);
                betObj.state = 'cashed_out';
                if (betObj.fbKey) {
                    betsRef.child(betObj.fbKey).update({ status: 'cashed_out', win: winAmt, multi: currentMultiplier });
                }
            }
        };

        // ==========================================
        // CANVAS РЕНДЕР 60FPS
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const multiDisplay = document.getElementById('multiplier-display');
        const crashMsg = document.getElementById('crashed-msg');
        const loadingContainer = document.getElementById('loading-container');
        const loadingFill = document.getElementById('loading-fill');
        const gameScreen = document.getElementById('game-screen');

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function calculateMultiplier(ms) {
            return Math.max(1.00, Math.pow(Math.E, 0.06 * (ms / 1000)));
        }

        function drawPlane(ctx) {
            ctx.fillStyle = '#e5053a';
            ctx.beginPath();
            ctx.moveTo(35, 0);
            ctx.lineTo(10, -5);
            ctx.lineTo(-15, -20);
            ctx.lineTo(-5, -5);
            ctx.lineTo(-25, -10);
            ctx.lineTo(-25, 10);
            ctx.lineTo(-5, 5);
            ctx.lineTo(-15, 20);
            ctx.lineTo(10, 5);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-20, -5); ctx.lineTo(-15, 5);
            ctx.moveTo(-15, -5); ctx.lineTo(-20, 5);
            ctx.stroke();
        }

        let crashedPlaneX = 0;
        let crashedPlaneY = 0;
        let lastRenderedState = null;

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const now = getServerTime();

            if (gameState !== lastRenderedState) {
                if (gameState === 'flying') {
                    crashedPlaneX = 0;
                    crashedPlaneY = 0;
                }
                lastRenderedState = gameState;
            }

            // --- UI ---
            if (gameState === 'waiting') {
                multiDisplay.style.display = "none";
                crashMsg.style.opacity = 0;
                loadingContainer.style.display = "flex";
                gameScreen.style.background = "#121414";
                const timeLeft = waitingEndTime - now;
                const pct = Math.max(0, Math.min(100, (timeLeft / 10000) * 100));
                loadingFill.style.width = pct + '%';

            } else if (gameState === 'flying') {
                multiDisplay.style.display = "block";
                multiDisplay.style.color = "white";
                loadingContainer.style.display = "none";
                crashMsg.style.opacity = 0;

                const ms = Math.max(0, now - flightStartTime);
                currentMultiplier = calculateMultiplier(ms);

                if (currentMultiplier >= crashPoint) {
                    currentMultiplier = crashPoint;
                    triggerCrash();
                }

                const text = currentMultiplier.toFixed(2).split('.');
                multiDisplay.innerHTML = `${text[0]}.${text[1]}<span style="font-size: 80px; line-height: 1;">x</span>`;
                gameScreen.style.background = currentMultiplier >= 10 ? "#2b0a1a" : "#121414";

            } else if (gameState === 'crashed') {
                multiDisplay.style.display = "block";
                multiDisplay.style.color = "#e5053a";
                loadingContainer.style.display = "none";
                crashMsg.style.opacity = 1;
                const text = crashPoint.toFixed(2).split('.');
                multiDisplay.innerHTML = `${text[0]}.${text[1]}<span style="font-size: 80px; line-height: 1;">x</span>`;
            }

            // --- КНОПКИ ---
            for (let i = 1; i <= 2; i++) {
                const btn = document.getElementById(`btn-${i}`);
                const input = document.getElementById(`input-${i}`);
                const state = window.myBets[i].state;

                if (state === 'none') {
                    btn.className = "action-btn btn-bet";
                    btn.innerHTML = `СТАВКА<div class="btn-text-small" id="subtext-${i}">${input.value} 🪙</div>`;
                    btn.disabled = false;
                    input.disabled = false;
                } else if (state === 'queued') {
                    btn.className = "action-btn btn-cancel";
                    btn.innerHTML = `СКАСУВАТИ<div class="btn-text-small" style="font-size:10px;">Очікуємо на новий раунд</div>`;
                    btn.disabled = false;
                    input.disabled = true;
                } else if (state === 'bet_placed' || state === 'placing') {
                    btn.className = "action-btn btn-cancel";
                    btn.innerHTML = `СКАСУВАТИ<div class="btn-text-small">Очікування старту</div>`;
                    btn.disabled = false;
                    input.disabled = true;
                } else if (state === 'playing') {
                    btn.className = "action-btn btn-cashout";
                    const win = Math.floor(window.myBets[i].amount * currentMultiplier);
                    btn.innerHTML = `ЗАБРАТИ<div class="cashout-amount">${win} 🪙</div>`;
                    btn.disabled = false;
                    input.disabled = true;
                } else if (state === 'cashed_out') {
                    btn.className = "action-btn btn-disabled";
                    btn.innerHTML = "ЗАБРАВ";
                    btn.disabled = true;
                    input.disabled = true;
                } else if (state === 'lost') {
                    btn.className = "action-btn btn-disabled";
                    btn.innerHTML = "ПРОГРАШ";
                    btn.disabled = true;
                    input.disabled = true;
                }
            }

            // --- ЛІТАК ---
            if (gameState === 'flying' || gameState === 'crashed') {
                const progress = Math.min(1, Math.log10(currentMultiplier) / 2.0);
                let endX = 80 + (canvas.width * 0.7) * progress;
                let endY = canvas.height - 80 - (canvas.height * 0.7) * progress;

                if (gameState === 'crashed') {
                    crashedPlaneX += 30;
                    crashedPlaneY -= 15;
                    endX += crashedPlaneX;
                    endY += crashedPlaneY;
                }

                if (gameState === 'flying') {
                    const startX = 0;
                    const startY = canvas.height;
                    const gradient = ctx.createLinearGradient(0, endY, 0, canvas.height);
                    gradient.addColorStop(0, 'rgba(229, 5, 58, 0.4)');
                    gradient.addColorStop(1, 'rgba(229, 5, 58, 0.0)');
                    ctx.beginPath();
                    ctx.moveTo(startX, canvas.height);
                    ctx.lineTo(startX, startY);
                    ctx.quadraticCurveTo(startX + (endX - startX) * 0.5, canvas.height, endX, endY);
                    ctx.lineTo(endX, canvas.height);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.quadraticCurveTo(startX + (endX - startX) * 0.5, canvas.height, endX, endY);
                    ctx.strokeStyle = '#e5053a';
                    ctx.lineWidth = 6;
                    ctx.lineCap = 'round';
                    ctx.shadowColor = '#e5053a';
                    ctx.shadowBlur = 15;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                ctx.save();
                ctx.translate(endX, endY);
                ctx.rotate(-Math.PI / 10);
                drawPlane(ctx);
                ctx.restore();
            }

            requestAnimationFrame(drawGame);
        }

        requestAnimationFrame(drawGame);

        // ==========================================
        // АВТО-РЕЖИМ
        // ==========================================

        // Стан авто для кожного боксу
        window.autoMode = {
            1: { tab: 'manual', autoBet: false, autoCashout: false },
            2: { tab: 'manual', autoBet: false, autoCashout: false }
        };

        // Перемикання між вкладками Ставка / Авто
        window.switchTab = function(box, tab) {
            const manualPanel = document.getElementById(`manual-panel-${box}`);
            const autoPanel = document.getElementById(`auto-panel-${box}`);
            const tabs = document.querySelectorAll(`#box-${box} .bet-tab`);

            window.autoMode[box].tab = tab;

            if (tab === 'manual') {
                manualPanel.classList.remove('hidden');
                autoPanel.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
                // Вимикаємо авто при переході на ручний режим
                window.autoMode[box].autoBet = false;
                window.autoMode[box].autoCashout = false;
                document.getElementById(`auto-bet-${box}`).checked = false;
                document.getElementById(`auto-cashout-${box}`).checked = false;
                document.getElementById(`auto-coeff-${box}`).disabled = true;
                document.getElementById(`auto-status-${box}`).innerText = '';
            } else {
                manualPanel.classList.add('hidden');
                autoPanel.classList.add('active');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        };

        // Тогл "Автоставка"
        window.onAutoBetChange = function(box) {
            const checked = document.getElementById(`auto-bet-${box}`).checked;
            window.autoMode[box].autoBet = checked;
            updateAutoStatus(box);
        };

        // Тогл "Автовиведення"
        window.onAutoCashoutChange = function(box) {
            const checked = document.getElementById(`auto-cashout-${box}`).checked;
            window.autoMode[box].autoCashout = checked;
            const coeffInput = document.getElementById(`auto-coeff-${box}`);
            coeffInput.disabled = !checked;
            updateAutoStatus(box);
        };

        function updateAutoStatus(box) {
            const mode = window.autoMode[box];
            const statusEl = document.getElementById(`auto-status-${box}`);
            if (mode.autoBet && mode.autoCashout) {
                const coeff = parseFloat(document.getElementById(`auto-coeff-${box}`).value) || 1.10;
                statusEl.innerText = `Авто: ставка + вивід на ${coeff.toFixed(2)}x`;
            } else if (mode.autoBet) {
                statusEl.innerText = 'Авто: ставка активна';
            } else if (mode.autoCashout) {
                const coeff = parseFloat(document.getElementById(`auto-coeff-${box}`).value) || 1.10;
                statusEl.innerText = `Авто: вивід на ${coeff.toFixed(2)}x`;
            } else {
                statusEl.innerText = '';
            }
        }

        // Оновлення статусу при зміні коефіцієнта
        document.getElementById('auto-coeff-1').addEventListener('input', () => updateAutoStatus(1));
        document.getElementById('auto-coeff-2').addEventListener('input', () => updateAutoStatus(2));

        // ---- Авто-логіка, яка спрацьовує при зміні стану гри ----

        // Авто-ставка: коли починається новий раунд — автоматично ставимо
        function triggerAutoActions_newRound() {
            for (let i = 1; i <= 2; i++) {
                const mode = window.autoMode[i];
                if (mode.tab !== 'auto' || !mode.autoBet) continue;
                const bet = window.myBets[i];
                if (bet.state === 'none') {
                    const inputAmt = parseInt(document.getElementById(`input-${i}`).value);
                    if (inputAmt > currentBalance) {
                        document.getElementById(`auto-status-${i}`).innerText = '⚠ Недостатньо фішок';
                        continue;
                    }
                    handleAction(i);
                }
            }
        }

        // Авто-вивід: перевіряємо кожні 50мс чи досяг коефіцієнт потрібного значення
        function triggerAutoActions_flying() {
            for (let i = 1; i <= 2; i++) {
                const mode = window.autoMode[i];
                if (mode.tab !== 'auto' || !mode.autoCashout) continue;
                const bet = window.myBets[i];
                if (bet.state !== 'playing') continue;
                const targetCoeff = parseFloat(document.getElementById(`auto-coeff-${i}`).value) || 1.10;
                if (currentMultiplier >= targetCoeff) {
                    handleAction(i); // cashout
                }
            }
        }

        // Патчимо window.handleNewRound щоб вставити авто-ставку після основної логіки
        const _baseHandleNewRound = window.handleNewRound;
        window.handleNewRound = function() {
            _baseHandleNewRound();
            setTimeout(() => triggerAutoActions_newRound(), 150);
        };

        // Перевіряємо авто-вивід кожні 50мс під час польоту
        setInterval(() => {
            if (gameState === 'flying') {
                triggerAutoActions_flying();
            }
        }, 50);

        async function saveGameResult(gameName, bet, profit) {
    const username = localStorage.getItem('casino_user');
    if (!username) return;
    const timestamp = firebase.database.ServerValue.TIMESTAMP;
    await database.ref('users_by_name/' + username.toLowerCase() + '/game_history').push({
        game: gameName,
        bet: parseFloat(bet),
        profit: parseFloat(profit),
        ts: timestamp
    });
    await database.ref('users_by_name/' + username.toLowerCase() + '/total_games')
        .set(firebase.database.ServerValue.increment(1));
}
    </script>
