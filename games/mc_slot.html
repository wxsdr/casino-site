<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Майнкрафт Слот | Курахівка</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Rubik:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        /* ==========================================================
           1. ПРЕМІУМ ФОН ТА НАВІГАЦІЯ
           ========================================================== */
        :root {
            --neon-green: #00ff9d;
            --neon-purple: #b500ff;
            --neon-gold: #ffdf00;
            --bg-dark: #07070a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            background: radial-gradient(circle at center, #181822 0%, var(--bg-dark) 100%);
            color: white; font-family: 'Montserrat', sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        .top-bar {
            position: relative; z-index: 100; display: flex; justify-content: space-between; align-items: center;
            padding: 15px 40px; background: rgba(10, 10, 12, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }
        
        .btn-exit {
            background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 30px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-exit:hover { background: #ff3366; border-color: #ff3366; box-shadow: 0 0 20px rgba(255,51,102,0.5); }
        
        .balance-badge { 
            font-size: 22px; font-weight: 900; background: rgba(0,255,157,0.1); 
            padding: 12px 30px; border-radius: 12px; border: 1px solid rgba(0,255,157,0.3); 
            color: var(--neon-green); box-shadow: 0 0 20px rgba(0,255,157,0.1); 
        }

        /* ==========================================================
           2. СЦЕНА ТА АВТОМАСШТАБУВАННЯ
           ========================================================== */
        #game-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; width: 100%; position: relative; }
        #game-scene { 
            width: 1600px; height: 900px; transform-origin: center; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; 
        }

        /* ==========================================================
           3. КОРПУС СЛОТА (Скло, Метал, Неон)
           ========================================================== */
        .slot-machine {
            background: linear-gradient(145deg, rgba(30,30,35,0.95), rgba(15,15,20,0.98));
            border-radius: 25px; border: 2px solid #333; padding: 40px 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.8);
            position: relative;
        }
        /* Неонова підсвітка корпусу */
        .slot-machine::before { 
            content: ''; position: absolute; inset: -4px; border-radius: 30px; 
            background: linear-gradient(45deg, var(--neon-gold), var(--neon-purple), var(--neon-green)); 
            z-index: -1; filter: blur(15px); opacity: 0.4; animation: neonBreathe 4s infinite alternate;
        }
        @keyframes neonBreathe { 0% { opacity: 0.3; } 100% { opacity: 0.6; } }

        .slot-title { 
            font-family: 'Rubik', sans-serif; font-size: 55px; color: #fff; 
            text-align: center; text-transform: uppercase; letter-spacing: 10px; margin-bottom: 30px; 
            text-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }
        .slot-title span { color: var(--neon-gold); }

        /* ВІКНО БАРАБАНІВ */
        .reels-window {
            background: #050505; padding: 10px; border-radius: 20px;
            border: 4px solid #222; box-shadow: inset 0 20px 50px rgba(0,0,0,1);
            display: flex; gap: 10px; overflow: hidden; height: 480px;
        }

        .reel {
            width: 160px; height: 100%; position: relative;
            background: linear-gradient(to right, rgba(255,255,255,0.02), rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border-radius: 10px;
        }
        
        .reel-strip {
            width: 100%; position: absolute; top: 0; left: 0;
            display: flex; flex-direction: column;
            transition: transform 2.5s cubic-bezier(0.15, 0.9, 0.2, 1.05); /* Пружинний відскок */
        }

        .symbol-cell {
            width: 160px; height: 160px; 
            display: flex; justify-content: center; align-items: center;
            position: relative; perspective: 1200px;
        }

        /* ==========================================================
           4. 100% PURE CSS 3D БЛОКИ (БЕЗ КАРТИНОК!)
           ========================================================== */
        .iso-block {
            width: 90px; height: 90px; position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-22deg) rotateY(45deg);
            transition: transform 0.3s, filter 0.3s;
        }

        .iso-face {
            position: absolute; width: 90px; height: 90px;
            box-sizing: border-box; border: 2px solid rgba(0,0,0,0.5);
        }
        
        .face-top   { transform: rotateX(90deg) translateZ(45px); }
        .face-front { transform: translateZ(45px); }
        .face-right { transform: rotateY(90deg) translateZ(45px); }

        /* --- МАЛЮЄМО ТЕКСТУРИ ГРАДІЄНТАМИ --- */
        
        /* 1. АЛМАЗ */
        .tex-diamond .iso-face { border-color: #a3ffff; box-shadow: inset 0 0 15px rgba(255,255,255,0.5); }
        .tex-diamond .face-top { background: #51eeea; }
        .tex-diamond .face-front { background: #35c4c4; }
        .tex-diamond .face-right { background: #229494; }

        /* 2. ЗОЛОТО */
        .tex-gold .iso-face { border-color: #fff3a1; box-shadow: inset 0 0 15px rgba(255,255,255,0.5); }
        .tex-gold .face-top { background: #fce029; }
        .tex-gold .face-front { background: #d4b51c; }
        .tex-gold .face-right { background: #a3890f; }

        /* 3. СМАРАГД */
        .tex-emerald .iso-face { border-color: #95fca8; box-shadow: inset 0 0 15px rgba(255,255,255,0.5); }
        .tex-emerald .face-top { background: #41f384; }
        .tex-emerald .face-front { background: #27c964; }
        .tex-emerald .face-right { background: #189647; }

        /* 4. ДЕРЕВО */
        .tex-wood .iso-face { border-color: #3b2a16; }
        .tex-wood .face-top { background: #a68453; background-image: repeating-linear-gradient(90deg, transparent 0, transparent 15px, rgba(0,0,0,0.15) 15px, rgba(0,0,0,0.15) 18px); }
        .tex-wood .face-front { background: #85663d; background-image: repeating-linear-gradient(90deg, transparent 0, transparent 15px, rgba(0,0,0,0.2) 15px, rgba(0,0,0,0.2) 18px); }
        .tex-wood .face-right { background: #614a2b; background-image: repeating-linear-gradient(90deg, transparent 0, transparent 15px, rgba(0,0,0,0.25) 15px, rgba(0,0,0,0.25) 18px); }

        /* 5. ЗЕМЛЯ (З ТРАВОЮ) */
        .tex-dirt .iso-face { border-color: #382618; }
        .tex-dirt .face-top { background: #5cb85c; }
        .tex-dirt .face-front { background: linear-gradient(to bottom, #4cae4c 25%, #79553a 25%); }
        .tex-dirt .face-right { background: linear-gradient(to bottom, #3d8b3d 25%, #533824 25%); }

        /* 6. WILD (НЕОНОВИЙ ОБСИДІАН) */
        .tex-wild .iso-face { border: 2px solid var(--neon-gold); box-shadow: inset 0 0 20px var(--neon-gold); }
        .tex-wild .face-top { background: #2f1d40; }
        .tex-wild .face-front { background: #1f122b; }
        .tex-wild .face-right { background: #130a1c; }
        
        .block-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) translateZ(70px);
            font-size: 32px; font-weight: 900; z-index: 10;
        }
        .tex-wild .block-text { color: var(--neon-gold); text-shadow: 0 0 15px var(--neon-gold); }

        /* 7. SCATTER (ПЛАЧУЧИЙ ОБСИДІАН) */
        .tex-scatter .iso-face { border: 2px solid var(--neon-purple); box-shadow: inset 0 0 20px var(--neon-purple); }
        .tex-scatter .face-top { background: #4a1763; background-image: radial-gradient(circle, var(--neon-purple) 15%, transparent 50%); }
        .tex-scatter .face-front { background: #320d45; background-image: radial-gradient(circle, var(--neon-purple) 15%, transparent 50%); }
        .tex-scatter .face-right { background: #20062e; background-image: radial-gradient(circle, var(--neon-purple) 15%, transparent 50%); }
        .tex-scatter .block-text { color: var(--neon-purple); text-shadow: 0 0 15px var(--neon-purple); font-size: 26px; }

        /* МНОЖНИК ДЛЯ ЛИПКИХ БУДОК */
        .sticky-mult {
            position: absolute; bottom: -20px; right: -20px;
            background: var(--neon-green); color: black;
            font-size: 24px; font-weight: 900; padding: 5px 12px;
            border-radius: 8px; border: 2px solid black;
            box-shadow: 0 5px 15px rgba(0,255,157,0.5); z-index: 20;
            transform: translateZ(80px); /* Висить у повітрі перед кубом */
        }

        /* АНІМАЦІЯ ПЕРЕМОГИ (Поп-ап 3D) */
        .win-pop .iso-block {
            animation: popOut 1s infinite alternate; z-index: 100;
            filter: drop-shadow(0 0 25px var(--neon-gold));
        }
        @keyframes popOut { from { transform: rotateX(-22deg) rotateY(45deg) scale(1); } to { transform: rotateX(-10deg) rotateY(25deg) scale(1.4); } }

        /* ЕФЕКТ ШВИДКОСТІ */
        .blur { filter: blur(5px); }

        /* ==========================================================
           5. ПАНЕЛЬ УПРАВЛІННЯ
           ========================================================== */
        .control-panel { width: 1400px; display: flex; justify-content: space-between; align-items: stretch; gap: 20px; }
        
        .ctrl-box {
            background: rgba(15,15,20,0.8); backdrop-filter: blur(20px); border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05); padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.9); 
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        
        #status-text { font-size: 26px; font-weight: 900; color: var(--neon-gold); text-transform: uppercase; text-shadow: 0 0 15px rgba(255,223,0,0.4); text-align: center; }

        .bet-input-row { display: flex; align-items: center; gap: 15px; margin-top: 15px; }
        .bet-btn { width: 60px; height: 60px; border-radius: 12px; background: #1a1a1a; color: white; border: 1px solid #333; font-size: 30px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 0 #0a0a0a; }
        .bet-btn:active { transform: translateY(8px); box-shadow: none; }
        
        .bet-input { 
            background: #000; color: white; border: 2px solid #444; border-radius: 12px; 
            font-family: 'Montserrat', sans-serif; font-size: 38px; font-weight: 900; text-align: center; 
            width: 180px; height: 60px; outline: none; box-shadow: inset 0 5px 15px rgba(0,0,0,0.9); transition: 0.3s; 
        }
        .bet-input:focus { border-color: var(--neon-green); box-shadow: 0 0 20px rgba(0,255,157,0.3); color: var(--neon-green); }

        .spin-btn { 
            background: linear-gradient(135deg, var(--neon-green), #00b347); color: black; border: none; 
            border-radius: 15px; width: 100%; height: 85px; font-size: 34px; font-weight: 900; 
            font-family: 'Montserrat', sans-serif; text-transform: uppercase; cursor: pointer; 
            box-shadow: 0 10px 0 #006622, 0 15px 30px rgba(0,255,157,0.4); transition: 0.1s; margin-bottom: 15px;
        }
        .spin-btn:active:not(:disabled) { transform: translateY(10px); box-shadow: none; }
        .spin-btn:disabled { background: #333; color: #555; box-shadow: 0 10px 0 #111; cursor: not-allowed; }

        .buy-bonus-btn { 
            background: transparent; border: 2px solid var(--neon-purple); color: var(--neon-purple); 
            border-radius: 12px; width: 100%; padding: 15px; font-size: 22px; font-weight: 900; 
            cursor: pointer; text-transform: uppercase; transition: 0.3s; 
        }
        .buy-bonus-btn:hover:not(:disabled) { background: var(--neon-purple); color: white; box-shadow: 0 0 25px rgba(181,0,255,0.5); }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn-exit" onclick="window.location.href='../index.html'">⬅ Втекти</button>
        <div class="balance-badge">БАЛАНС: <span id="balance-amount">0</span></div>
    </div>

    <div id="game-wrapper">
        <div id="game-scene">
            
            <div class="slot-machine">
                <div class="slot-title">VIP <span>3D</span> СЛОТ</div>
                
                <div class="reels-window">
                    <div class="reel"><div class="reel-strip" id="strip-0"></div></div>
                    <div class="reel"><div class="reel-strip" id="strip-1"></div></div>
                    <div class="reel"><div class="reel-strip" id="strip-2"></div></div>
                    <div class="reel"><div class="reel-strip" id="strip-3"></div></div>
                    <div class="reel"><div class="reel-strip" id="strip-4"></div></div>
                </div>
            </div>

            <div class="control-panel">
                <div class="ctrl-box"><div id="status-text">ОЧІКУВАННЯ СТАВКИ</div></div>
                
                <div class="ctrl-box">
                    <div style="color: #888; font-weight: bold; letter-spacing: 2px;">ПОТОЧНА СТАВКА</div>
                    <div class="bet-input-row">
                        <button class="bet-btn" onclick="updateBet(-10)">-</button>
                        <input type="number" id="bet-input" class="bet-input" value="10" min="10" max="50000" onchange="manualBetChange()">
                        <button class="bet-btn" onclick="updateBet(10)">+</button>
                    </div>
                </div>
                
                <div class="ctrl-box" style="background: transparent; border: none; box-shadow: none; padding: 0;">
                    <button class="spin-btn" id="spin-btn" onclick="spin()">КРУТИТИ</button>
                    <button class="buy-bonus-btn" id="buy-bonus-btn" onclick="buyBonus()">КУПИТИ БОНУС <span id="bonus-price">1000</span></button>
                </div>
            </div>

        </div>
    </div>

    <script>
        function resizeGame() {
            const wrapper = document.getElementById('game-wrapper');
            const scene = document.getElementById('game-scene');
            const scale = Math.min(wrapper.clientWidth / 1600, wrapper.clientHeight / 900);
            scene.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeGame);
        resizeGame();

        const firebaseConfig = {
            apiKey: "AIzaSyC1HOC3_im8YiziljGqpR_0AvHLQctIfxQ",
            authDomain: "kurahivka-casino.firebaseapp.com",
            databaseURL: "https://kurahivka-casino-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "kurahivka-casino"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const username = localStorage.getItem('casino_user');
        
        if (!username) window.location.href = '../index.html';

        let currentBalance = 0;
        const userRef = database.ref('users_by_name/' + username.toLowerCase());
        
        userRef.on('value', snap => {
            const data = snap.val();
            if (data && data.in_casino === false) {
                alert("ДОСТУП ЗАБЛОКОВАНО: Ви покинули казино.");
                window.location.href = '../index.html';
            }
            currentBalance = data ? (data.chips || 0) : 0;
            document.getElementById('balance-amount').innerText = currentBalance;
        });

        const symbols = ['tex-dirt', 'tex-wood', 'tex-gold', 'tex-diamond', 'tex-emerald'];
        const wildSymbol = 'tex-wild';      
        const scatterSymbol = 'tex-scatter'; 

        const SYMBOL_HEIGHT = 160; 
        const STRIP_LENGTH = 35; 

        let currentBet = 10;
        let isSpinning = false;
        let isBonusGame = false;
        let freeSpinsLeft = 0;
        let stickyWilds = {}; 
        
        let currentMatrix = [
            [symbols[0], symbols[1], symbols[2], symbols[3], symbols[4]],
            [symbols[4], symbols[3], symbols[2], symbols[1], symbols[0]],
            [symbols[1], symbols[2], symbols[4], symbols[0], symbols[3]]
        ];

        function createIsoBlock(type, mult = null) {
            let multHTML = mult ? `<div class="sticky-mult">x${mult}</div>` : '';
            let textHTML = '';
            if (type === 'tex-wild') textHTML = `<div class="block-text">WILD</div>`;
            if (type === 'tex-scatter') textHTML = `<div class="block-text">BONUS</div>`;

            return `
                <div class="iso-block ${type}">
                    <div class="iso-face face-top"></div>
                    <div class="iso-face face-front"></div>
                    <div class="iso-face face-right"></div>
                    ${textHTML}
                    ${multHTML}
                </div>
            `;
        }

        function buildReels(targetMatrix) {
            for (let x = 0; x < 5; x++) {
                const strip = document.getElementById(`strip-${x}`);
                strip.innerHTML = ''; 
                
                for (let i = 0; i < STRIP_LENGTH; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'symbol-cell';
                    cell.id = `cell-${x}-${i}`;
                    
                    let sym = '';
                    let mult = null;

                    if (i >= STRIP_LENGTH - 3) {
                        let y = i - (STRIP_LENGTH - 3);
                        sym = targetMatrix[y][x];
                        if (isBonusGame && stickyWilds[`${x}-${y}`]) mult = stickyWilds[`${x}-${y}`];
                        else if (sym === wildSymbol && !isBonusGame) mult = Math.random() > 0.5 ? 2 : 3;
                    } 
                    else if (i < 3) {
                        sym = currentMatrix[i][x];
                        if (isBonusGame && stickyWilds[`${x}-${i}`]) mult = stickyWilds[`${x}-${i}`];
                    } 
                    else {
                        sym = symbols[Math.floor(Math.random() * symbols.length)];
                        cell.classList.add('blur');
                    }
                    
                    cell.innerHTML = createIsoBlock(sym, mult);
                    strip.appendChild(cell);
                }
                
                strip.style.transition = 'none';
                strip.style.transform = `translateY(0px)`;
            }
        }

        buildReels(currentMatrix); 

        const betInput = document.getElementById('bet-input');
        function updateBet(amount) {
            if (isSpinning || isBonusGame) return;
            let newBet = parseInt(betInput.value) + amount;
            if (newBet >= 10 && newBet <= 50000) {
                currentBet = newBet; betInput.value = currentBet;
                document.getElementById('bonus-price').innerText = currentBet * 100;
            }
        }
        function manualBetChange() {
            if (isSpinning || isBonusGame) { betInput.value = currentBet; return; }
            let val = parseInt(betInput.value);
            if (isNaN(val) || val < 10) val = 10;
            currentBet = val; betInput.value = currentBet;
            document.getElementById('bonus-price').innerText = currentBet * 100;
        }

        function setStatus(text, color = 'var(--neon-gold)') {
            const el = document.getElementById('status-text');
            el.innerText = text; el.style.color = color;
            el.style.textShadow = `0 0 15px ${color}`;
        }

        function lockButtons(lock) {
            document.getElementById('spin-btn').disabled = lock;
            document.getElementById('buy-bonus-btn').disabled = lock;
            betInput.disabled = lock;
        }

        async function buyBonus() {
            const cost = currentBet * 100;
            if (isSpinning || isBonusGame) return;
            if (currentBalance < cost) return alert("Недостатньо фішок для покупки!");
            
            isSpinning = true; lockButtons(true);
            await userRef.update({ chips: currentBalance - cost });
            executeSpin(true); 
        }

        async function spin() {
            if (isSpinning) return;
            if (!isBonusGame && currentBalance < currentBet) return alert("Недостатньо фішок!");
            
            isSpinning = true; lockButtons(true);
            setStatus("ШУКАЄМО РУДУ...", "#fff");

            document.querySelectorAll('.win-pop').forEach(el => el.classList.remove('win-pop'));

            if (!isBonusGame) await userRef.update({ chips: currentBalance - currentBet });
            else freeSpinsLeft--;

            executeSpin(false);
        }

        function executeSpin(forceBonus) {
            let targetMatrix = [[], [], []];
            let scatterCount = 0;

            for (let y = 0; y < 3; y++) {
                for (let x = 0; x < 5; x++) {
                    if (isBonusGame && stickyWilds[`${x}-${y}`]) {
                        targetMatrix[y][x] = wildSymbol; continue; 
                    }

                    if (forceBonus && y === 1 && (x === 0 || x === 2 || x === 4)) {
                        targetMatrix[y][x] = scatterSymbol; scatterCount++; continue;
                    }

                    let isScatterReel = (x === 0 || x === 2 || x === 4);
                    let symbolClass = '';

                    if (!isBonusGame && !forceBonus && isScatterReel && Math.random() < 0.05) {
                        symbolClass = scatterSymbol; scatterCount++;
                    } else if ((x === 1 || x === 2 || x === 3) && Math.random() < 0.12) {
                        symbolClass = wildSymbol;
                        if (isBonusGame) stickyWilds[`${x}-${y}`] = Math.random() > 0.5 ? 2 : 3;
                    } else {
                        symbolClass = symbols[Math.floor(Math.random() * symbols.length)];
                    }
                    targetMatrix[y][x] = symbolClass;
                }
            }

            buildReels(targetMatrix);

            setTimeout(() => {
                for (let x = 0; x < 5; x++) {
                    setTimeout(() => {
                        const strip = document.getElementById(`strip-${x}`);
                        strip.style.transition = 'transform 2.5s cubic-bezier(0.15, 0.9, 0.2, 1.05)';
                        strip.style.transform = `translateY(-${(STRIP_LENGTH - 3) * SYMBOL_HEIGHT}px)`;
                        
                        setTimeout(() => {
                            strip.querySelectorAll('.blur').forEach(el => el.classList.remove('blur'));
                        }, 1200);
                        
                    }, x * 200); 
                }
            }, 50);

            setTimeout(() => {
                currentMatrix = targetMatrix; 
                checkWin(targetMatrix, scatterCount);
            }, 2500 + (4 * 200));
        }

        async function checkWin(matrix, scatterCount) {
            let winAmount = 0;
            
            for (let y = 0; y < 3; y++) {
                if (matrix[y][0] === matrix[y][1] || matrix[y][1] === wildSymbol) {
                    if (Math.random() > 0.4) {
                        document.getElementById(`cell-0-${STRIP_LENGTH-3+y}`).classList.add('win-pop');
                        document.getElementById(`cell-1-${STRIP_LENGTH-3+y}`).classList.add('win-pop');
                        document.getElementById(`cell-2-${STRIP_LENGTH-3+y}`).classList.add('win-pop');
                        
                        let lineWin = currentBet * (Math.floor(Math.random() * 8) + 1);
                        let multiplier = 1;
                        for(let x = 1; x <= 3; x++) {
                            if(stickyWilds[`${x}-${y}`]) multiplier += stickyWilds[`${x}-${y}`];
                        }
                        winAmount += (lineWin * (multiplier > 1 ? multiplier : 1));
                    }
                }
            }

            if (winAmount > 0) {
                setStatus(`ВЕЛИКИЙ КУШ: +${winAmount} 🪙`, "var(--neon-green)");
                await userRef.once('value').then(s => { userRef.update({ chips: s.val().chips + winAmount }); });
            } else if (!isBonusGame) {
                setStatus("НЕ ПОЩАСТИЛО", "#888");
            }

            setTimeout(() => {
                if (!isBonusGame && scatterCount >= 3) {
                    startBonusGame();
                } else if (isBonusGame && freeSpinsLeft <= 0) {
                    endBonusGame();
                } else if (isBonusGame && freeSpinsLeft > 0) {
                    setStatus(`КРАФТІВ ЗАЛИШИЛОСЬ: ${freeSpinsLeft}`, "var(--neon-purple)");
                    isSpinning = false; lockButtons(false); document.getElementById('buy-bonus-btn').disabled = true;
                } else {
                    isSpinning = false; lockButtons(false); setStatus("ОЧІКУВАННЯ СТАВКИ", "var(--neon-gold)");
                }
            }, 1500);
        }

        function startBonusGame() {
            isBonusGame = true; 
            freeSpinsLeft = Math.floor(Math.random() * 8) + 7; 
            stickyWilds = {}; 
            
            alert(`🔥 ЗНАЙДЕНО БОНУСНУ КІМНАТУ! 🔥\nБезкоштовних обертань: ${freeSpinsLeft}\nВсі Обсидіани (WILD) залипають!`);
            setStatus(`КРАФТІВ ЗАЛИШИЛОСЬ: ${freeSpinsLeft}`, "var(--neon-purple)");
            
            isSpinning = false; lockButtons(false); document.getElementById('buy-bonus-btn').disabled = true;
        }

        function endBonusGame() {
            alert("Бонусна гра завершена! Забирайте здобич.");
            isBonusGame = false; stickyWilds = {};
            
            document.querySelectorAll('.win-pop').forEach(el => el.classList.remove('win-pop'));
            
            isSpinning = false; lockButtons(false); setStatus("ОЧІКУВАННЯ СТАВКИ", "var(--neon-gold)");
        }
    </script>
</body>
</html>
