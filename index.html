<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Kurahivka RP - Казино</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <h1>Добро пожаловать в Казино Kurahivka RP</h1>
    <hr>

    <div id="auth-section">
        <h3>Шаг 1: Войдите в аккаунт</h3>
        <input type="text" id="username-input" placeholder="Введите ваш ник в игре">
        <br><br>
        <input type="text" id="pin-input" placeholder="Код из игры (/casinopass)">
        <br><br>
        <button onclick="login()">Войти</button>
    </div>

    <div id="game-section" style="display: none;">
        <h3>Привет, <span id="player-name">Игрок</span>!</h3>
        <p>Ваш баланс фишек: <strong id="chips-balance">0</strong> 🪙</p>
        
        <hr>
        <h3>Шаг 2: Сделайте ставку</h3>
        <input type="number" id="bet-amount" placeholder="Количество фишек" min="1">
        <br><br>
        <button onclick="spinWheel()">Испытать удачу (Крутить)</button>
        
        <h2 id="result-message" style="color: blue;"></h2>
    </div>

    <script>
        // Твоя личная конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyC1HOC3_im8YiziljGqpR_0AvHLQctIfxQ",
            authDomain: "kurahivka-casino.firebaseapp.com",
            databaseURL: "https://kurahivka-casino-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "kurahivka-casino",
            storageBucket: "kurahivka-casino.firebasestorage.app",
            messagingSenderId: "104831084459",
            appId: "1:104831084459:web:ef044794d93791ee30ace"
        };

        // Инициализируем Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let userNickname = "";
        let currentChips = 0;

        // --- ОБНОВЛЕННАЯ ФУНКЦИЯ ВХОДА (С ПРОВЕРКОЙ PIN) ---
        async function login() {
            const username = document.getElementById('username-input').value.trim();
            const pin = document.getElementById('pin-input').value.trim();

            if (username === "" || pin === "") {
                alert("Пожалуйста, введите ник и код из игры!");
                return;
            }

            // Отправляем запрос на твой Render сервер для проверки PIN-кода
            try {
                const response = await fetch(`https://casino-backend-039e.onrender.com/api/login?user=${username}&pin=${pin}`);
                const data = await response.json();

                if (data.success) {
                    // Код верный! Пускаем игрока
                    userNickname = username;
                    
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('game-section').style.display = 'block';
                    document.getElementById('player-name').innerText = userNickname;

                    // Подключаем живое отслеживание баланса из Firebase
                    const userRef = database.ref('users_by_name/' + userNickname.toLowerCase());
                    
                    userRef.on('value', (snapshot) => {
                        const dbData = snapshot.val();
                        if (dbData && dbData.chips !== undefined) {
                            currentChips = dbData.chips;
                        } else {
                            currentChips = 0;
                        }
                        document.getElementById('chips-balance').innerText = currentChips;
                    });
                } else {
                    // Код неверный или игрока нет в базе
                    alert("Ошибка: " + data.message);
                }
            } catch (error) {
                alert("Ошибка соединения с сервером авторизации! Подождите пару секунд и попробуйте снова.");
                console.error(error);
            }
        }

        // Логика рулетки (настоящий рандом)
        function spinWheel() {
            const bet = parseInt(document.getElementById('bet-amount').value);
            if (!bet || bet < 1) {
                alert("Введите правильную ставку!");
                return;
            }
            if (bet > currentChips) {
                alert("Недостаточно фишек на балансе!");
                return;
            }

            document.getElementById('result-message').innerText = "Крутим рулетку... 🎰";

            // Генерируем шанс (например, 40% на победу с удвоением ставки)
            setTimeout(() => {
                const win = Math.random() < 0.40; 
                let newChips = currentChips;

                if (win) {
                    const winAmount = bet * 2;
                    newChips = currentChips + bet; // Чистый выигрыш равен ставке при x2
                    document.getElementById('result-message').innerHTML = `Вы выиграли ${winAmount} фишек! 🎉`;
                    document.getElementById('result-message').style.color = "green";
                } else {
                    newChips = currentChips - bet;
                    document.getElementById('result-message').innerText = "Вы проиграли ставку. Повезет в следующий раз! 😔";
                    document.getElementById('result-message').style.color = "red";
                }

                // Записываем новый баланс обратно в Firebase
                database.ref('users_by_name/' + userNickname.toLowerCase()).update({
                    username: userNickname,
                    chips: newChips
                });

            }, 1500); // Имитация кручения 1.5 секунды
        }
    </script>

</body>
</html>
